body: |-
  ## Decision
  
  1. Documentation support is partitioned into four explicit surfaces: Route Surface, Payload Surface, UI Surface, and Parity Surface.
  2. Route Surface defines required endpoints, mount rules, prefix behavior, and enable/disable semantics.
  3. Payload Surface defines normative OpenAPI/OpenRPC projection contracts and determinism requirements.
  4. UI Surface defines supported documentation UIs and mount points; it does not define payload semantics.
  5. Parity Surface defines runtime-to-documentation conformance obligations for security, operation visibility, and observable behavior.
  6. Documentation projections must consume canonical metadata and canonical materialization outputs; direct bypass projections are non-conforming.
  7. Runtime diagnostics and documentation surfaces must agree for framework-owned system endpoints, including health, method, hook, kernel, OpenAPI, and mounted documentation routes.
  8. example, performance, and options tests that compare runtime visibility, OpenAPI paths, system prefixes, security schemes, and diagnostics mounts are conformance signals for the documentation parity surface.
  9. Documentation support specs must identify whether an asserted behavior belongs to route mounting, payload projection, UI mounting, or runtime parity so tests do not mix those contracts.
  10. Framework-compatible in-memory documentation publication surfaces, including `openapi_schema` on app/router objects when exposed by the runtime, belong to the Parity Surface whenever downstream tooling introspects the live object instead of fetching `/openapi.json`.
  
  ## Context
  
  The example test suite cover OpenAPI path exposure, system endpoint visibility, security scheme projection, diagnostics mounts, Uvicorn runtime parity, and client-visible REST/RPC behavior. Those tests reflect a documentation architecture where docs are generated from canonical metadata and materialized framework state, then checked against runtime behavior.
  
  Downstream integrations may inspect the in-memory app/router object rather than performing an HTTP fetch against `/openapi.json`. When tigrbl exposes a framework-compatible `openapi_schema` attribute, that publication path is part of the same documentation parity concern as the mounted payload route because both surfaces represent the same OpenAPI revision to downstream consumers.
  
  ## Traceability
  
  - Related ADRs: `adr:1030`, `adr:1032`, `adr:1037`, `adr:1040`, `adr:1041`, `adr:1050`
  - Companion specs: `spc:2077`, `spc:2078`, `spc:2079`, `spc:2080`, `spc:2012`, `spc:2021`
  - Candidate features: `feat:docs-support-001`, `feat:openapi-mount-surface-001`, `feat:openapi-payload-surface-001`, `feat:diagnostics-router-mount-surface-001`, `feat:surface-docs-cross-projection-parity-001`, `feat:openapi-schema-cache-compatibility-001`
  - Concern groups: System/Docs/Health Endpoints, Transport/API Binding and App Assembly, Client/REST-RPC Parity and Usage, Security/Auth Projection
