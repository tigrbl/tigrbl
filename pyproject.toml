[tool.uv]
package = false

[tool.pytest.ini_options]
addopts = [
  "--import-mode=importlib",
]
testpaths = [
  "pkgs",
  "tests",
  "tools/ci/tests",
  "tools/release/tests",
]
norecursedirs = [
  ".git",
  ".tmp",
  ".uv-cache",
  ".venv",
  "docs/notes/archive",
]

[dependency-groups]
dev = [
  "aiosqlite>=0.19.0",
  "asyncpg>=0.30.0",
  "build>=1.2.0",
  "flake8>=7.0",
  "greenlet>=3.2.3",
  "gunicorn>=21.2.0",
  "hatchling>=1.27.0",
  "hypercorn>=0.16.0",
  "httpx>=0.27.0,<0.28",
  "jinja2>=3.1.4",
  "poetry-core>=1.0.0",
  "psycopg2-binary>=2.9.9",
  "pydantic>=2.10,<3",
  "pytest>=8.0",
  "pytest-asyncio>=0.24.0",
  "pytest-benchmark>=4.0.0",
  "pytest-json-report>=1.5.0",
  "pytest-timeout>=2.3.1",
  "pytest-xdist>=3.6.1",
  "python-dotenv",
  "pyyaml",
  "requests>=2.32.3",
  "ruff>=0.11.0",
  "ssot-registry>=0.2.16",
  "sqlalchemy>=2.0",
  "tomli-w",
  "typing-extensions>=4.0",
  "uvicorn",
  "websockets>=13",
]

[tool.uv.workspace]
members = [
  "pkgs/00_typing/*",
  "pkgs/01_spec/*",
  "pkgs/10_core/*",
  "pkgs/20_base/*",
  "pkgs/30_orm/*",
  "pkgs/40_atoms/*",
  "pkgs/45_kernel/*",
  "pkgs/50_runtime/*",
  "pkgs/60_ops/*",
  "pkgs/70_concrete/*",
  "pkgs/80_facade/*",
  "pkgs/90_engines/*",
  "pkgs/95_client/*",
  "pkgs/96_examples/*",
  "pkgs/97_tests/*",
  "pkgs/99_deprecated/*",
]
