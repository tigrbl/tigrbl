risks:
  - id: RISK-001
    title: Certification wording drift between frozen release and active dev line
    state: current
    mitigation: Keep release claims in current/evidenced files and dev work in target/blocked files only.
    mitigation_owner: Governance
  - id: RISK-002
    title: Datatype architecture widens boundary without gate updates
    state: target
    mitigation: Require claim_target mapping and phase ownership before implementation promotion.
    mitigation_owner: Next-target program
  - id: RISK-003
    title: Evidence registry and new authority tree diverge
    state: blocked
    mitigation: Keep docs/conformance evidence map as historical evidence and use certification/ as release-control authority.
    mitigation_owner: Governance
  - id: RISK-004
    title: Engine alignment scope outruns available multi-engine validation
    state: blocked
    mitigation: Hold engine-family claims at target or blocked until feature-specific tests exist.
    mitigation_owner: Next-target program
issues:
  - id: ISSUE-001
    title: Active dev line has no Tier 3 or release promotion claim
    state: blocked
    phase_link: N1
    waiver: null
  - id: ISSUE-002
    title: Datatype and table program remains planning-scoped rather than implementation-closed
    state: blocked
    phase_link: N1
    waiver: null
  - id: ISSUE-003
    title: Certification-tree validator is implemented and must remain synchronized with the authority files
    state: current
    phase_link: N1
    waiver: null
  - id: ISSUE-004
    title: Frozen 0.3.18 release bundle should not be regenerated as part of Phase 0 boundary reset
    state: current
    phase_link: null
    waiver:
      id: WAIVER-001
      reason: Historical release bundle remains governed release history and is intentionally not rewritten.
      approved_by: Governance
phase_exit_criteria:
  every_next_target_feature_has_owner_package_crate_test_class_claim_target: true
