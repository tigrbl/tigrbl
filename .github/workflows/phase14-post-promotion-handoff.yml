name: Phase 14 Post-promotion Handoff

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  phase14-post-promotion-handoff:
    runs-on: ubuntu-latest
    env:
      PYTHONDONTWRITEBYTECODE: '1'
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Phase 14 validation dependencies
        run: python -m pip install --upgrade pip pytest

      - name: Validate Phase 14 handoff
        run: python tools/ci/validate_phase14_handoff.py

      - name: Run Phase 14 validator tests
        run: python -m pytest -q tools/ci/tests/test_phase14_handoff.py -p no:cacheprovider
