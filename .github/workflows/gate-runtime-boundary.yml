name: Gate Runtime Boundary

on:
  pull_request:
    paths:
      - "pkgs/50_runtime/tigrbl_runtime/**"
      - "tools/ci/validate_runtime_boundary.py"
      - ".github/workflows/gate-runtime-boundary.yml"
  push:
    branches: [master, main]
    paths:
      - "pkgs/50_runtime/tigrbl_runtime/**"
      - "tools/ci/validate_runtime_boundary.py"
      - ".github/workflows/gate-runtime-boundary.yml"

jobs:
  runtime-boundary:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Validate runtime boundary
        run: python tools/ci/validate_runtime_boundary.py
      - name: Run runtime boundary tests
        run: uv run pytest pkgs/50_runtime/tigrbl_runtime/tests/test_runtime_boundary_contract.py
