name: Gate E Promotion

on:
  push:
    branches:
      - master
      - main
      - release/**
  pull_request:
  workflow_dispatch:
  workflow_call:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  gate-e-promotion:
    runs-on: ubuntu-latest
    env:
      PYTHONDONTWRITEBYTECODE: '1'
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install workspace dev dependencies
        run: |
          python -m pip install --upgrade pip uv
          uv sync --all-groups --no-install-workspace --frozen

      - name: Compute workspace PYTHONPATH
        shell: bash
        run: |
          set -euo pipefail
          PY_PATH="$GITHUB_WORKSPACE"
          for base in "$GITHUB_WORKSPACE/pkgs/core" "$GITHUB_WORKSPACE/pkgs/apps" "$GITHUB_WORKSPACE/pkgs/engines"; do
            if [[ -d "$base" ]]; then
              for child in "$base"/*; do
                [[ -d "$child" ]] || continue
                PY_PATH="$PY_PATH:$child"
                if [[ -d "$child/src" ]]; then
                  PY_PATH="$PY_PATH:$child/src"
                fi
              done
            fi
          done
          PY_PATH="$PY_PATH:$GITHUB_WORKSPACE/pkgs/core/tigrbl_runtime"
          echo "PYTHONPATH=$PY_PATH" >> "$GITHUB_ENV"

      - name: Validate Gate E promotion closure
        run: uv run --no-sync python tools/ci/validate_gate_e_promotion.py

      - name: Run Gate E validator tests
        run: |
          mkdir -p .tmp .uv-cache .uv-pytest-tigrbl-tests
          export UV_CACHE_DIR="${GITHUB_WORKSPACE}/.uv-cache"
          export TMPDIR="${GITHUB_WORKSPACE}/.tmp"
          export TEMP="${GITHUB_WORKSPACE}/.tmp"
          export TMP="${GITHUB_WORKSPACE}/.tmp"
          uv run --no-sync python -m pytest -q tools/ci/tests/test_gate_e_promotion.py -p no:cacheprovider --basetemp .uv-pytest-tigrbl-tests

      - name: Run tigrbl_tests gate
        run: |
          mkdir -p .tmp .uv-cache .uv-pytest-tigrbl-tests
          export UV_CACHE_DIR="${GITHUB_WORKSPACE}/.uv-cache"
          export TMPDIR="${GITHUB_WORKSPACE}/.tmp"
          export TEMP="${GITHUB_WORKSPACE}/.tmp"
          export TMP="${GITHUB_WORKSPACE}/.tmp"
          uv pip install --no-deps -e pkgs/core/tigrbl -e pkgs/core/tigrbl_runtime
          uv run --no-sync python -m pytest -q pkgs/core/tigrbl_tests/tests -p no:cacheprovider --basetemp .uv-pytest-tigrbl-tests
