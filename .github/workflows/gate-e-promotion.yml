name: Gate E Promotion

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  gate-e-promotion:
    runs-on: ubuntu-latest
    env:
      PYTHONDONTWRITEBYTECODE: '1'
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Gate E dependencies
        run: python -m pip install --upgrade pip pytest

      - name: Validate Gate E promotion closure
        run: python tools/ci/validate_gate_e_promotion.py

      - name: Run Gate E validator tests
        run: python -m pytest -q tools/ci/tests/test_gate_e_promotion.py -p no:cacheprovider
