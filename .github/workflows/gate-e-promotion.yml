name: Gate E Promotion

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  gate-e-promotion:
    runs-on: ubuntu-latest
    env:
      PYTHONDONTWRITEBYTECODE: '1'
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install workspace dev dependencies
        run: |
          python -m pip install --upgrade pip uv
          uv sync --all-groups --no-install-workspace --frozen

      - name: Validate Gate E promotion closure
        run: uv run --no-sync python tools/ci/validate_gate_e_promotion.py

      - name: Run Gate E validator tests
        run: uv run --no-sync python -m pytest -q tools/ci/tests/test_gate_e_promotion.py -p no:cacheprovider
