name: Post-promotion handoff

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  post-promotion-handoff:
    runs-on: ubuntu-latest
    env:
      PYTHONDONTWRITEBYTECODE: '1'
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Post-promotion handoff validation dependencies
        run: python -m pip install --upgrade pip pytest

      - name: Validate Post-promotion handoff
        run: python tools/ci/validate_post_promotion_handoff.py

      - name: Run Post-promotion handoff validator tests
        run: python -m pytest -q tools/ci/tests/test_post_promotion_handoff.py -p no:cacheprovider
