name: Gate B Surface Closure

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  gate-b-surface-closure:
    runs-on: ubuntu-latest
    env:
      PYTHONDONTWRITEBYTECODE: "1"
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Gate B dependencies
        run: python -m pip install --upgrade pip pytest sqlalchemy aiosqlite "httpx<0.28" pydantic jinja2 uvicorn hypercorn gunicorn typing_extensions

      - name: Compute workspace PYTHONPATH
        shell: bash
        run: |
          set -euo pipefail
          PY_PATH="$GITHUB_WORKSPACE"
          for base in "$GITHUB_WORKSPACE/pkgs/core" "$GITHUB_WORKSPACE/pkgs/apps" "$GITHUB_WORKSPACE/pkgs/engines"; do
            if [[ -d "$base" ]]; then
              for child in "$base"/*; do
                [[ -d "$child" ]] || continue
                PY_PATH="$PY_PATH:$child"
                if [[ -d "$child/src" ]]; then
                  PY_PATH="$PY_PATH:$child/src"
                fi
              done
            fi
          done
          PY_PATH="$PY_PATH:$GITHUB_WORKSPACE/pkgs/core/tigrbl_runtime"
          echo "PYTHONPATH=$PY_PATH" >> "$GITHUB_ENV"

      - name: Validate Gate B surface closure
        run: python tools/ci/validate_gate_b_surface_closure.py

      - name: Run Gate B surface tests
        run: >-
          python -m pytest --noconftest -q
          pkgs/core/tigrbl_tests/tests/i9n/test_mountable_openapi_uvicorn.py
          pkgs/core/tigrbl_tests/tests/i9n/test_mountable_swagger_uvicorn.py
          pkgs/core/tigrbl_tests/tests/i9n/test_mountable_openrpc_uvicorn.py
          pkgs/core/tigrbl_tests/tests/i9n/test_mountable_lens_uvicorn.py
          pkgs/core/tigrbl_tests/tests/unit/test_operator_surface_closure.py
          pkgs/core/tigrbl_tests/tests/unit/test_operator_surface_docs_parity.py
          pkgs/core/tigrbl_tests/tests/unit/test_cli_cmds.py
          pkgs/core/tigrbl_tests/tests/unit/test_cli_srv.py
          tools/ci/tests/test_gate_b_surface_closure.py
          -p no:cacheprovider
