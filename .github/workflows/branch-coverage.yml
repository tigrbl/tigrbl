name: Branch Coverage

on:
  push:
    branches:
      - master
      - main
      - release/**
  pull_request:
  workflow_dispatch:
    inputs:
      pytest_filter:
        description: "Optional pytest -k expression. Default excludes perf tests."
        required: false
        default: "not perf"
      fail_under:
        description: "Optional branch coverage threshold. 0 disables fail-under."
        required: false
        default: "0"
  workflow_call:
    inputs:
      pytest_filter:
        description: "Optional pytest -k expression. Default excludes perf tests."
        required: false
        type: string
        default: "not perf"
      fail_under:
        description: "Optional branch coverage threshold. 0 disables fail-under."
        required: false
        type: string
        default: "0"

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  branch-coverage:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
    env:
      PYTHONDONTWRITEBYTECODE: "1"
      PYTEST_FILTER: ${{ inputs.pytest_filter || 'not perf' }}
      COVERAGE_FAIL_UNDER: ${{ inputs.fail_under || '0' }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install workspace dev dependencies
        run: |
          python -m pip install --upgrade pip uv
          uv sync --all-groups --no-install-workspace --frozen

      - name: Compute workspace PYTHONPATH
        shell: bash
        run: |
          set -euo pipefail
          PY_PATH="$GITHUB_WORKSPACE"
          for base in "$GITHUB_WORKSPACE/pkgs/core" "$GITHUB_WORKSPACE/pkgs/apps" "$GITHUB_WORKSPACE/pkgs/engines"; do
            if [[ -d "$base" ]]; then
              for child in "$base"/*; do
                [[ -d "$child" ]] || continue
                PY_PATH="$PY_PATH:$child"
                if [[ -d "$child/src" ]]; then
                  PY_PATH="$PY_PATH:$child/src"
                fi
              done
            fi
          done
          PY_PATH="$PY_PATH:$GITHUB_WORKSPACE/pkgs/core/tigrbl_runtime"
          echo "PYTHONPATH=$PY_PATH" >> "$GITHUB_ENV"

      - name: Run branch coverage
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p .tmp .uv-cache .uv-pytest-tigrbl-tests htmlcov
          export UV_CACHE_DIR="${GITHUB_WORKSPACE}/.uv-cache"
          export TMPDIR="${GITHUB_WORKSPACE}/.tmp"
          export TEMP="${GITHUB_WORKSPACE}/.tmp"
          export TMP="${GITHUB_WORKSPACE}/.tmp"
          uv pip install --no-deps -e pkgs/core/tigrbl -e pkgs/core/tigrbl_runtime
          COVERAGE_ARGS=()
          if [[ "${COVERAGE_FAIL_UNDER}" != "0" ]]; then
            COVERAGE_ARGS+=(--cov-fail-under="${COVERAGE_FAIL_UNDER}")
          fi
          uv run --with pytest-cov --no-sync python -m pytest -q \
            pkgs/core/tigrbl_tests \
            -k "${PYTEST_FILTER}" \
            --cov \
            --cov-branch \
            --cov-report "term-missing:skip-covered" \
            --cov-report "xml:coverage.xml" \
            --cov-report "html:htmlcov" \
            -p no:cacheprovider \
            --basetemp .uv-pytest-tigrbl-tests \
            "${COVERAGE_ARGS[@]}"

      - name: Append coverage artifact note
        if: always()
        shell: bash
        run: |
          {
            echo "## Branch Coverage"
            echo
            echo "- Pytest filter: \`${PYTEST_FILTER}\`"
            echo "- XML report: \`coverage.xml\`"
            echo "- HTML report: \`htmlcov/index.html\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload coverage artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: branch-coverage
          path: |
            coverage.xml
            htmlcov/**
