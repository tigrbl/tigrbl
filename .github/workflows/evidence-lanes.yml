name: Evidence Lanes

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  evidence-lane:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - lane: unit
            cmd: >-
              python -m pytest --noconftest -q
              pkgs/core/tigrbl_tests/tests/unit/test_spec_snapshots.py
              pkgs/core/tigrbl_tests/tests/unit/test_cli_cmds.py
              tools/ci/tests/test_evidence_registry.py
              -p no:cacheprovider
          - lane: integration
            cmd: >-
              python -m pytest --noconftest -q
              pkgs/core/tigrbl_tests/tests/i9n/test_mountable_openapi_uvicorn.py
              pkgs/core/tigrbl_tests/tests/i9n/test_mountable_openrpc_uvicorn.py
              -p no:cacheprovider
          - lane: spec-conformance
            cmd: >-
              python -m pytest --noconftest -q
              pkgs/core/tigrbl_tests/tests/unit/test_spec_snapshots.py
              pkgs/core/tigrbl_tests/tests/unit/test_openapi_documentation_security_behavior.py
              pkgs/core/tigrbl_tests/tests/unit/test_openrpc_documentation_security_behavior.py
              pkgs/core/tigrbl_tests/tests/unit/test_docs_security_parity.py
              pkgs/core/tigrbl_tests/tests/unit/test_jsonrpc_openrpc.py
              -p no:cacheprovider
          - lane: security-negative
            cmd: >-
              python -m pytest --noconftest -q
              pkgs/core/tigrbl_tests/tests/security/test_schemes.py
              tools/ci/tests/test_http_auth_challenges.py
              pkgs/core/tigrbl_tests/tests/unit/test_authorize_runtime_secdep.py
              -p no:cacheprovider
          - lane: docs-ui-smoke
            cmd: >-
              python -m pytest --noconftest -q
              pkgs/core/tigrbl_tests/tests/i9n/test_mountable_openapi_uvicorn.py
              pkgs/core/tigrbl_tests/tests/i9n/test_mountable_swagger_uvicorn.py
              pkgs/core/tigrbl_tests/tests/i9n/test_mountable_openrpc_uvicorn.py
              pkgs/core/tigrbl_tests/tests/i9n/test_mountable_lens_uvicorn.py
              pkgs/core/tigrbl_tests/tests/unit/test_operator_surface_docs_parity.py
              -p no:cacheprovider
          - lane: cli-smoke
            cmd: >-
              python -m pytest --noconftest -q
              pkgs/core/tigrbl_tests/tests/unit/test_cli_cmds.py
              pkgs/core/tigrbl_tests/tests/unit/test_cli_srv.py
              -p no:cacheprovider
          - lane: operator-surface-smoke
            cmd: >-
              python -m pytest --noconftest -q
              pkgs/core/tigrbl_tests/tests/unit/test_operator_surface_closure.py
              pkgs/core/tigrbl_tests/tests/unit/test_operator_surface_docs_parity.py
              -p no:cacheprovider
          - lane: server-compat-smoke
            cmd: >-
              python -m pytest --noconftest -q
              pkgs/core/tigrbl_tests/tests/unit/test_cli_srv.py
              -p no:cacheprovider
          - lane: clean-room-package
            cmd: >-
              python tools/conformance/clean_room_package_smoke.py
          - lane: next-target-datatypes
            cmd: >-
              python -m pytest --noconftest -q
              pkgs/core/tigrbl_core/tests/test_semantic_datatype_core.py
              pkgs/core/tigrbl_core/tests/test_column_datatype_integration.py
              pkgs/core/tigrbl_core/tests/test_adapter_registry_contract.py
              pkgs/core/tigrbl_core/tests/test_engine_bridge_lowering.py
              pkgs/core/tigrbl_core/tests/test_reflection_roundtrip_recovery.py
              pkgs/core/tigrbl_core/tests/test_engine_family_alignment.py
              pkgs/core/tigrbl_core/tests/test_table_portability_contract.py
              pkgs/core/tigrbl_core/tests/test_schema_roundtrip_recovery.py
              pkgs/core/tigrbl_base/tests/test_column_datatype_lowering.py
              pkgs/core/tigrbl_client/tests/unit/test_tigrbl_nested_crud.py
              -p no:cacheprovider
    env:
      PYTHONDONTWRITEBYTECODE: '1'
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install evidence-lane dependencies
        run: python -m pip install --upgrade pip pytest sqlalchemy aiosqlite "httpx<0.28" pydantic jinja2 uvicorn hypercorn gunicorn typing_extensions build poetry-core

      - name: Compute workspace PYTHONPATH
        shell: bash
        run: |
          set -euo pipefail
          PY_PATH="$GITHUB_WORKSPACE"
          for base in "$GITHUB_WORKSPACE/pkgs/core" "$GITHUB_WORKSPACE/pkgs/apps" "$GITHUB_WORKSPACE/pkgs/engines"; do
            if [[ -d "$base" ]]; then
              for child in "$base"/*; do
                [[ -d "$child" ]] || continue
                PY_PATH="$PY_PATH:$child"
                if [[ -d "$child/src" ]]; then
                  PY_PATH="$PY_PATH:$child/src"
                fi
              done
            fi
          done
          PY_PATH="$PY_PATH:$GITHUB_WORKSPACE/pkgs/core/tigrbl_runtime"
          echo "PYTHONPATH=$PY_PATH" >> "$GITHUB_ENV"

      - name: Run ${{ matrix.lane }} lane
        shell: bash
        run: ${{ matrix.cmd }}
