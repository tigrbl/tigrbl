name: Gate D Reproducibility

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  gate-d-reproducibility:
    runs-on: ubuntu-latest
    env:
      PYTHONDONTWRITEBYTECODE: '1'
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Gate D dependencies
        run: python -m pip install --upgrade pip pytest build poetry-core

      - name: Run Gate D package and installed-package smokes
        run: |
          python tools/conformance/clean_room_package_smoke.py --manifest-out docs/conformance/dev/0.3.18.dev1/artifacts/clean-room-package-manifest.json
          python tools/conformance/installed_package_smoke.py --manifest-out docs/conformance/dev/0.3.18.dev1/artifacts/installed-package-smoke-manifest.json

      - name: Validate Gate D reproducibility closure
        run: python tools/ci/validate_gate_d_reproducibility.py

      - name: Run Gate D validator tests
        run: python -m pytest -q tools/ci/tests/test_gate_d_reproducibility.py -p no:cacheprovider
