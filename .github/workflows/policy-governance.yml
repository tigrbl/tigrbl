name: Policy Governance

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  validate-policy:
    runs-on: ubuntu-latest
    env:
      PYTHONDONTWRITEBYTECODE: '1'
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install workspace dev dependencies
        run: |
          python -m pip install --upgrade pip uv
          uv sync --all-groups --no-install-workspace --frozen

      - name: Resolve Gate A diff range
        shell: bash
        run: |
          set -euo pipefail
          RANGE=""
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            git fetch origin "${{ github.base_ref }}" --depth=1
            BASE_COMMIT="$(git merge-base HEAD "origin/${{ github.base_ref }}")"
            RANGE="${BASE_COMMIT}..HEAD"
          elif git rev-parse --verify HEAD~1 >/dev/null 2>&1; then
            RANGE="HEAD~1..HEAD"
          fi
          echo "GATE_A_DIFF_RANGE=${RANGE}" >> "$GITHUB_ENV"

      - name: Validate policy governance
        id: validate-policy-governance
        continue-on-error: true
        run: uv run --no-sync python tools/ci/fix_policy_governance.py --mode check

      - name: Auto-fix policy governance drift
        if: ${{ steps.validate-policy-governance.outcome == 'failure' }}
        run: uv run --no-sync python tools/ci/fix_policy_governance.py --mode fix

      - name: Revalidate policy governance
        if: ${{ steps.validate-policy-governance.outcome == 'failure' }}
        id: revalidate-policy-governance
        continue-on-error: true
        run: uv run --no-sync python tools/ci/fix_policy_governance.py --mode check

      - name: Fail when policy governance validation stays broken
        if: >-
          ${{ steps.validate-policy-governance.outcome == 'failure' &&
              steps.revalidate-policy-governance.outcome == 'failure' }}
        run: |
          echo "Policy governance validation failed and auto-fix did not recover."
          exit 1

      - name: Run governance and evidence pytest coverage
        if: >-
          ${{ steps.validate-policy-governance.outcome == 'success' ||
              steps.revalidate-policy-governance.outcome == 'success' }}
        run: |
          mkdir -p .tmp .uv-cache .uv-pytest-tigrbl-tests
          export UV_CACHE_DIR="${GITHUB_WORKSPACE}/.uv-cache"
          export TMPDIR="${GITHUB_WORKSPACE}/.tmp"
          export TEMP="${GITHUB_WORKSPACE}/.tmp"
          export TMP="${GITHUB_WORKSPACE}/.tmp"
          uv run --no-sync python -m pytest -q tools/ci/tests/test_governance_validators.py tools/ci/tests/test_path_length_policy.py tools/ci/tests/test_http_auth_challenges.py tools/ci/tests/test_evidence_registry.py tools/ci/tests/test_certification_tree.py tools/ci/tests/test_ssot_authority_model.py tools/ci/tests/test_declared_surface.py tools/ci/tests/test_rust_parity.py tools/ci/tests/test_tigrcorn_operator_surface.py tools/ci/tests/test_tigrcorn_hardening.py tools/ci/tests/test_claim_lifecycle.py tools/ci/tests/test_gate_b_surface_closure.py tools/ci/tests/test_gate_c_conformance_security.py tools/ci/tests/test_gate_d_reproducibility.py tools/ci/tests/test_gate_e_promotion.py tools/ci/tests/test_post_promotion_handoff.py -p no:cacheprovider --basetemp .uv-pytest-tigrbl-tests

      - name: Run tigrbl_tests gate
        if: >-
          ${{ steps.validate-policy-governance.outcome == 'success' ||
              steps.revalidate-policy-governance.outcome == 'success' }}
        run: |
          mkdir -p .tmp .uv-cache .uv-pytest-tigrbl-tests
          export UV_CACHE_DIR="${GITHUB_WORKSPACE}/.uv-cache"
          export TMPDIR="${GITHUB_WORKSPACE}/.tmp"
          export TEMP="${GITHUB_WORKSPACE}/.tmp"
          export TMP="${GITHUB_WORKSPACE}/.tmp"
          uv run --no-sync python -m pytest -q pkgs/core/tigrbl_tests/tests -p no:cacheprovider --basetemp .uv-pytest-tigrbl-tests
