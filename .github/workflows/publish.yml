name: Publish Packages

on:
  workflow_dispatch:
    inputs:
      gh:
        description: Create GitHub releases and auto-tags
        required: true
        type: boolean
        default: true
      pypi:
        description: Publish selected Tigrbl Python packages to PyPI
        required: true
        type: boolean
        default: false
      crates:
        description: Publish selected Tigrbl Rust crates to crates.io
        required: true
        type: boolean
        default: false
      packages:
        description: Comma-separated package names to release, or all
        required: true
        type: string
        default: all
      semver:
        description: Version action
        required: true
        type: choice
        default: patch
        options:
          - minor
          - patch
          - dev
          - finalize

permissions:
  contents: write
  id-token: write

concurrency:
  group: publish-packages-${{ github.ref }}
  cancel-in-progress: false

jobs:
  gate-b-surface-closure:
    name: Gate B Surface Closure
    uses: ./.github/workflows/gate-b-surface-closure.yml

  gate-c-conformance-security:
    name: Gate C Conformance Security
    uses: ./.github/workflows/gate-c-conformance-security.yml

  gate-d-reproducibility:
    name: Gate D Reproducibility
    uses: ./.github/workflows/gate-d-reproducibility.yml

  gate-e-promotion:
    name: Gate E Promotion
    uses: ./.github/workflows/gate-e-promotion.yml

  prepare-release:
    name: Prepare release versions
    runs-on: ubuntu-latest
    needs:
      - gate-b-surface-closure
      - gate-c-conformance-security
      - gate-d-reproducibility
      - gate-e-promotion
    if: >-
      ${{
        needs.gate-b-surface-closure.result == 'success' &&
        needs.gate-c-conformance-security.result == 'success' &&
        needs.gate-d-reproducibility.result == 'success' &&
        needs.gate-e-promotion.result == 'success'
      }}
    outputs:
      commit_sha: ${{ steps.commit.outputs.commit_sha }}
      has_python: ${{ steps.matrices.outputs.has_python }}
      has_crates: ${{ steps.matrices.outputs.has_crates }}
      python_validation_matrix: ${{ steps.matrices.outputs.python_validation_matrix }}
      python_build_matrix: ${{ steps.matrices.outputs.python_build_matrix }}
    steps:
      - name: Validate target selection
        if: ${{ !inputs.gh && !inputs.pypi && !inputs.crates }}
        run: |
          echo "Select at least one publish target: gh, pypi, or crates." >&2
          exit 1

      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Compute and apply version plan
        run: >-
          python tools/release/release_automation.py bump
          --semver "${{ inputs.semver }}"
          --packages "${{ inputs.packages }}"
          --summary release-plan.json
          --write

      - name: Validate release targets are new
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          targets=()
          if [[ "${{ inputs.gh }}" == "true" ]]; then
            targets+=(--github)
          fi
          if [[ "${{ inputs.pypi }}" == "true" ]]; then
            targets+=(--pypi)
          fi
          if [[ "${{ inputs.crates }}" == "true" ]]; then
            targets+=(--crates)
          fi
          python tools/release/release_automation.py validate-release-targets \
            --summary release-plan.json \
            "${targets[@]}"

      - name: Refresh Rust lockfile
        run: cargo generate-lockfile

      - name: Commit version updates
        id: commit
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          planned_changes="$(python - <<'PY'
          import json

          with open("release-plan.json", encoding="utf-8") as handle:
              plan = json.load(handle)
          print(len(plan.get("changed_files", [])))
          PY
          )"
          echo "Release plan changed files: ${planned_changes}"
          git status --short

          commit_created=false
          if ! git diff --quiet; then
            git add Cargo.toml Cargo.lock pkgs crates
            if ! git diff --cached --quiet; then
              git commit -m "release: prepare ${{ inputs.semver }} package versions"
              commit_created=true
              git push origin HEAD:${{ github.ref_name }}
            fi
          fi

          commit_sha="$(git rev-parse HEAD)"
          if [[ "${planned_changes}" -gt 0 && "${commit_created}" != "true" ]]; then
            echo "Release plan expected version changes, but no semver bump commit was created." >&2
            exit 1
          fi

          git fetch origin "${{ github.ref_name }}"
          remote_sha="$(git rev-parse "origin/${{ github.ref_name }}")"
          if [[ "${remote_sha}" != "${commit_sha}" ]]; then
            echo "Prepared release commit was not pushed to origin/${{ github.ref_name }}." >&2
            echo "prepared=${commit_sha}" >&2
            echo "remote=${remote_sha}" >&2
            exit 1
          fi

          echo "Prepared release commit: ${commit_sha}"
          echo "Remote origin/${{ github.ref_name }} verified at ${remote_sha}"
          echo "commit_sha=${commit_sha}" >> "$GITHUB_OUTPUT"

          PREPARED_COMMIT="${commit_sha}" \
          REMOTE_SHA="${remote_sha}" \
          COMMIT_CREATED="${commit_created}" \
          RELEASE_REF="${{ github.ref_name }}" \
          python - <<'PY'
          import json
          import os

          with open("release-plan.json", encoding="utf-8") as handle:
              plan = json.load(handle)

          with open(os.environ["GITHUB_STEP_SUMMARY"], "a", encoding="utf-8") as summary:
              summary.write("### Prepared release commit\n")
              summary.write(f"- Branch: `{os.environ['RELEASE_REF']}`\n")
              summary.write(f"- Commit: `{os.environ['PREPARED_COMMIT']}`\n")
              summary.write(f"- Remote verified: `{os.environ['REMOTE_SHA']}`\n")
              summary.write(f"- Commit created: `{os.environ['COMMIT_CREATED']}`\n\n")
              summary.write("### Version plan\n")
              for kind, releases in (("pypi", plan.get("python", [])), ("crate", plan.get("crates", []))):
                  for release in releases:
                      summary.write(
                          f"- {release['name']}: {release['old_version']} -> "
                          f"{release['version']} ({kind})\n"
                      )
          PY

      - name: Generate release matrices
        id: matrices
        run: >-
          python tools/release/release_automation.py github-matrices
          --summary release-plan.json
          --github-output "$GITHUB_OUTPUT"

      - name: Upload release plan
        uses: actions/upload-artifact@v4
        with:
          name: release-plan
          path: release-plan.json

  resolve-rust-toolchains:
    name: Resolve latest Rust toolchains
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.resolve.outputs.matrix }}
    steps:
      - name: Resolve latest three stable Rust releases
        id: resolve
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          import os
          import re
          import urllib.request

          request = urllib.request.Request(
              "https://api.github.com/repos/rust-lang/rust/releases?per_page=100",
              headers={
                  "Accept": "application/vnd.github+json",
                  "Authorization": f"Bearer {os.environ['GH_TOKEN']}",
                  "X-GitHub-Api-Version": "2022-11-28",
              },
          )
          releases = json.load(urllib.request.urlopen(request, timeout=30))
          versions = {}
          for release in releases:
              tag = release.get("tag_name", "")
              match = re.fullmatch(r"(\d+)\.(\d+)\.(\d+)", tag)
              if not match:
                  continue
              version = tuple(int(part) for part in match.groups())
              series = version[:2]
              if series not in versions or version > versions[series]:
                  versions[series] = version

          latest = sorted(versions.values(), reverse=True)[:3]
          if len(latest) != 3:
              raise SystemExit("failed to resolve three Rust stable releases")
          matrix = {"toolchain": [".".join(map(str, version)) for version in latest]}
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as out:
              out.write(f"matrix={json.dumps(matrix, separators=(',', ':'))}\n")
          PY

  validate-python-packages:
    name: Validate Python package (${{ matrix.package }})
    if: ${{ needs.prepare-release.outputs.has_python == 'true' }}
    runs-on: ubuntu-latest
    needs:
      - prepare-release
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.prepare-release.outputs.python_validation_matrix) }}
    env:
      PYTHONDONTWRITEBYTECODE: "1"
    steps:
      - name: Check out prepared release commit
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare-release.outputs.commit_sha }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: python -m pip install --upgrade pip uv

      - name: Build package in isolation
        run: >-
          uv build
          --package "${{ matrix.package }}"
          --out-dir "dist/${{ matrix.package }}"

      - name: Test package in isolated uv environment (Python 3.10)
        shell: bash
        run: |
          set -euo pipefail
          package_dir="${{ matrix.path }}"
          package_dir="${package_dir%/pyproject.toml}"
          if [[ ! -d "${package_dir}/tests" ]]; then
            echo "No package-local tests found at ${package_dir}/tests"
            exit 0
          fi
          uv run \
            --isolated \
            --package "${{ matrix.package }}" \
            --group dev \
            --frozen \
            --python "3.10" \
            python -m pytest "${package_dir}/tests"

      - name: Test package in isolated uv environment (Python 3.11)
        shell: bash
        run: |
          set -euo pipefail
          package_dir="${{ matrix.path }}"
          package_dir="${package_dir%/pyproject.toml}"
          if [[ ! -d "${package_dir}/tests" ]]; then
            echo "No package-local tests found at ${package_dir}/tests"
            exit 0
          fi
          uv run \
            --isolated \
            --package "${{ matrix.package }}" \
            --group dev \
            --frozen \
            --python "3.11" \
            python -m pytest "${package_dir}/tests"

      - name: Test package in isolated uv environment (Python 3.12)
        shell: bash
        run: |
          set -euo pipefail
          package_dir="${{ matrix.path }}"
          package_dir="${package_dir%/pyproject.toml}"
          if [[ ! -d "${package_dir}/tests" ]]; then
            echo "No package-local tests found at ${package_dir}/tests"
            exit 0
          fi
          uv run \
            --isolated \
            --package "${{ matrix.package }}" \
            --group dev \
            --frozen \
            --python "3.12" \
            python -m pytest "${package_dir}/tests"

      - name: Test package in isolated uv environment (Python 3.13)
        shell: bash
        run: |
          set -euo pipefail
          package_dir="${{ matrix.path }}"
          package_dir="${package_dir%/pyproject.toml}"
          if [[ ! -d "${package_dir}/tests" ]]; then
            echo "No package-local tests found at ${package_dir}/tests"
            exit 0
          fi
          uv run \
            --isolated \
            --package "${{ matrix.package }}" \
            --group dev \
            --frozen \
            --python "3.13" \
            python -m pytest "${package_dir}/tests"

  build-python-packages:
    name: Build Python package (${{ matrix.package }})
    if: ${{ inputs.pypi && needs.prepare-release.outputs.has_python == 'true' }}
    runs-on: ubuntu-latest
    needs:
      - prepare-release
      - validate-python-packages
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.prepare-release.outputs.python_build_matrix) }}
    steps:
      - name: Check out prepared release commit
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare-release.outputs.commit_sha }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: python -m pip install --upgrade pip uv

      - name: Download release plan
        uses: actions/download-artifact@v4
        with:
          name: release-plan
          path: .

      - name: Build selected Python distributions
        run: >-
          uv build
          --package "${{ matrix.package }}"
          --out-dir dist

      - name: Upload selected Python distributions
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/*
          if-no-files-found: error

  validate-rust-crates:
    name: Validate Rust crates (${{ matrix.toolchain }})
    if: ${{ needs.prepare-release.outputs.has_crates == 'true' }}
    runs-on: ubuntu-latest
    needs:
      - prepare-release
      - resolve-rust-toolchains
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.resolve-rust-toolchains.outputs.matrix) }}
    steps:
      - name: Check out prepared release commit
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare-release.outputs.commit_sha }}

      - name: Set up Rust ${{ matrix.toolchain }}
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.toolchain }}

      - name: Test all Rust workspace crates
        run: cargo test --workspace --locked --all-targets

  dry-run-crates:
    name: Dry-run crates.io packages
    if: ${{ inputs.crates && needs.prepare-release.outputs.has_crates == 'true' }}
    runs-on: ubuntu-latest
    needs:
      - prepare-release
      - validate-rust-crates
    steps:
      - name: Check out prepared release commit
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare-release.outputs.commit_sha }}

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Download release plan
        uses: actions/download-artifact@v4
        with:
          name: release-plan
          path: .

      - name: Dry-run crates.io packages
        run: >-
          python tools/release/release_automation.py publish-crates
          --summary release-plan.json
          --dry-run

  github-release:
    name: Create GitHub releases
    if: ${{ inputs.gh && !failure() && !cancelled() }}
    runs-on: ubuntu-latest
    needs:
      - prepare-release
      - validate-python-packages
      - validate-rust-crates
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Check out prepared release commit
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ needs.prepare-release.outputs.commit_sha }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download release plan
        uses: actions/download-artifact@v4
        with:
          name: release-plan
          path: .

      - name: Configure Git tag identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Create tags and GitHub releases
        run: >-
          python tools/release/release_automation.py create-github-releases
          --summary release-plan.json

  publish-pypi:
    name: Publish PyPI package (${{ matrix.package }})
    if: ${{ inputs.pypi && needs.prepare-release.outputs.has_python == 'true' && !failure() && !cancelled() }}
    runs-on: ubuntu-latest
    needs:
      - prepare-release
      - validate-python-packages
      - validate-rust-crates
      - build-python-packages
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.prepare-release.outputs.python_build_matrix) }}
    steps:
      - name: Check out prepared release commit
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare-release.outputs.commit_sha }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: python -m pip install --upgrade pip uv

      - name: Download release plan
        uses: actions/download-artifact@v4
        with:
          name: release-plan
          path: .

      - name: Download selected Python distributions
        uses: actions/download-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist

      - name: Validate PyPI token
        env:
          UV_PUBLISH_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
        run: test -n "${UV_PUBLISH_TOKEN}"

      - name: Publish selected Python packages
        env:
          UV_PUBLISH_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          set -euo pipefail
          shopt -s nullglob
          artifacts=()
          for artifact in dist/*; do
            if [[ "$artifact" == *"linux_x86_64.whl" ]]; then
              echo "Skipping unsupported wheel tag: ${artifact}"
              continue
            fi
            artifacts+=("$artifact")
          done
          if [[ ${#artifacts[@]} -eq 0 ]]; then
            echo "No publishable artifacts found."
            exit 1
          fi
          echo "Selected ${#artifacts[@]} artifact(s) for PyPI publishing:"
          python - "${artifacts[@]}" <<'PY'
          from __future__ import annotations

          import hashlib
          import sys
          from pathlib import Path

          for raw in sys.argv[1:]:
              path = Path(raw)
              digest = hashlib.sha256(path.read_bytes()).hexdigest()
              print(f"- {path} size={path.stat().st_size} sha256={digest}")
          PY

          echo "Running uv publish against https://upload.pypi.org/legacy/"
          set +e
          uv publish --verbose --publish-url https://upload.pypi.org/legacy/ --check-url https://pypi.org/simple/ "${artifacts[@]}"
          publish_status=$?
          set -e
          echo "uv publish exit status: ${publish_status}"
          if [[ "${publish_status}" -ne 0 ]]; then
            echo "PyPI publishing failed."
            exit "${publish_status}"
          fi
          echo "uv publish completed successfully."

          echo "Verifying published artifacts through the PyPI JSON API."
          python - "${artifacts[@]}" <<'PY'
          from __future__ import annotations

          import hashlib
          import json
          import re
          import sys
          import time
          import urllib.error
          import urllib.request
          from pathlib import Path

          def normalize_project(name: str) -> str:
              return re.sub(r"[-_.]+", "-", name).lower()

          def artifact_coordinate(path: Path) -> tuple[str, str]:
              filename = path.name
              if filename.endswith(".whl"):
                  parts = filename.split("-")
                  if len(parts) < 5:
                      raise ValueError(f"cannot parse wheel filename: {filename}")
                  return normalize_project(parts[0]), parts[1]
              if filename.endswith(".tar.gz"):
                  stem = filename[:-7]
              elif filename.endswith(".zip"):
                  stem = filename[:-4]
              else:
                  raise ValueError(f"unsupported distribution filename: {filename}")
              match = re.match(r"(?P<name>.+)-(?P<version>[0-9][A-Za-z0-9.!+_-]*)$", stem)
              if not match:
                  raise ValueError(f"cannot parse source distribution filename: {filename}")
              return normalize_project(match.group("name")), match.group("version")

          expected: list[tuple[str, str, dict[str, str]]] = []
          for raw in sys.argv[1:]:
              path = Path(raw)
              coordinate = artifact_coordinate(path)
              expected.append(
                  (
                      coordinate[0],
                      coordinate[1],
                      {
                          "filename": path.name,
                          "sha256": hashlib.sha256(path.read_bytes()).hexdigest(),
                      },
                  )
              )

          failures: list[str] = []
          for project, version, artifact in sorted(
              expected,
              key=lambda item: (item[0], item[1], item[2]["filename"]),
          ):
              url = f"https://pypi.org/pypi/{project}/{version}/json"
              print(f"Checking {project} {version}: {url}")
              data = None
              for attempt in range(1, 7):
                  try:
                      with urllib.request.urlopen(url, timeout=30) as response:
                          data = json.loads(response.read().decode("utf-8"))
                      break
                  except urllib.error.HTTPError as exc:
                      if exc.code == 404 and attempt < 6:
                          time.sleep(10)
                          continue
                      failures.append(f"{project} {version}: PyPI JSON lookup failed with HTTP {exc.code}")
                      break
              if data is None:
                  continue
              releases = data.get("urls", [])
              match = next((item for item in releases if item.get("filename") == artifact["filename"]), None)
              if not match:
                  failures.append(f"{project} {version}: missing file {artifact['filename']} in PyPI JSON response")
                  continue
              observed_sha = match.get("digests", {}).get("sha256")
              if observed_sha != artifact["sha256"]:
                  failures.append(
                      f"{project} {version}: sha256 mismatch for {artifact['filename']} "
                      f"expected={artifact['sha256']} observed={observed_sha}"
                  )
                  continue
              print(
                  f"Published {artifact['filename']} "
                  f"size={match.get('size')} sha256={observed_sha} "
                  f"upload_time={match.get('upload_time_iso_8601')}"
              )

          if failures:
              print("PyPI publish verification failed:")
              for failure in failures:
                  print(f"- {failure}")
              raise SystemExit(1)

          print(f"PyPI publish verification passed for {len(expected)} artifact(s).")
          PY

  publish-crates:
    name: Publish crates.io packages
    if: ${{ inputs.crates && needs.prepare-release.outputs.has_crates == 'true' && !failure() && !cancelled() }}
    runs-on: ubuntu-latest
    needs:
      - prepare-release
      - validate-python-packages
      - validate-rust-crates
      - dry-run-crates
    env:
      CARGO_API_TOKEN: ${{ secrets.CRATES_API_TOKEN }}
      CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_API_TOKEN }}
    steps:
      - name: Check out prepared release commit
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare-release.outputs.commit_sha }}

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Download release plan
        uses: actions/download-artifact@v4
        with:
          name: release-plan
          path: .

      - name: Validate crates.io token
        run: test -n "${CARGO_API_TOKEN}"

      - name: Publish crates.io packages
        run: >-
          python tools/release/release_automation.py publish-crates
          --summary release-plan.json
          --skip-dry-run
