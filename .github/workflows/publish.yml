name: Publish Packages

on:
  workflow_dispatch:
    inputs:
      gh:
        description: Create GitHub releases and auto-tags
        required: true
        type: boolean
        default: true
      pypi:
        description: Publish selected Tigrbl Python packages to PyPI
        required: true
        type: boolean
        default: false
      crates:
        description: Publish selected Tigrbl Rust crates to crates.io
        required: true
        type: boolean
        default: false
      packages:
        description: Comma-separated package names to release, or all
        required: true
        type: string
        default: all
      semver:
        description: Version action
        required: true
        type: choice
        default: patch
        options:
          - patch
          - minor
          - major
          - finalize

permissions:
  contents: write
  id-token: write

concurrency:
  group: publish-packages-${{ github.ref }}
  cancel-in-progress: false

jobs:
  prepare-release:
    name: Prepare release versions
    runs-on: ubuntu-latest
    outputs:
      commit_sha: ${{ steps.commit.outputs.commit_sha }}
    steps:
      - name: Validate target selection
        if: ${{ !inputs.gh && !inputs.pypi && !inputs.crates }}
        run: |
          echo "Select at least one publish target: gh, pypi, or crates." >&2
          exit 1

      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Compute and apply version plan
        run: >-
          python tools/release/release_automation.py bump
          --semver "${{ inputs.semver }}"
          --packages "${{ inputs.packages }}"
          --summary release-plan.json
          --write

      - name: Commit version updates
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if ! git diff --quiet; then
            git add Cargo.toml pkgs crates
            git commit -m "release: prepare ${{ inputs.semver }} package versions"
            git push origin HEAD:${{ github.ref_name }}
          fi
          echo "commit_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Upload release plan
        uses: actions/upload-artifact@v4
        with:
          name: release-plan
          path: release-plan.json

  github-release:
    name: Create GitHub releases
    if: ${{ inputs.gh }}
    runs-on: ubuntu-latest
    needs:
      - prepare-release
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Check out prepared release commit
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ needs.prepare-release.outputs.commit_sha }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download release plan
        uses: actions/download-artifact@v4
        with:
          name: release-plan
          path: .

      - name: Configure Git tag identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Create tags and GitHub releases
        run: >-
          python tools/release/release_automation.py create-github-releases
          --summary release-plan.json

  publish-pypi:
    name: Publish PyPI packages
    if: ${{ inputs.pypi }}
    runs-on: ubuntu-latest
    needs:
      - prepare-release
    steps:
      - name: Check out prepared release commit
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare-release.outputs.commit_sha }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: python -m pip install --upgrade pip uv

      - name: Download release plan
        uses: actions/download-artifact@v4
        with:
          name: release-plan
          path: .

      - name: Build selected Python packages
        run: >-
          python tools/release/release_automation.py build-pypi-packages
          --summary release-plan.json
          --out-dir dist

      - name: Publish selected Python packages
        run: >-
          uv publish
          --trusted-publishing automatic
          --check-url https://pypi.org/simple/
          dist/*

  publish-crates:
    name: Publish crates.io packages
    if: ${{ inputs.crates }}
    runs-on: ubuntu-latest
    needs:
      - prepare-release
    env:
      CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_API_TOKEN }}
    steps:
      - name: Check out prepared release commit
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare-release.outputs.commit_sha }}

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Download release plan
        uses: actions/download-artifact@v4
        with:
          name: release-plan
          path: .

      - name: Publish crates.io packages
        run: >-
          python tools/release/release_automation.py publish-crates
          --summary release-plan.json
