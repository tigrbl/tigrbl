name: Publish Packages

on:
  workflow_dispatch:
    inputs:
      gh:
        description: Create GitHub releases and auto-tags
        required: true
        type: boolean
        default: true
      pypi:
        description: Publish selected Tigrbl Python packages to PyPI
        required: true
        type: boolean
        default: false
      packages:
        description: Comma-separated package names to release, or all
        required: true
        type: string
        default: all
      semver:
        description: Version action
        required: true
        type: choice
        default: patch
        options:
          - minor
          - patch
          - dev
          - finalize

permissions:
  contents: write
  id-token: write

concurrency:
  group: publish-packages-${{ github.ref }}
  cancel-in-progress: false

jobs:
  gate-b-surface-closure:
    name: Gate B Surface Closure
    uses: ./.github/workflows/gate-b-surface-closure.yml

  gate-c-conformance-security:
    name: Gate C Conformance Security
    uses: ./.github/workflows/gate-c-conformance-security.yml

  gate-d-reproducibility:
    name: Gate D Reproducibility
    uses: ./.github/workflows/gate-d-reproducibility.yml

  gate-e-promotion:
    name: Gate E Promotion
    uses: ./.github/workflows/gate-e-promotion.yml

  prepare-release:
    name: Prepare release versions
    runs-on: ubuntu-latest
    needs:
      - gate-b-surface-closure
      - gate-c-conformance-security
      - gate-d-reproducibility
      - gate-e-promotion
    if: >-
      ${{
        needs.gate-b-surface-closure.result == 'success' &&
        needs.gate-c-conformance-security.result == 'success' &&
        needs.gate-d-reproducibility.result == 'success' &&
        needs.gate-e-promotion.result == 'success'
      }}
    outputs:
      commit_sha: ${{ steps.commit.outputs.commit_sha }}
      has_python: ${{ steps.matrices.outputs.has_python }}
      has_pypi: ${{ steps.matrices.outputs.has_pypi }}
      python_validation_matrix: ${{ steps.matrices.outputs.python_validation_matrix }}
      python_build_matrix: ${{ steps.matrices.outputs.python_build_matrix }}
    steps:
      - name: Validate target selection
        if: ${{ !inputs.gh && !inputs.pypi }}
        run: |
          echo "Select at least one publish target: gh or pypi." >&2
          exit 1

      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Compute and apply version plan
        run: >-
          python tools/release/release_automation.py bump
          --semver "${{ inputs.semver }}"
          --packages "${{ inputs.packages }}"
          --summary release-plan.json
          --write

      - name: Validate release targets are new
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          targets=()
          if [[ "${{ inputs.gh }}" == "true" ]]; then
            targets+=(--github)
          fi
          if [[ "${{ inputs.pypi }}" == "true" ]]; then
            targets+=(--pypi)
          fi
          python tools/release/release_automation.py validate-release-targets \
            --summary release-plan.json \
            "${targets[@]}"

      - name: Commit version updates
        id: commit
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          planned_changes="$(python - <<'PY'
          import json

          with open("release-plan.json", encoding="utf-8") as handle:
              plan = json.load(handle)
          print(len(plan.get("changed_files", [])))
          PY
          )"
          echo "Release plan changed files: ${planned_changes}"
          git status --short

          commit_created=false
          if ! git diff --quiet; then
            stage_paths=(pkgs)
            git add "${stage_paths[@]}"
            if ! git diff --cached --quiet; then
              git commit -m "release: prepare ${{ inputs.semver }} package versions"
              commit_created=true
              git push origin HEAD:${{ github.ref_name }}
            fi
          fi

          commit_sha="$(git rev-parse HEAD)"
          if [[ "${planned_changes}" -gt 0 && "${commit_created}" != "true" ]]; then
            echo "Release plan expected version changes, but no semver bump commit was created." >&2
            exit 1
          fi

          git fetch origin "${{ github.ref_name }}"
          remote_sha="$(git rev-parse "origin/${{ github.ref_name }}")"
          if [[ "${remote_sha}" != "${commit_sha}" ]]; then
            echo "Prepared release commit was not pushed to origin/${{ github.ref_name }}." >&2
            echo "prepared=${commit_sha}" >&2
            echo "remote=${remote_sha}" >&2
            exit 1
          fi

          echo "Prepared release commit: ${commit_sha}"
          echo "Remote origin/${{ github.ref_name }} verified at ${remote_sha}"
          echo "commit_sha=${commit_sha}" >> "$GITHUB_OUTPUT"

          PREPARED_COMMIT="${commit_sha}" \
          REMOTE_SHA="${remote_sha}" \
          COMMIT_CREATED="${commit_created}" \
          RELEASE_REF="${{ github.ref_name }}" \
          python - <<'PY'
          import json
          import os

          with open("release-plan.json", encoding="utf-8") as handle:
              plan = json.load(handle)

          with open(os.environ["GITHUB_STEP_SUMMARY"], "a", encoding="utf-8") as summary:
              summary.write("### Prepared release commit\n")
              summary.write(f"- Branch: `{os.environ['RELEASE_REF']}`\n")
              summary.write(f"- Commit: `{os.environ['PREPARED_COMMIT']}`\n")
              summary.write(f"- Remote verified: `{os.environ['REMOTE_SHA']}`\n")
              summary.write(f"- Commit created: `{os.environ['COMMIT_CREATED']}`\n\n")
              summary.write("### Version plan\n")
              pypi_packages = {release["name"] for release in plan.get("pypi", [])}
              for release in plan.get("python", []):
                  target = "pypi" if release["name"] in pypi_packages else "github-only"
                  summary.write(
                      f"- {release['name']}: {release['old_version']} -> "
                      f"{release['version']} ({target})\n"
                  )
              skipped = plan.get("pypi_skipped", [])
              if skipped:
                  summary.write("\n### PyPI publish exclusions\n")
                  for release in skipped:
                      summary.write(
                          f"- {release['name']} {release['version']}: "
                          f"{release['reason']}\n"
                      )
          PY

      - name: Generate release matrices
        id: matrices
        run: >-
          python tools/release/release_automation.py github-matrices
          --summary release-plan.json
          --github-output "$GITHUB_OUTPUT"

      - name: Upload release plan
        uses: actions/upload-artifact@v4
        with:
          name: release-plan
          path: release-plan.json

  ssot-release-closure:
    name: Refresh and publish SSOT release closure
    runs-on: ubuntu-latest
    needs:
      - prepare-release
    outputs:
      commit_sha: ${{ steps.commit.outputs.commit_sha }}
      release_id: ${{ steps.ssot.outputs.release_id }}
      boundary_id: ${{ steps.ssot.outputs.boundary_id }}
    steps:
      - name: Check out prepared release commit
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ needs.prepare-release.outputs.commit_sha }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: python -m pip install --upgrade pip uv

      - name: Download release plan
        uses: actions/download-artifact@v4
        with:
          name: release-plan
          path: .

      - name: Refresh SSOT proof chain
        id: ssot
        run: >-
          uv run python tools/release/ssot_release_closure.py
          --summary release-plan.json
          --prepared-commit "${{ needs.prepare-release.outputs.commit_sha }}"
          --write
          --github-output "$GITHUB_OUTPUT"

      - name: Validate SSOT registry before progression
        run: uv run ssot validate . --write-report

      - name: Synchronize SSOT statuses
        run: |
          uv run ssot registry sync-statuses . --dry-run
          uv run ssot registry sync-statuses .

      - name: Certify SSOT release
        if: ${{ steps.ssot.outputs.already_published != 'true' }}
        run: >-
          uv run ssot release certify .
          --release-id "${{ steps.ssot.outputs.release_id }}"
          --write-report

      - name: Promote SSOT release
        if: ${{ steps.ssot.outputs.already_published != 'true' }}
        run: >-
          uv run ssot release promote .
          --release-id "${{ steps.ssot.outputs.release_id }}"

      - name: Publish SSOT release
        if: ${{ steps.ssot.outputs.already_published != 'true' }}
        run: >-
          uv run ssot release publish .
          --release-id "${{ steps.ssot.outputs.release_id }}"

      - name: Validate and export SSOT closure
        run: |
          uv run ssot registry sync-statuses .
          uv run ssot validate . --write-report
          uv run ssot registry export . --format json --output .ssot/exports/registry-current.json
          uv run ssot graph export . --format json --output .ssot/exports/graph-current.json

      - name: Commit SSOT release closure
        id: commit
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          commit_created=false
          git status --short
          if [[ -n "$(git status --porcelain .ssot)" ]]; then
            git add .ssot
            if ! git diff --cached --quiet; then
              git commit -m "release: publish SSOT closure ${{ steps.ssot.outputs.release_id }}"
              commit_created=true
              git push origin HEAD:${{ github.ref_name }}
            fi
          fi

          commit_sha="$(git rev-parse HEAD)"
          git fetch origin "${{ github.ref_name }}"
          remote_sha="$(git rev-parse "origin/${{ github.ref_name }}")"
          if [[ "${remote_sha}" != "${commit_sha}" ]]; then
            echo "SSOT release closure commit was not pushed to origin/${{ github.ref_name }}." >&2
            echo "closure=${commit_sha}" >&2
            echo "remote=${remote_sha}" >&2
            exit 1
          fi

          {
            echo "### SSOT release closure"
            echo "- Release: \`${{ steps.ssot.outputs.release_id }}\`"
            echo "- Boundary: \`${{ steps.ssot.outputs.boundary_id }}\`"
            echo "- Commit: \`${commit_sha}\`"
            echo "- Remote verified: \`${remote_sha}\`"
            echo "- Commit created: \`${commit_created}\`"
          } >> "$GITHUB_STEP_SUMMARY"

          echo "commit_sha=${commit_sha}" >> "$GITHUB_OUTPUT"

  validate-python-packages:
    name: Validate Python package (${{ matrix.package }})
    if: ${{ needs.prepare-release.outputs.has_python == 'true' }}
    runs-on: ubuntu-latest
    needs:
      - prepare-release
      - ssot-release-closure
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.prepare-release.outputs.python_validation_matrix) }}
    env:
      PYTHONDONTWRITEBYTECODE: "1"
    steps:
      - name: Check out prepared release commit
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.ssot-release-closure.outputs.commit_sha }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: python -m pip install --upgrade pip uv

      - name: Build package in isolation
        run: >-
          uv build
          --package "${{ matrix.package }}"
          --out-dir "dist/${{ matrix.package }}"

      - name: Test package in isolated uv environments
        shell: bash
        run: |
          set -euo pipefail
          package_dir="${{ matrix.path }}"
          package_dir="${package_dir%/pyproject.toml}"
          if [[ ! -d "${package_dir}/tests" ]]; then
            echo "No package-local tests found at ${package_dir}/tests"
            exit 0
          fi

          for version in 3.10 3.11 3.12 3.13 3.14; do
            echo "Running ${package_dir}/tests under Python ${version}"
            uv run \
              --isolated \
              --package "${{ matrix.package }}" \
              --group dev \
              --frozen \
              --python "${version}" \
              python -m pytest "${package_dir}/tests"
          done

  build-python-packages:
    name: Build Python package (${{ matrix.package }})
    if: ${{ inputs.pypi && needs.prepare-release.outputs.has_pypi == 'true' }}
    runs-on: ubuntu-latest
    needs:
      - prepare-release
      - ssot-release-closure
      - validate-python-packages
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.prepare-release.outputs.python_build_matrix) }}
    steps:
      - name: Check out prepared release commit
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.ssot-release-closure.outputs.commit_sha }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: python -m pip install --upgrade pip uv

      - name: Download release plan
        uses: actions/download-artifact@v4
        with:
          name: release-plan
          path: .

      - name: Build selected Python distributions
        run: >-
          uv build
          --package "${{ matrix.package }}"
          --out-dir dist

      - name: Upload selected Python distributions
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/*
          if-no-files-found: error

  github-release:
    name: Create GitHub releases
    if: ${{ inputs.gh && !failure() && !cancelled() }}
    runs-on: ubuntu-latest
    needs:
      - prepare-release
      - ssot-release-closure
      - validate-python-packages
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Check out prepared release commit
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ needs.ssot-release-closure.outputs.commit_sha }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download release plan
        uses: actions/download-artifact@v4
        with:
          name: release-plan
          path: .

      - name: Configure Git tag identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Create tags and GitHub releases
        run: >-
          python tools/release/release_automation.py create-github-releases
          --summary release-plan.json

  publish-pypi:
    name: Publish PyPI package (${{ matrix.package }})
    if: ${{ inputs.pypi && needs.prepare-release.outputs.has_pypi == 'true' && !failure() && !cancelled() }}
    runs-on: ubuntu-latest
    needs:
      - prepare-release
      - ssot-release-closure
      - validate-python-packages
      - build-python-packages
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.prepare-release.outputs.python_build_matrix) }}
    steps:
      - name: Check out prepared release commit
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.ssot-release-closure.outputs.commit_sha }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: python -m pip install --upgrade pip uv

      - name: Download release plan
        uses: actions/download-artifact@v4
        with:
          name: release-plan
          path: .

      - name: Download selected Python distributions
        uses: actions/download-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist

      - name: Select publishable Python distributions
        run: |
          set -euo pipefail
          shopt -s nullglob
          rm -rf .publish-python
          mkdir -p .publish-python
          artifacts=()
          for artifact in dist/*; do
            [[ -f "$artifact" ]] || continue
            if [[ "$artifact" == *"linux_x86_64.whl" ]]; then
              echo "Skipping unsupported wheel tag: ${artifact}"
              continue
            fi
            artifacts+=("$artifact")
            cp "$artifact" .publish-python/
          done
          if [[ ${#artifacts[@]} -eq 0 ]]; then
            echo "No publishable artifacts found."
            exit 1
          fi
          echo "Selected ${#artifacts[@]} artifact(s) for PyPI publishing:"
          python - "${artifacts[@]}" <<'PY'
          from __future__ import annotations

          import hashlib
          import sys
          from pathlib import Path

          for raw in sys.argv[1:]:
              path = Path(raw)
              digest = hashlib.sha256(path.read_bytes()).hexdigest()
              print(f"- {path} size={path.stat().st_size} sha256={digest}")
          PY

      - name: Publish selected Python packages with trusted publishing
        uses: cobycloud/actions/actions/pypi-publish@main
        with:
          publish-mode: trusted
          packages-dir: .publish-python
          repository-url: https://upload.pypi.org/legacy/
          skip-existing: "true"

      - name: Verify selected Python packages on PyPI
        run: |
          set -euo pipefail
          shopt -s nullglob
          artifacts=(.publish-python/*)
          echo "Verifying published artifacts through the PyPI JSON API."
          python - "${artifacts[@]}" <<'PY'
          from __future__ import annotations

          import hashlib
          import json
          import re
          import sys
          import time
          import urllib.error
          import urllib.request
          from pathlib import Path

          def normalize_project(name: str) -> str:
              return re.sub(r"[-_.]+", "-", name).lower()

          def artifact_coordinate(path: Path) -> tuple[str, str]:
              filename = path.name
              if filename.endswith(".whl"):
                  parts = filename.split("-")
                  if len(parts) < 5:
                      raise ValueError(f"cannot parse wheel filename: {filename}")
                  return normalize_project(parts[0]), parts[1]
              if filename.endswith(".tar.gz"):
                  stem = filename[:-7]
              elif filename.endswith(".zip"):
                  stem = filename[:-4]
              else:
                  raise ValueError(f"unsupported distribution filename: {filename}")
              match = re.match(r"(?P<name>.+)-(?P<version>[0-9][A-Za-z0-9.!+_-]*)$", stem)
              if not match:
                  raise ValueError(f"cannot parse source distribution filename: {filename}")
              return normalize_project(match.group("name")), match.group("version")

          expected: list[tuple[str, str, dict[str, str]]] = []
          for raw in sys.argv[1:]:
              path = Path(raw)
              coordinate = artifact_coordinate(path)
              expected.append(
                  (
                      coordinate[0],
                      coordinate[1],
                      {
                          "filename": path.name,
                          "sha256": hashlib.sha256(path.read_bytes()).hexdigest(),
                      },
                  )
              )

          failures: list[str] = []
          max_attempts = 18
          retry_delay_seconds = 10
          for project, version, artifact in sorted(
              expected,
              key=lambda item: (item[0], item[1], item[2]["filename"]),
          ):
              url = f"https://pypi.org/pypi/{project}/{version}/json"
              print(f"Checking {project} {version}: {url}")
              last_error = None
              for attempt in range(1, max_attempts + 1):
                  try:
                      with urllib.request.urlopen(url, timeout=30) as response:
                          data = json.loads(response.read().decode("utf-8"))
                  except urllib.error.HTTPError as exc:
                      last_error = f"PyPI JSON lookup failed with HTTP {exc.code}"
                      if exc.code == 404 and attempt < max_attempts:
                          time.sleep(retry_delay_seconds)
                          continue
                      break
                  releases = data.get("urls", [])
                  match = next((item for item in releases if item.get("filename") == artifact["filename"]), None)
                  if not match:
                      last_error = f"missing file {artifact['filename']} in PyPI JSON response"
                      if attempt < max_attempts:
                          time.sleep(retry_delay_seconds)
                          continue
                      break
                  observed_sha = match.get("digests", {}).get("sha256")
                  if observed_sha != artifact["sha256"]:
                      last_error = (
                          f"sha256 mismatch for {artifact['filename']} "
                          f"expected={artifact['sha256']} observed={observed_sha}"
                      )
                      if attempt < max_attempts:
                          time.sleep(retry_delay_seconds)
                          continue
                      break
                  print(
                      f"Published {artifact['filename']} "
                      f"size={match.get('size')} sha256={observed_sha} "
                      f"upload_time={match.get('upload_time_iso_8601')}"
                  )
                  last_error = None
                  break
              if last_error:
                  failures.append(f"{project} {version}: {last_error}")

          if failures:
              print("PyPI publish verification failed:")
              for failure in failures:
                  print(f"- {failure}")
              raise SystemExit(1)

          print(f"PyPI publish verification passed for {len(expected)} artifact(s).")
          PY
