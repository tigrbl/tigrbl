name: CLI Smoke

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  cli-smoke:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
    env:
      PYTHONDONTWRITEBYTECODE: '1'
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install workspace dev dependencies
        run: |
          python -m pip install --upgrade pip uv
          uv sync --all-groups --no-install-workspace --frozen

      - name: Compute workspace PYTHONPATH
        shell: bash
        run: |
          set -euo pipefail
          PY_PATH="$GITHUB_WORKSPACE"
          for base in "$GITHUB_WORKSPACE/pkgs"/*; do
            if [[ -d "$base" ]]; then
              for child in "$base"/*; do
                [[ -d "$child" ]] || continue
                PY_PATH="$PY_PATH:$child"
                if [[ -d "$child/src" ]]; then
                  PY_PATH="$PY_PATH:$child/src"
                fi
              done
            fi
          done
          PY_PATH="$PY_PATH:$GITHUB_WORKSPACE/pkgs/50_runtime/tigrbl_runtime"
          echo "PYTHONPATH=$PY_PATH" >> "$GITHUB_ENV"

      - name: Run CLI smoke and server-compat tests
        run: uv run --no-sync python -m pytest --noconftest -q pkgs/97_tests/tigrbl_tests/tests/unit/test_cli_cmds.py pkgs/97_tests/tigrbl_tests/tests/unit/test_cli_srv.py -p no:cacheprovider
