name: CLI Smoke

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  phase8-cli:
    runs-on: ubuntu-latest
    env:
      PYTHONDONTWRITEBYTECODE: '1'
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install minimal CLI smoke dependencies
        run: python -m pip install --upgrade pip pytest sqlalchemy aiosqlite "httpx<0.28" pydantic uvicorn hypercorn gunicorn typing_extensions

      - name: Compute workspace PYTHONPATH
        shell: bash
        run: |
          set -euo pipefail
          PY_PATH="$GITHUB_WORKSPACE"
          for base in "$GITHUB_WORKSPACE/pkgs/core" "$GITHUB_WORKSPACE/pkgs/apps" "$GITHUB_WORKSPACE/pkgs/engines"; do
            if [[ -d "$base" ]]; then
              for child in "$base"/*; do
                [[ -d "$child" ]] || continue
                PY_PATH="$PY_PATH:$child"
                if [[ -d "$child/src" ]]; then
                  PY_PATH="$PY_PATH:$child/src"
                fi
              done
            fi
          done
          PY_PATH="$PY_PATH:$GITHUB_WORKSPACE/bindings/python/tigrbl_native/python"
          echo "PYTHONPATH=$PY_PATH" >> "$GITHUB_ENV"

      - name: Run Phase 8 CLI smoke and server-compat tests
        run: python -m pytest --noconftest -q pkgs/core/tigrbl_tests/tests/unit/test_phase8_cli_cmds.py pkgs/core/tigrbl_tests/tests/unit/test_phase8_cli_srv.py -p no:cacheprovider
