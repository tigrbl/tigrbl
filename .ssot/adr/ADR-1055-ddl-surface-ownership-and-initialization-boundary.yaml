body: |-
  ## Decision
  
  1. DDL bootstrap is a governed architectural surface distinct from schema migration planning and migration history.
  2. The DDL family owns bootstrap orchestration and non-migration schema/table creation behavior for concrete app, router, and table owners.
  3. Bootstrap execution timing and event-loop mode behavior are governed by specs, not by this ADR.
  4. PostgreSQL schema namespaces and SQLite attachment maps are governed as a separate namespace boundary rather than being collapsed into generic table/model schema language.
  
  ## Context
  
  Tigrbl exposes concrete DDL behavior through `tigrbl_concrete.ddl`, `tigrbl.ddl`, and bootstrap entrypoints such as `initialize()` and `bootstrap_dbschema()`.
  The repo already tracks DDL, bootstrap, and namespace-related feature rows, but the architectural boundary must stay narrower than the operational contract details in the companion specs.
  
  ## Consequences
  
  - Non-bootstrap DDL contract, bootstrap execution/timing, namespace ensuring, namespace parity, and migration remain separately spec-governed surfaces.
  - Migration surfaces do not inherit ownership merely because they also touch database structure.
  - Runtime dispatch and operator projections do not redefine DDL or namespace ownership.
  
  ## Rejected Alternatives
  
  - Treat bootstrap and migration as one undifferentiated surface.
  - Treat PostgreSQL schema namespaces and SQLite attachments as incidental implementation details.
  - Let helper exports or transport projections redefine DDL ownership.
