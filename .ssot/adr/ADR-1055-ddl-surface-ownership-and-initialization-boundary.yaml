body: |-
  ## Decision
  
  - **Status:** Proposed
  - **Date:** 2026-04-20
  - **Related ADRs:** ADR-1015, ADR-1031, ADR-1053
  
  1. DDL bootstrap is a governed repo-local architectural surface distinct from schema migration planning and migration history.
  2. `initialize()` is the canonical DDL bootstrap entrypoint for concrete app, router, and table owners.
  3. The DDL surface owns schema creation, SQLite attachment, and per-provider `create_all` orchestration, but it does not own migration diffs or version tables.
  4. DDL initialization must support three runtime modes: synchronous bootstrap outside an event loop, synchronous providers inside a running event loop, and async providers inside a running event loop.
  5. Engine and session pairing determine how DDL acquires binds and sessions; transport projection does not redefine DDL behavior.
  
  ## Context
  
  Tigrbl exposes concrete DDL behavior through `tigrbl_concrete.ddl`, `tigrbl.ddl`, and the `initialize()` entrypoints on concrete app, router, and table owners.
  The repo already tracks DDL and bootstrap behavior with feature rows, but it does not yet carry a repo-local ADR that fixes DDL ownership, scope, and initialization-mode expectations.
  
  ## Consequences
  
  - DDL traceability can now point to a dedicated architectural decision rather than only to runtime feature rows.
  - Database-schema bootstrap, engine interoperability, and engine/session pairing can be specified as companion specs without collapsing into migration semantics.
  
  ## Rejected Alternatives
  
  - Treat DDL bootstrap and schema migration planning as one undifferentiated surface.
  - Treat event-loop mode differences as incidental implementation details rather than governed behavior.
  - Allow transport or docs projection to redefine DDL ownership.
