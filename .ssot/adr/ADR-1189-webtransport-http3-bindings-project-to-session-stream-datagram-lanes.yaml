body: |-
  Decision: Tigrbl projects WebTransport-over-H3 app behavior through explicit session, bidirectional stream, unidirectional stream, and datagram lane bindings.
  
  Owned boundary:
  - Tigrbl owns binding legality, table/profile projection, lane selection, and fail-closed behavior for WebTransport H3 app surfaces.
  - Tigrbl must preserve draft-target maturity and consume runtime capability metadata.
  
  Peer inputs:
  - tigr-asgi-contracts owns WebTransport contract vocabulary.
  - Tigrcorn owns WebTransport-over-H3 runtime behavior.
  
  Forbidden claims:
  - Tigrbl must not treat WebTransport lanes as WebSocket sessions.
  - Tigrbl must not claim runtime support without Tigrcorn capability/evidence.
