summary: "Decision: tigrbl consumes contract channel_lifecycle states as operation constraints and does not branch on protocol mechanics such as RST_STREAM, RESET_STREAM, STOP_SENDING, WebSocket closing frames, HTTP/2 half-closed labels, HTTP/3 stream errors, or QUIC stream states. RFC 9113, RFC 9114, RFC 9000, RFC 8441, and RFC 9220 are enforcement inputs for tigr-asgi-contract and tigrcorn boundaries, not direct application policy inputs. read_closed, write_closed, closing, closed, failed, and lost are interpreted as application policy inputs for operations, transactions, hooks, retries, audit, and API errors."
