body: |-
  ## Decision
  
  1. Declarative route registration remains canonical for concrete route materialization.
  2. Route registration implications include documentation and RPC exposure effects.
  3. JSON-RPC/OpenRPC exposure MUST derive from the same canonical registration source used for route materialization.
  4. Alias expansion and docs-visible operation projection MUST remain in lockstep.
  
  ## Context
  
  P1 tests show that route registration, RPC exposure, and docs visibility are tightly coupled and must be governed by one binding-first source.
  
  ## Consequences
  
  - Route and docs parity regressions are architectural conformance failures.
  - Binding-first normalization remains the single source for exposed operation surfaces.
