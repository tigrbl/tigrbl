body: |-
  WebTransport lane identifiers encode initiator, direction, and ordinal into a bounded unsigned integer. Sessions with max_streams <= 256 use uint8 and provide 64 ordinals per initiator/direction class. Sessions with max_streams between 257 and 65536 use uint16. A single WebTransport session must not support more than uint16 streams.
