summary: "Decision: engine_session_id and transaction ownership are part of session leakage prevention, not only database lifecycle management. An engine session or transaction opened for one attempt, session, stream, datagram, app, router, table, or op must not be committed, rolled back, reused, traced, replayed, or diagnosed as belonging to another partition. Consequence: engine session reuse requires explicit lease/reset semantics and cross-attempt or cross-session transaction mutation fails closed."
