body: |-
  A transport binding participates in cross-transport equivalence only when the operation declares semantic compatibility with that transport, framing, delivery mode, and runtime lifecycle. Unsupported, undeclared, or non-equivalent bindings must fail closed or be excluded from equivalence evidence rather than coerced into a lossy comparison.
