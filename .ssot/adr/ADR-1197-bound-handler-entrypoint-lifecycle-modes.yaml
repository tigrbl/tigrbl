body: |-
  Decision: table-bound handlers expose three canonical parent-bound callables: invoke for full ingress-dispatch-egress lifecycle, dispatch for dispatch-side lifecycle without ingress, post-commit, or egress, and core for the op body/core callable only. Concrete model mapping owns the public bound callables and model/alias lifecycle entrypoint resolution; runtime executors only run supplied phase chains and must not expose an operation-invocation module. Compatibility raw aliases remain secondary and must not be the normative API.
