body: |-
  Decision: Tigrbl idempotency is declared by operation and runtime policy, not inferred from HTTP method, transport shape, engine behavior, or retry attempts. Idempotent execution requires a scoped key, stable semantic owner identity, concrete attempt parentage, payload compatibility rules, effect fencing, and declared duplicate-response semantics. Consequence: retries and replays may consume idempotency only when the operation contract declares it; otherwise mutation retry fails closed before side effects.
