body: |-
  ## Decision`nHooks are phase-bound policy/side-effect callbacks selected by phase plus EventKey filters. subevent_ctx selects the HANDLER slot for a concrete EventKey. Runtime uses compiled buckets, not wildcard scans.`n`n## Rationale`nThis keeps hooks, handlers, and atoms on separate customization axes.`n`n## Consequences`nAmbiguous subevent handlers fail compilation unless explicitly modeled as ordered multi-handler dispatch.`n`n## Traceability`nLinks: adr:1010, adr:1092, adr:1101, adr:1102, spc:2113.
