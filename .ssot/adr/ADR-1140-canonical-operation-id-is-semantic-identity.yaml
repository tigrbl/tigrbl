tags: []
summary: "Decision: op_id is the semantic identity of a Tigrbl operation. Transport selectors such as REST method/path, JSON-RPC method, WebSocket selector, stream path, and WebTransport lane do not define semantic identity. Context: Cross-transport execution, replay, trace correlation, rollups, and certification need one operation identity that survives binding changes and selector aliases. Consequences: Runtime plans, docs projections, traces, replay records, equivalence tests, and rollup records must carry the same op_id for the same semantic operation. Verification: Conformance tests must prove one op_id remains stable across REST, JSON-RPC, WebSocket JSON-RPC, and supported stream/session bindings."
