body: |-
  Decision: replay manifests are first-class proof artifacts that preserve enough semantic identity, concrete parentage, normalized input, output, diagnostics, effect-fence, trace/qlog, schema, runtime plan, and nondeterminism declarations to compare replay against the original attempt. Replay output comparison is normalized and policy-scoped, not raw transport byte comparison. Consequence: replay can support audit, deterministic reproduction, rollup, and compaction without cross-session or cross-engine-session leakage.
