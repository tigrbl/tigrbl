body: |-
  ## Decision

  - **Status:** Proposed
  - **Date:** 2026-04-20
  - **Related ADRs:** ADR-1006, ADR-1007, ADR-1016, ADR-1024, ADR-1025

  1. Tigrbl execution normalizes onto a closed public exchange vocabulary on the active line.
  2. The canonical public exchange vocabulary is:
     - `request_response`;
     - `server_stream`; and
     - `bidirectional_stream`.
  3. `event_stream` is not a separate semantic exchange class; it is an SSE-facing compatibility token whose canonical semantic exchange is `server_stream` and whose concrete framing is `sse`.
  4. `bidirectional` is a legacy alias and must normalize to `bidirectional_stream`.
  5. `client_stream` and `fire_and_forget` remain provisional tokens and must not be used as first-class or current-target support claims until separately governed.
  6. Bindings map onto the canonical exchange vocabulary; the exchange model does not create a second programming model.
  7. Kernel compilation may use exchange-specific templates, but semantics remain operation-first and binding-driven.
  8. Exchange normalization occurs before hook selection, docs emission, parity projection, channel derivation, and diagnostics rendering.
  9. Exchange taxonomy is orthogonal to lifecycle naming and does not authorize alternate ingress-routing phase labels.
  10. Exchange normalization, docs projection, and parity rendering anchor on the canonical routing phase `INGRESS_ROUTE`.
  11. Introducing a new public exchange class, promoting a provisional token, or renaming the canonical public exchange vocabulary requires an ADR.

  ## Context

  The repository exposes overlapping exchange tokens across Python bindings, runtime adapters, Rust specs, and architecture notes.
  This ADR closes the public exchange vocabulary on the active line without pretending that every visible token is already first-class or current-target support.

  ## Rejected Alternatives

  - Per-protocol execution models with no normalization layer.
  - Treating every new transport as a new exchange kind.
  - Treating `event_stream` as a fourth semantic exchange class.
  - Hiding exchange semantics inside transport adapters only.
