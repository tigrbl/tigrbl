body: |-
  Decision: Diagnostics, trace, qlog, replay, and rollup outputs must be deterministic for the same normalized execution inputs and declared state. Diagnostic determinism includes stable error classification, stable field ordering, stable identity parentage, stable source provenance, and stable unsupported-policy rejection. Consequence: determinism certification must compare normalized outputs and proof artifacts, not raw transport bytes or incidental runtime object layout.
