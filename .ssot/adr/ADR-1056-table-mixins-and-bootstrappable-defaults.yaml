body: |-
  ## Decision
  
  - **Status:** Proposed
  - **Date:** 2026-04-20
  - **Related ADRs:** ADR-1053, ADR-1055
  
  1. Table mixins are a governed ORM extension surface within the repo boundary.
  2. Mixin-defined columns, hooks, schemas, deps, and security deps participate in normal MRO collection and do not bypass canonical table contracts.
  3. `Bootstrappable` is the canonical table-level default-row and seeding mixin surface in the current cycle.
  4. Default-row seeding remains class-local, bounded to mapped columns on the owning class, and only claims idempotency when primary-key material permits it.
  5. Mixins may enrich table behavior, but they may not redefine engine ownership, session ownership, or DDL initialization rules.
  
  ## Context
  
  `tigrbl_orm.orm.mixins` already provides reusable ORM mixins, and `Bootstrappable` already provides default-row seeding behavior.
  The repo also relies on MRO-based spec collection for mixin-defined columns and policies, but the current SSOT set does not yet define table mixins and bootstrappable defaults as governed surfaces.
  
  ## Consequences
  
  - Table-mixin semantics can now be tracked independently from generic table contracts.
  - Bootstrappable default rows and seeding behavior can be specified without overloading the generic DDL surface.
  
  ## Rejected Alternatives
  
  - Treat mixins as purely incidental implementation details with no SSOT coverage.
  - Let default-row seeding remain an undocumented convention.
  - Permit mixins to bypass canonical table, engine, or session rules.
