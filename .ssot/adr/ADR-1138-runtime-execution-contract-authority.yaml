summary: "Decision: The runtime execution contract is the authoritative interpretation of operation lifecycle semantics across Tigrbl atoms, kernel plans, and runtime protocol adapters. Context: Transport adapters and engine integrations need one shared meaning for receipt, resolution, planning, execution, commit, emission, completion, failure, and abort. Consequences: REST, JSON-RPC, WebSocket, stream, WebTransport, and datagram surfaces must project their local events into the same runtime lifecycle before claiming semantic support. Verification: Conformance tests must prove legal transitions, fail-closed illegal transitions, side-effect parentage, and completion fence semantics."
