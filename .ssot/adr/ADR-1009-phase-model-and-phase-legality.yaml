body: |-
  ## Decision
  
  - **Status:** Proposed
  - **Date:** 2026-04-14
  - **Related ADRs:** ADR-0008, ADR-0010, ADR-0011, ADR-0012, ADR-0016, ADR-0023, ADR-0024, ADR-0025
  
  1. Tigrbl execution is phase-based and legality is phase-constrained.
  2. The implementation-compatible phase set is frozen around the current named phases, grouped conceptually as:
     - ingress: `INGRESS_BEGIN`, `INGRESS_PARSE`, dispatch/route;
     - guarded execution: `PRE_TX_BEGIN`, `START_TX`, `PRE_HANDLER`, `HANDLER`, `POST_HANDLER`, `PRE_COMMIT`, `END_TX`, `POST_COMMIT`;
     - egress: `EGRESS_SHAPE`, `EGRESS_FINALIZE`, `POST_RESPONSE`;
     - error/rollback phases.
  3. Work legality is frozen:
     - dependency resolution occurs before handler execution;
     - transaction entry and commit/rollback are phase-owned;
     - transport emission occurs only in egress phases;
     - post-send behavior occurs after emission completion points.
  4. Phase names may be normalized internally over time, but the legality model may not drift without an ADR.
  5. Atoms, hooks, and guards must declare their legal phases.
  
  ## Context
  
  Tigrbl execution is phase-driven. The current repo already has concrete phase names, and the architecture pack defines both current and normalized phase flows.
  This ADR freezes the legality model early so that hooks, deps, atoms, guards, and compilation all share the same lifecycle grammar.
  
  ## Rejected Alternatives
  
  - Protocol-specific phase systems.
  - Allowing handlers or deps to choose their own lifecycle points.
  - Phase drift driven by transport adapters.
