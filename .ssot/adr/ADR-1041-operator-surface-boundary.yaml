body: |-
  ## Decision
  
  1. Operator-surface closure includes runtime exposure and docs projection parity obligations.
  2. Framing, multipart, stream, and upload behavior remain primary runtime contracts.
  3. Documentation parity for those operator surfaces is a required secondary conformance boundary.
  4. Phase-closure conformance must include cross-projection verification between runtime operator behavior and docs projections.
  
  ## Context
  
  Operator-surface tests validate both runtime behavior and docs projection consistency; both need explicit boundary language.
  
  ## Consequences
  
  - Operator conformance gates include docs parity checks.
  - Runtime-only closure claims are insufficient without projection parity evidence.
