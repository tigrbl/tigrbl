body: |-
  Decision: Tigrbl treats WebTransport-over-H2 as a draft fallback binding surface that must be capability-gated and kept distinct from QUIC-native WebTransport.
  
  Owned boundary:
  - Tigrbl owns fallback binding legality, app projection, and fail-closed behavior for WebTransport-over-H2 when runtime capability metadata allows it.
  - Tigrbl must keep H2 fallback behavior separate from H3 WebTransport table/profile claims.
  
  Peer inputs:
  - tigr-asgi-contracts owns WebTransport contract vocabulary.
  - Tigrcorn owns the HTTP/2 fallback runtime carrier.
  
  Forbidden claims:
  - Tigrbl must not claim QUIC stream IDs or QUIC datagrams for WebTransport-over-H2.
  - Tigrbl must not silently upgrade H2 fallback bindings into H3 WebTransport claims.
