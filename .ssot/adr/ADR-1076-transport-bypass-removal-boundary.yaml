body: |-
  ## Decision
  
  1. Legacy transport-owned semantic dispatch modules are outside the active architecture boundary.
  2. Removed transport modules, dispatcher files, gateway/runtime bypasses, and public dispatch exports must stay absent unless superseded by a new accepted ADR.
  3. Concrete transport surfaces may normalize ingress envelopes, but they must not own semantic operation lookup, matching, or dispatch.
  4. Public facade exports such as `dispatch_operation` and `resolve_operation` must not be reintroduced as compatibility aliases for removed transport bypasses.
  5. Negative architecture tests that assert absence of removed modules are first-class boundary evidence.
  
  ## Context
  
  The P0 transport boundary tests assert that old `tigrbl.transport` modules, dispatcher files, gateway runtime bypasses, and top-level dispatch exports remain absent. Existing KernelPlan dispatch ADRs define the positive owner of dispatch, but the tests also need a negative boundary decision that makes reintroduction of old bypass surfaces explicitly non-conforming.
  
  ## Consequences
  
  - Removed dispatch surfaces are tracked as architectural exclusions, not incidental cleanup.
  - New transport work must extend the binding and KernelPlan path rather than reviving removed modules.
  - Regression tests can link directly to this boundary without needing to prove runtime behavior.
  
  ## Rejected Alternatives
  
  - Keeping removed dispatch modules as inert compatibility shims.
  - Allowing old public dispatch exports to forward into KernelPlan internals.
  - Treating negative package-boundary assertions as non-architectural hygiene.
