body: |-
  Runtime rollup must not run unless a rollup policy, field-level operator algebra, source range, scope compatibility rule, redaction policy, and drillback manifest are declared. Unsupported operators, lossy summaries, mixed runtime scope, redaction failure, or missing drillback must fail closed.
