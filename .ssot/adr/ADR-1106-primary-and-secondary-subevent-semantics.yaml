body: |-
  ## Decision`nEvery executable kernel unit has exactly one primary subevent. Secondary subevents are annotations unless compiled as child units.`n`n## Rationale`nThis avoids ambiguous hook/handler selection when one transport event maps to multiple semantic labels.`n`n## Consequences`nSSE/message/stream examples choose a primary unit based on binding, loop, and tx configuration.`n`n## Traceability`nLinks: adr:1092, adr:1094, adr:1101, spc:2098, spc:2103, spc:2113.
