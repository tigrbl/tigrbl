summary: "Public surface provenance begins with the governed JSON Schema when a JSON Schema exists. Lineage, provenance, and dependency edges are enforced as typed relationships instead of overloading matrix columns. Surfaces without JSON Schema provenance are partial until an explicit missing-schema disposition is declared."
