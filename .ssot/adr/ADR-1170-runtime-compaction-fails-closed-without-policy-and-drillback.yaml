summary: "Runtime compaction must not run unless a compaction policy, compaction algebra, source range, schema/plan scope, redaction policy, and drillback manifest are declared. Unsupported, lossy, cross-scope, or unfenced compaction fails closed rather than erasing proof needed for replay, trace/qlog, idempotency, or audit."
