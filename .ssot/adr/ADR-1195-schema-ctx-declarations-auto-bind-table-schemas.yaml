summary: "Today `schema_ctx` records declaration metadata, and `Model.schemas.<alias>.in_` or `.out` becomes reliable after `build_schemas`, `bind`, or model inclusion. That is correct for full model materialization, but it makes simple schema declaration introspection surprising: a user can declare a schema in or for a table and still find `Table.schemas` absent until a separate binding step runs."
