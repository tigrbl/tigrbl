summary: "Decision: table profile documentation visibility and runtime transport exposure are independent policy axes. Rationale: OpenAPI, OpenRPC, diagnostics, and generated docs can describe operations that are not mounted on a network transport, and runtime transports can be mounted without publishing those operations into docs. Consequence: docs exposure must never imply network exposure, and network exposure must never imply documentation publication."
