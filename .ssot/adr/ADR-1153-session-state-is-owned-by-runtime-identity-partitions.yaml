summary: "Decision: Tigrbl runtime session state is owned by explicit identity partitions instead of ambient transport, handler, or adapter state. Session-affecting state must be keyed by the applicable app_id, router_id, table_id, op_id, attempt_id, session_id, stream_id, datagram_id, trace_id, and binding/runtime plan identity. Consequence: any read, mutation, retry, replay, diagnostic, or emitted event that lacks required parentage or crosses a partition fails closed as a leakage violation."
