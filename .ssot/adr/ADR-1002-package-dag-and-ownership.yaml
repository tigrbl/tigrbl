body: |-
  ## Decision

  - **Status:** Proposed
  - **Date:** 2026-04-14
  - **Related ADRs:** ADR-0003, ADR-0015, ADR-0016, ADR-0020, ADR-0022, ADR-0025, ADR-1185

  1. Package ownership is frozen as follows:
     - `tigrbl_core`: authoritative declarative types and core semantic spec objects.
     - `tigrbl_spec`: re-export and facade only.
     - `tigrbl_typing`: shared protocols and low-level typing surfaces.
     - `tigrbl_atoms`: structural atoms and canonical handler shims.
     - `tigrbl_kernel`: Python lowering, plan compilation, segment packing, and optimization.
     - `tigrbl_runtime`: Python live execution, context, loops, and runtime-owned abstractions.
     - `tigrbl_concrete`: ASGI adapter layer and public decorator/app surface.
     - ops packages: executable operation implementations grouped by domain.
  2. Import direction is frozen:
     - declarative layers may not depend on runtime or concrete layers;
     - kernel may depend on declarative and atom layers but not on concrete;
     - runtime may depend on kernel, atoms, typing, and core, but not on concrete-owned execution details;
     - concrete may depend on runtime, typing, and core.
  3. New packages must fit this DAG rather than forcing exceptions.
  4. External-language runtimes or plugins are out-of-core unless explicitly governed by a later ADR. They may consume public Python contracts, but they do not create core parity, certification, benchmark, or documentation obligations.

  ## Context

  The repo already has a strong macro-shape, but several architectural gaps come from boundary leakage: declarative layers owning runtime details, runtime owning concrete transport details, concrete code bypassing compiled/runtime paths, or alternate runtime experiments forcing duplicate parity surfaces.

  A precise Python-owned package DAG is required so that future additions do not recreate cycles, semantic duplication, or unsupported runtime parity lanes.

  ## Rejected Alternatives

  - A permissive import graph with case-by-case exceptions.
  - Allowing runtime to depend on concrete request/transport types.
  - Splitting ownership by transport or implementation language rather than by architectural responsibility.
  - Keeping an in-core Rust parity lane after the project has selected a Python-only runtime.
