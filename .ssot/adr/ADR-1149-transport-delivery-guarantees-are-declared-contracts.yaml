summary: "Decision: each transport binding must declare its delivery, ordering, retry, and replay guarantees as an explicit contract. Rationale: protocol capability, runtime policy, and semantic operation behavior are different concerns and cannot be inferred safely from transport names. Consequence: unsupported or undeclared guarantees fail closed rather than being silently upgraded or downgraded."
