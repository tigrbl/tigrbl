body: |-
  ## Decision`nop_ctx remains the semantic root. websocket_ctx, sse_ctx, stream_ctx, and webtransport_ctx are sugar over op_ctx. subevent_ctx is optional dispatch-handler binding. Realtime verbs are builtin custom handlers, not TargetOp expansion.`n`n## Rationale`nThis prevents decorator and target-op explosion while preserving first-class protocol ergonomics.`n`n## Consequences`nDecorator sugar must lower to canonical op/binding specs.`n`n## Traceability`nLinks: adr:1001, adr:1006, adr:1017, adr:1049, adr:1092, adr:1104, adr:1105.
