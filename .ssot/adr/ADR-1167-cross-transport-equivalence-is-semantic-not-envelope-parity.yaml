body: |-
  Cross-transport equivalence compares the semantic operation outcome for declared equivalent bindings. It does not require every operation to bind to every transport, and it does not compare transport-specific envelopes, connection metadata, framing artifacts, or delivery mechanics except where those mechanics are declared as semantic behavior.
