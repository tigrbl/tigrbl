body: |-
  ## Decision`nTigrbl supports owner and dispatch loop modes. Owner means the main op handler owns the channel/session loop. Dispatch means runtime owns the loop and invokes compiled subevent handler plans. Default is dispatch when subevent handlers exist; otherwise owner.`n`n## Rationale`nThis preserves low-level control while enabling static per-message/chunk/datagram optimization.`n`n## Consequences`nLoop ownership becomes a declared runtime contract.`n`n## Traceability`nLinks: adr:1093, adr:1094, adr:1100, spc:2103, spc:2104.
