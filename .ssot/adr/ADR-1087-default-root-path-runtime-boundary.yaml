body: |-
  ## Context
  
  Tigrbl apps execute through Python runtime paths. A request to the root path `/` should have a governed framework default unless the application explicitly owns that route.
  
  The root path is also a natural user and health-smoke entry point, but it must not steal authority from application-owned routes.
  
  ## Decision
  
  Tigrbl SHALL define a Python runtime default for `GET /`.
  
  1. Every Tigrbl app SHALL expose a default response at path `/` for `GET` unless that app explicitly registers or compiles a non-default root binding for `/`.
  2. The default response body SHALL be `{ok: true}` with HTTP status `200`.
  3. An explicit app, router, or compiled runtime binding for `GET /` or the root path SHALL override the framework default.
  4. The default SHALL NOT widen application business semantics, diagnostics semantics, or `/system/healthz` semantics; it is only a framework-owned root fallback.
  5. Runtime implementations SHALL avoid executing persistence, engine/session acquisition, or custom handlers to produce the default fallback.
  6. Rust/runtime-binding root parity is retired under `adr:1185`.
  
  ## Consequences
  
  - Python runtime behavior for an otherwise empty app converges on the same `GET /` response.
  - Applications can still own `/` by registering their own root route.
  - Root smoke checks can assert framework availability without depending on docs, diagnostics, or application tables.
  - Runtime binding tests are no longer required for this ADR.
  
  ## Rejected Alternatives
  
  - Leaving empty apps to return 404 or runtime missing-binding errors at `/`.
  - Redirecting `/` to docs or diagnostics, which would conflate root fallback behavior with optional system or documentation mounts.
  - Making the default depend on executor implementation language.
