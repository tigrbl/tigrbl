summary: "Decision: binding token lowering must reject unsupported transport, profile, operation, and framing combinations and must record which table profile, operation verb, or OpSpec binding produced each lowered token. Rationale: silent fallback would create hidden route exposure and cross-transport semantic drift. Consequence: compile-time lowering errors become explicit diagnostics and no unsupported framing can be substituted implicitly."
