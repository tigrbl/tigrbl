body: |-
  ## Decision
  
  1. CLI target resolution is canonical and shared across relevant CLI command families.
  2. Server-runner selection MUST preserve required docs route/payload availability for selected targets.
  3. Target-resolution and server-selection error classification is normative and stable.
  
  ## Context
  
  P1 CLI tests validate target loading, target error behavior, and server support expectations as one cohesive contract.
  
  ## Consequences
  
  - CLI/server regressions are conformance issues, not implementation details.
  - Docs/server behavior remains tied to canonical target resolution.
