body: |-
  Decision: Tigrbl retry behavior is a declared runtime and operation policy, not a behavior inferred from transport shape, HTTP method, connection loss, engine exception, or handler implementation. Retry policy must declare eligible operations, retryable failure classes, max attempts, budget, backoff schedule, jitter policy, transport/runtime ownership, idempotency or replay coupling for mutations, and fail-closed unsupported cases. Consequence: undeclared retry fails closed before side effects, and transports cannot silently retry semantic operations.
