tags: []
summary: "Decision: Runtime, dispatch, transport, and engine surfaces must consume atom-chain requirement projections and fail closed when a requirement is missing, unsupported, or downgraded without declaration. Diagnostics must include the source atom_id, hook_id where applicable, requirement key, owner identity, and concrete execution parentage. Consequence: unsupported transport framing, missing delivery guarantees, unavailable rollback behavior, or cross-session parentage cannot silently fall back into best-effort execution."
