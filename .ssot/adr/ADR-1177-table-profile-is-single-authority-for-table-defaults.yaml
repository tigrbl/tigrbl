body: |-
  TABLE_PROFILE is the sole table-level authority for generated/default ops, default bindings, docs exposure, and runtime exposure.

  TABLE_PROFILE.ops is complete table-level op policy. A profile with one op means exactly one table-level op, not a patch over a hidden default set.

  Legacy class attrs such as DEFAULT_CANON_VERBS, should_wire_canonical, __tigrbl_defaults_* attrs, loose binding_profiles config, OPS, and __tigrbl_ops__ cannot coexist with an explicit TABLE_PROFILE because that would create ambiguous precedence.
