body: |-
  ## Context
  
  The Python runtime executes compiled operation semantics through engine/session/transaction concepts. Performance and correctness drift when a request path combines engine construction, schema readiness, session acquisition, transaction begin, operation execution, commit/rollback, and disposal into one undifferentiated action.
  
  Python must keep these lifecycle stages explicit even where SQLAlchemy or engine packages hide part of the machinery.
  
  ## Decision
  
  Tigrbl defines a Python runtime engine/session lifecycle boundary.
  
  1. Engine configuration and engine initialization are distinct from request execution.
  2. Schema readiness is distinct from session acquisition.
  3. Session acquisition or reuse is distinct from transaction begin.
  4. Transaction begin, operation execution, commit, rollback, and resource release are request-path operations.
  5. Disposal is a runtime/application lifecycle operation, not ordinary request work.
  6. Python engines must document and test their lifecycle placement.
  7. Rust/runtime-binding lifecycle parity is retired under `adr:1185`.
  8. Engine session implementations expose lifecycle behavior through `EngineSessionBase`; the generic `EngineSession` and package-specific engine sessions must inherit `EngineSessionBase`, and `EngineSessionBase` carries `EngineSessionSpec` policy fields.
  
  ## Consequences
  
  - Python test evidence must identify where initialization, session acquisition, and transaction work occur.
  - Runtime performance claims must not include one-time initialization costs as request execution costs.
  - Missing lifecycle state should produce clear fail-closed errors rather than implicit lifecycle repair during ordinary requests.
  - Optional Rust/runtime-binding evidence is no longer required for this boundary.
  - Engine extensions share one base session contract instead of package-local session roots or a separate `SessionABC`.
  
  ## Rejected alternatives
  
  - Treating engine open and transaction begin as the same lifecycle step.
  - Letting request execution repair missing initialization state opportunistically.
  - Keeping optional runtime binding parity language after Tigrbl selects a Python-only runtime.
