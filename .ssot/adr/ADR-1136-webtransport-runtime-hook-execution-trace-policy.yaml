summary: "Tigrbl owns AppSpec binding, runtime context projection, hook execution, and hook/runtime trace visibility for WebTransport scopes. Trace records must represent actual hook execution events, not only configured hook names. Each WebTransport hook/runtime trace row should preserve session identity, stream identity, lane kind, event type, and execution phase while leaving QUIC/H3 packet lifecycle to Tigrcorn."
