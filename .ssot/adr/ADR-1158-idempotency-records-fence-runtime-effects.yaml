body: |-
  Decision: idempotency records must be written, confirmed, rolled back, and diagnosed with the same effect fence as the operation attempt they protect. A duplicate attempt may return a declared stable result only after the original effect and idempotency record are durably correlated. Consequence: partial failures, payload mismatches, cross-session key reuse, and cross-engine-session reuse fail closed with scoped diagnostics rather than producing accidental duplicate effects or stale responses.
