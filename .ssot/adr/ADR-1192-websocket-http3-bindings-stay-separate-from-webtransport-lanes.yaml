body: |-
  Decision: Tigrbl projects WebSocket-over-H3 through WebSocket message and session bindings only, and forbids combining those bindings with WebTransport lane semantics.
  
  Owned boundary:
  - Tigrbl owns WebSocket binding legality, app-facing session/message projection, subprotocol policy, and fail-closed behavior for H3-capable WebSocket surfaces.
  - Tigrbl may consume RFC 9220 capability metadata from the runtime.
  
  Peer inputs:
  - tigr-asgi-contracts owns WebSocket contract vocabulary.
  - Tigrcorn owns RFC 9220 runtime support.
  
  Forbidden claims:
  - H3 WebSocket bindings must not imply WebTransport support.
  - H3 WebSocket and H3 WebTransport must remain separate binding concepts even if exposed by the same listener.
