summary: "Trace and qlog records are governed runtime proof records, not generic monitoring dashboards and not raw transport logs. They preserve semantic and concrete identity, parentage, lifecycle transitions, effect fences, retry/replay/idempotency links, diagnostics, and rollup/compaction drillback. Transport qlog-like export remains a separate support status from governed runtime trace/qlog proof."
