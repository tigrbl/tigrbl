body: |-
  ## Decision
  
  The repository adopts `.ssot/registry.json` as the authoritative machine-readable truth model for planning, features, claims, tests, evidence, boundaries, releases, ADRs, and specs.

  The authored policy documents that govern that registry live under `.ssot/adr/` and `.ssot/specs/`.

  The `certification/` tree is a derived certification projection and historical bundle layer. Files such as `certification/claims/target.yaml` and `certification/targets/next_target.yaml` are deprecated projection artifacts and must not receive new source edits.

  Narrative certification prose under `docs/` is subordinate to the SSOT and must agree with SSOT-backed projections.
  
  ## Rationale
  
  The existing registry and conformance documents provide strong traceability, but the authoritative mutation surface now lives in the SSOT so planning, boundary changes, and target setting happen in one normalized graph.
