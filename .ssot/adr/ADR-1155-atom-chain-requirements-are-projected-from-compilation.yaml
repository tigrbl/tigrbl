body: |-
  Decision: Tigrbl compiles atom and hook chains as the source of runtime requirements, then projects only the minimal enforceable requirements needed by runtime plans, transports, engines, diagnostics, retry/replay, and rollup/compaction. This projection is not a parallel capability algebra and is not a full atom inventory. Consequence: runtime enforcement can inspect declared requirements without expanding or reinterpreting the full atom chain on the dispatch hot path.
