body: |-
  ## Decision
  Tigrbl models HTTP headers as plural collection surfaces.

  `HeadersSpec` is the declarative collection contract in `tigrbl_core` when header collection metadata is required. `HeadersBase` owns reusable mapping behavior in `tigrbl_base`. Concrete request and response objects may accept both while preserving existing plain mapping inputs.

  ## Constraints
  - The canonical naming is plural: `HeadersSpec`, `HeadersBase`, and `Headers`.
  - `RequestSpec.headers` and `ResponseSpec.headers` must preserve the existing plain string-map shape.
  - A singular `HeaderSpec` is reserved for a future per-header declaration object, if one is ever needed.
  - Runtime implementations must keep case-insensitive lookup and transport raw-header projection behavior.

  ## Consequences
  - New declarative header metadata belongs in `HeadersSpec`.
  - Shared header collection behavior belongs in `HeadersBase`.
  - Concrete header ergonomics remain in `tigrbl_concrete`.
  - Existing AppSpec JSON that uses `"headers": {"X": "Y"}` remains valid.
