body: |-
  ## Context
  
  The framework exposes diagnostics endpoints such as `/system/healthz`, `/system/methodz`, `/system/hookz`, and `/system/kernelz`, and tests treat those endpoints as part of the public surface. The repo does not currently define every stable diagnostics payload, when warnings may be emitted, or how diagnostics inherit the configured system prefix.
  
  example test suite exercise diagnostics through health, method inventory, hook inventory, kernel payloads, system-prefix mounting, OpenAPI visibility, Uvicorn-backed runtime paths, and performance probes. These tests reflect that diagnostics are not incidental debug dumps; they are governed operational projections with stable fields and clear boundaries.
  
  ## Decision
  
  1. Diagnostics endpoints that are mounted by the framework are public operational surfaces within the repo boundary.
  2. Diagnostics payload shapes, warning vocabularies, and mount-prefix behavior are governed by repo-local specs rather than by incidental implementation.
  3. Diagnostics may expose degraded state, but they may not emit undocumented warning keys or environment-specific noise as part of the stable contract.
  4. Diagnostics endpoints are operational status surfaces, not arbitrary debug dumps or internal object snapshots.
  5. System-prefix configuration applies to diagnostics mounts in the same way it applies to other framework-owned system routes.
  6. Operation diagnostics must project from materialized operation state, including method, hook, dependency, persistence, and kernel-step placement where those fields are governed.
  7. Diagnostics payloads for `methodz`, `hookz`, and `kernelz` must remain stable enough for example, performance, and options tests to assert operation placement, hook ordering, and bounded kernel payload behavior without depending on private object layout.
  8. Diagnostics performance tests may assert cache and scaling expectations only for fields covered by diagnostics specs or feature status notes.
  
