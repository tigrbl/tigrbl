body: |-
  ## Context
  
  The framework exposes diagnostics endpoints such as `/system/healthz` and
  `/system/kernelz`, and tests treat those endpoints as part of the public
  surface. The repo does not currently define which diagnostics payloads are
  stable, when warnings may be emitted, or how diagnostics inherit the configured
  system prefix.
  
  ## Decision
  
  1. Diagnostics endpoints that are mounted by the framework are public
     operational surfaces within the repo boundary.
  2. Diagnostics payload shapes, warning vocabularies, and mount-prefix behavior
     are governed by repo-local specs rather than by incidental implementation.
  3. Diagnostics may expose degraded state, but they may not emit undocumented
     warning keys or environment-specific noise as part of the stable contract.
  4. Diagnostics endpoints are operational status surfaces, not arbitrary debug
     dumps or internal object snapshots.
  5. System-prefix configuration applies to diagnostics mounts in the same way it
     applies to other framework-owned system routes.
  
  ## Traceability
  
