body: |-
  ## Decision
  UUID and ULID are supported public identity codec profiles. UUID and ULID text, parser objects, and generator objects are boundary concerns. Runtime, event, and kernel hot paths lower both profiles to opaque16 bytes.
  
  UUID canonical output is lowercase RFC-style text with hyphens. ULID canonical output is uppercase Crockford Base32 text with timestamp-first binary ordering preserved.
  
  ## Rationale
  UUID and ULID are common external identity forms, but dispatch should not depend on strings or language-specific objects. Lowering to opaque16 provides compatibility without hot-path object amplification.
  
  ## Consequences
  Generic codecs preserve bytes exactly and should not require version-specific UUID semantics unless a generation policy opts in. UUID generation modes such as uuid4 or uuid7 and ULID monotonic generation are separate generator policy from codec policy.
  
  ## Traceability
  Maps to SPEC-2134, SPEC-2125, and SPEC-2135. Related decisions include ADR-1113 and ADR-1119.
