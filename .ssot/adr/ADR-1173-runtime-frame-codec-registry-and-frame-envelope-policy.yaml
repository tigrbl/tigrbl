summary: "Runtime framing is a codec registry over first-class frame envelopes, not a transport layer and not operation legality authority. Binding specs and kernel plans decide legal framing combinations; runtime codecs own encode/decode behavior for governed frame representations. Frame and FrameContext records preserve frame kind, payload, framing token, content metadata, lane identity, and concrete session/stream/datagram ids. Unsupported codecs and illegal combinations fail closed before dispatch."
