body: |-
  ## Context
  
  Tigrbl currently exposes several protocol-specific BindingSpec classes such as HTTP REST, HTTP JSON-RPC, WebSocket, and WebTransport variants. Those classes are useful authoring shortcuts, but they blur the canonical model when each shortcut appears to be an independent binding taxonomy.
  
  The corrected model keeps `PathSpec.path` as the first-class address authority and lets protocol BindingSpecs select transport, security, carrier/profile, family, exchange, lane/session topology, and a typed framing child.
  
  `AppSpec`, `RouterSpec`, `PathSpec`, and `TableSpec` may own operation collections, but they do not directly own BindingSpecs. BindingSpecs are meaningful only inside the `OpSpec.bindings` tuple for the operation they expose.

  ## Decision
  
  Tigrbl shall govern three canonical protocol BindingSpecs for this slice:
  
  - `HTTPBindingSpec`
  - `WebSocketBindingSpec`
  - `WebTransportBindingSpec`
  
  Semantic convenience aliases may remain, including `HttpRestBindingSpec`, `HttpJsonRpcBindingSpec`, `HttpStreamBindingSpec`, `SseBindingSpec`, `WsBindingSpec`, `WsJsonRpcBindingSpec`, `WsNdjsonBindingSpec`, and WebTransport session, stream, and datagram aliases. Those aliases are authoring conveniences only.
  
  Every alias must normalize to a canonical BindingSpec before KernelPlan compilation, runtime dispatch, docs projection, support-matrix projection, or conformance testing.
  
  Tigrbl shall preserve the op-owned binding hierarchy. `AppSpec.bindings`, `RouterSpec.bindings`, `PathSpec.bindings`, and `TableSpec.bindings` are not canonical fields. Multi-method, multi-lane, or grouped authoring conveniences may exist only if they lower to concrete `OpSpec(..., bindings=(...))` entries before canonical validation, docs projection, runtime compilation, or conformance checks.

  Canonical protocol BindingSpecs use:
  
  - `secure` to distinguish HTTP from HTTPS, WS from WSS, and WT from secure WT where the contract needs that distinction.
  - `profile` to distinguish carrier usage such as `rest`, `stream`, `sse`, `message`, `session`, `bidi_stream`, `unidi_client_stream`, `unidi_server_stream`, and `datagram`.
  - `family` to describe the native carrier unit: `request`, `session`, `message`, `stream`, or `datagram`.
  - `exchange` to describe the app interaction pattern: `unary`, `client_stream`, `server_stream`, `duplex`, or `fire_and_forget`.
  - `framing` to reference a typed `FramingSpec` child that describes payload interpretation such as `json`, `jsonrpc`, `ndjson`, `sse`, `text`, `bytes`, or `binary`.
  
  `jsonrpc` is not a protocol profile in the canonical model. HTTP JSON-RPC and WebSocket JSON-RPC aliases normalize to HTTP or WebSocket protocol bindings with `JsonRpcFramingSpec`.
  
  `rest`, `stream`, `sse`, `message`, and WebTransport stream/datagram names are carrier/profile values, not framing tokens unless separately declared as framing values by the framing policy.
  
  `webtransport` is never an app-level framing token. WebTransport BindingSpecs describe session and lane topology; app payload interpretation is declared only on lanes that carry application payloads.

  `PathSpec.path` owns the concrete address path. BindingSpecs must not introduce an independent address path that can conflict with the containing PathSpec.
  
  This slice does not add or govern `StdioBindingSpec`.
  
  ## Consequences
  
  The compiler, docs projection, runtime support matrix, and tests can target canonical BindingSpecs while preserving ergonomic alias APIs.
  
  Alias expansion becomes a governed compatibility layer. Alias behavior must not drift from the canonical expansion table, and authoring `framing` fields must be typed `FramingSpec` values before downstream use.
  
  Support claims must distinguish profile selection from app-level framing support and from current runtime implementation maturity.
