body: |-
  ## Decision
  
  1. A binding declares how a semantic operation is exposed over a transport/protocol surface.
  2. Bindings do not redefine operation semantics; they project them.
  3. Protocol binding responsibility includes transport identity, security metadata, carrier/profile selection, family, exchange, lane or session topology, docs metadata, and compiler/runtime constraints.
  4. Framing responsibility belongs to typed `FramingSpec` declarations such as JSON, JSON-RPC, text, bytes, NDJSON, and SSE. A protocol binding may carry or reference a framing spec for a selected carrier, but it must not define payload semantics itself.
  5. `PathSpec.path` remains the first-class address authority. Bindings do not own a separate address path when a containing PathSpec is present.
  6. Semantic responsibility remains in the operation model, canonical operation definitions, hooks, and guards.
  7. Docs generation is binding-driven, but address projection is path-first.
  8. Any new protocol must enter through a protocol BindingSpec, not a parallel route subsystem.
  
  ## Canonical Protocol BindingSpec Update
  
  The canonical BindingSpec set for this governance slice is:
  
  - `HTTPBindingSpec`
  - `WebSocketBindingSpec`
  - `WebTransportBindingSpec`
  
  Convenience aliases remain allowed when they normalize to one of those canonical specs. Examples include REST, JSON-RPC, HTTP stream, SSE, WS/WSS message profiles, and WebTransport session, bidi stream, unidi stream, and datagram profiles.
  
  Aliases are not independent protocol taxonomies. They must expand into canonical BindingSpec fields before KernelPlan compilation, runtime dispatch, documentation projection, or support-matrix evaluation.
  
  ## Protocol Binding And Framing Separation
  
  Bindings select protocol usage and carrier topology such as `rest`, `stream`, `sse`, `message`, `session`, `bidi_stream`, `unidi_client_stream`, `unidi_server_stream`, or `datagram`.
  
  Framing specs select app-level payload interpretation such as `json`, `jsonrpc`, `ndjson`, `sse`, `text`, `bytes`, or `binary`.
  
  Profile/carrier selection and framing are separate concerns. `rest` is not a framing token. `stream` is not a framing token. WebTransport stream and datagram profiles do not imply app-level message framing.
  
  JSON-RPC over HTTP, WebSocket, or WebTransport is modeled as the selected protocol binding plus `JsonRpcFramingSpec`. It is not a separate protocol. WebSocket subprotocol negotiation may be derived from the framing spec where the framing requires a connection-level application protocol token.
  
  ## Context
  
  Transport support in Tigrbl must scale horizontally. The architecture pack already normalizes REST, RPC, streaming, websocket, and WebTransport as bindings over the same semantic model.
  
  The current design also makes path first-class through PathSpec. BindingSpec normalization must preserve that path-first model.
  
  ## Rejected Alternatives
  
  - Separate route subsystems per protocol.
  - Protocol-specific handler decorators with unique semantics.
  - Treating bindings as runtime-only details with no spec representation.
  - Treating each semantic convenience alias as a separate canonical BindingSpec family.
  - Putting address paths directly on BindingSpecs when a containing PathSpec already owns the address.
  
  ## Classification Update
  
  Bindings select and constrain contract event classifications. A binding may choose a family, exchange, profile, framing, and legal event set, but it must not redefine canonical ASGI event identity or require a parallel event-name field at the server/framework boundary.
