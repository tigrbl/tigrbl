body: |-
  ## Decision
  
  1. WebTransport is governed as a session transport with explicit native profiles: `session`, `bidi_stream`, `unidi_client_stream`, `unidi_server_stream`, and `datagram`.
  2. Those profiles are represented through `WebTransportBindingSpec.profile`; Tigrbl does not introduce a separate canonical `lane` field for this policy.
  3. `message` is not a peer native WebTransport transport profile.
  4. App-level message framing, including JSON, JSON-RPC, text, bytes, binary, or NDJSON where explicitly supported, is an inner payload concern inside a selected stream or datagram profile.
  5. `WebTransportBindingSpec.framing=webtransport` governs the outer transport/session layer only. It does not prove inner app-level framing support.
  6. WebTransport stream profiles may target record-oriented framings only when boundary rules are explicit.
  7. WebTransport datagram profiles exclude `jsonrpc` and `ndjson` by default because datagrams do not provide stream continuity or reliable record sequencing.
  8. NDJSON must not be implied as a WebTransport transport framing merely because it may later be used as an application payload shape inside a stream.
  9. WebTransport may not be claimed as first-class support until its event, atom-chain, executor, profile, and inner-framing evidence contracts pass.
  10. WebTransport implementation must not create a separate programming model outside BindingSpec and KernelPlan compilation.
  
  ## Context
  
  WebTransport is visible as a binding/spec surface but remains provisional in support-level governance. The target protocol set requires all tigr-asgi-contract WebTransport events to be represented explicitly while keeping native WT structure clear.
  
  The corrected BindingSpec model uses `profile` for WT session, stream, and datagram variants. This preserves protocol-native distinctions without adding another top-level taxonomy axis.
  
  ## Consequences
  
  - WebTransport session, bidi stream, unidi client stream, unidi server stream, and datagram behavior receive separate SPEC and test coverage.
  - App-framed WebTransport payloads are validated through profile-local framing policy.
  - Certification requires runtime evidence for profile handling and multiplexed session behavior where support is claimed.
  - Docs and support matrices must keep outer transport identity separate from inner payload framing claims.
  
  ## Related
  
  ADR-1005, ADR-1006, ADR-1007, ADR-1023, ADR-1024, ADR-1091, ADR-1092, ADR-1094, ADR-1131, ADR-1133, ADR-1134.
