body: |-
  Decision: Tigrbl projects plain HTTP/3 app behavior through HTTP/3 request/push carrier legality and keeps WebTransport lane semantics in WebTransport-specific bindings.
  
  Owned boundary:
  - Tigrbl owns binding legality and app-facing projection for HTTP/3 request, response, and stream-shaped app behavior.
  - Tigrbl may consume HTTP/3 and QUIC capability metadata from the runtime.
  
  Peer inputs:
  - tigr-asgi-contracts owns contract vocabulary.
  - Tigrcorn owns HTTP/3 and QUIC runtime behavior.
  
  Forbidden claims:
  - Plain HTTP/3 bindings must not claim WebTransport streams or datagrams.
  - Tigrbl must not own QUIC transport stream ID provisioning for plain HTTP/3.
