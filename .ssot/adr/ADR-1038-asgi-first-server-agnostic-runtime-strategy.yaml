body: |-
  Accepted.
  
  Preserve compatibility with Tigrcorn, Uvicorn, Hypercorn, and Gunicorn while keeping framework claims scoped to framework-owned behavior.
  
  Treat other server integrations, including Daphne, Twisted, and Granian, as tracked but out-of-boundary until a future SSOT boundary change explicitly governs them.
