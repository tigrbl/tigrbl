body: |-
  ## Context
  
  Tigrbl owns Python runtime execution. Python runtime implementations must not mix connection open, table creation, index creation, transaction begin, operation execution, and commit inside the per-request execution path. That would mix schema readiness work with ordinary request handling and make request latency reflect bootstrap cost.
  
  Python initialization and explicit DDL/admin operations may prepare schema state, but ordinary CRUD request execution must not silently create tables, create indexes, run migrations, or perform implicit schema readiness work.
  
  ## Decision
  
  DDL and schema readiness are initialization, bootstrap, migration, or explicit DDL/admin work for Tigrbl's Python runtime.
  
  1. Python ordinary request execution must not run DDL, schema migration, table creation, index creation, or implicit schema readiness checks.
  2. Runtime initialization, engine initialization, explicit bootstrap, explicit migration, and explicit DDL/admin operations may run DDL when they are the declared operation.
  3. Idempotent DDL is still DDL and belongs outside ordinary request execution.
  4. If required schema readiness has not been established, ordinary request execution must fail closed with a clear runtime or configuration error unless a deliberately configured development auto-initialization mode is in scope.
  5. Rust/runtime-binding conformance is retired under `adr:1185` and no longer creates evidence obligations for this ADR.
  
  ## Consequences
  
  - Python request paths must prove that `create_all`, schema reflection, or implicit bootstrap do not happen during ordinary CRUD requests.
  - Performance evidence can distinguish runtime execution from schema/bootstrap work.
  - Future engines inherit the same lifecycle boundary.
  - Retired Rust/runtime-binding tests or docs must not be used as evidence for this ADR.
  
  ## Rejected alternatives
  
  - Allowing each runtime to decide independently whether idempotent DDL can run per request.
  - Treating per-request `CREATE TABLE IF NOT EXISTS` as acceptable because it is idempotent.
  - Keeping optional Rust/runtime-binding evidence obligations after selecting a Python-only runtime.
