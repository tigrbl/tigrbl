body: |-
  Summary
  Evidence owns canonical proof linkage.
  
  Decision
  SSOT proof semantics shall use evidence as the canonical proof carrier. Claims remain directly scoped to features through `claim.feature_ids`. Evidence supports claims through `evidence.claim_ids`. Tests and other producers attach to evidence through `evidence.test_ids` or later producer/provenance fields. The canonical proof path is `test -> evidence -> claim`, and the feature assurance path is `feature -> claim <- evidence <- test`.
  
  Claim-to-test links and claim/test evidence mirrors may be retained during a compatibility window, but they shall be treated as derived indexes or planning conveniences. They shall not override evidence-owned proof linkage.
  
  Implications
  Schema, migration, validation, CLI, graph export, lineage views, skills, MCP repair, scaffolding, claim-tier gates, and certification closure shall be updated to use evidence-centered proof authority. Orphan proof evidence shall fail or warn according to lifecycle policy instead of silently appearing as proof.
