body: |-
  Decision proposal: tigrbl.transport.* and tigrbl_concrete.transport.* are retained as public compatibility and authoring shims, not runtime hot-path transport implementations. REST and JSON-RPC runtime dispatch stays on concrete app/router binding through tigrbl_runtime and tigrbl_kernel. Runtime frame codecs in tigrbl_atoms own payload encode/decode behavior for JSON, JSON-RPC, NDJSON, SSE, WebSocket adapter frames, and WebTransport inner frames. Deprecation must preserve import compatibility for one compatibility window, emit explicit DeprecationWarning messages, and provide replacement schema/runtime codec namespaces before removal. Hard removal without the window would break public imports, examples, docs, and existing JSON-RPC schema tests, but not the runtime execution hot path.
