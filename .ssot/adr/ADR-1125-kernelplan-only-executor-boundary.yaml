body: |-
  ## Decision
  Executors consume compiled `KernelPlan` artifacts only, and the core repository supports Python runtime executors only.

  Executor code MUST NOT author protocol policy, transport-chain structure, callback-fence policy, subevent lookup tables, segment descriptions, segment fusion rules, subevent transaction policy, or similar control-flow artifacts at runtime.

  Kernel compilation owns plan authorship. Atoms own concrete executable step behavior. Engines own storage/session/provider behavior. Python executors only traverse the compiled plan, instantiate execution context, invoke planned atoms and engine hooks, and carry plan-defined results and errors forward.

  `tigrbl_kernel` MUST NOT expose alternate in-core Rust compiler, plan, or spec surfaces such as `rust_spec`, `rust_plan`, or `rust_compile` as supported execution/compiler lanes.

  All three implementation layers touched by execution flow, `tigrbl_kernel`, `tigrbl_atoms`, and `tigrbl_runtime`, MUST also follow these structural constraints:
  - zero dynamic field lookup
  - cache-friendly layout
  - protocol-agnostic payload

  ## Context
  The current runtime surface contains helper modules that reconstruct or restate protocol-chain structure, callback policy, subevent handler lookup, transaction policy, and related execution metadata outside the compiled `KernelPlan`.

  That duplicates compiler authority, makes runtime a shadow compiler, and weakens traceability because plan structure can drift between compiler-owned artifacts and runtime-owned helper logic.

  The previous Rust parity lane also duplicated compiler and runtime surfaces that Tigrbl no longer intends to maintain.

  ## Ownership Rules
  1. `tigrbl_kernel` owns Python plan authorship.
  2. `tigrbl_atoms` own executable step implementation.
  3. engines own engine behavior.
  4. `tigrbl_runtime` Python executors consume plans only.

  ## Consequences
  - Runtime helper modules that encode transport chains, callback-fence policy, handler lookup policy, fusion policy, or transaction-unit policy outside the compiled plan are architectural debt and should be migrated toward kernel- or atom-owned surfaces.
  - Rust compiler/plan/spec helpers in `tigrbl_kernel` are retired surfaces and should be deprecated or removed under `adr:1185` and `spc:2187`.
  - Executor changes should trend toward smaller Python orchestration code and richer compiled-plan authority.

  ## Related
  Extends ADR-1100, ADR-1121, ADR-1008, ADR-1016, ADR-1120, and ADR-1185. This ADR sharpens those decisions by making the executor boundary explicit: the executor is not a second compiler, and core does not maintain a second language executor compiler.
