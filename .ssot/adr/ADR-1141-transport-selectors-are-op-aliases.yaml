summary: "Decision: REST method/path, JSON-RPC method, WebSocket path/subprotocol, stream path, and WebTransport lane selectors are aliases to canonical op_id, not independent operation identities. Context: Different transport namespaces can legitimately expose the same semantic operation with different selector forms. Consequences: Selector indices must retain alias-to-op_id mappings, conflict checks must be namespace-aware, and docs/runtime projections must not fork operation identity by transport. Verification: Conformance tests must prove aliases resolve to the intended op_id and fail closed when a selector alias resolves to a different operation without explicit policy."
