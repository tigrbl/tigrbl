tags: []
summary: "Decision: The kernel owns the shape and legality of runtime lifecycle state machines, while the runtime owns concrete transition execution, side effects, and observed transport or engine events. Context: Tigrbl needs formal semantics without moving transport/session mechanics into the kernel or letting adapters invent lifecycle rules. Consequences: Kernel plans must expose lifecycle requirements and legal transition tables; runtime adapters must enforce those tables and record concrete attempt, session, stream, datagram, engine session, atom, and trace identifiers. Verification: Tests must reject undocumented transitions, cross-session and cross-engine-session leakage, unsupported framing fallback, and undeclared engine/session downgrade behavior."
