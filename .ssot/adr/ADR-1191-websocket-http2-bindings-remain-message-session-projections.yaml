body: |-
  Decision: Tigrbl projects WebSocket-over-H2 through WebSocket message and session bindings only, with RFC 8441 carrier capability treated as runtime metadata.
  
  Owned boundary:
  - Tigrbl owns WebSocket binding legality, app-facing session/message projection, subprotocol policy, and fail-closed behavior.
  - Tigrbl does not own RFC 8441 wire behavior.
  
  Peer inputs:
  - tigr-asgi-contracts owns WebSocket contract vocabulary.
  - Tigrcorn owns RFC 8441 runtime support.
  
  Forbidden claims:
  - H2 WebSocket bindings must not be modeled as WebTransport lanes.
  - H2 WebSocket bindings must not be treated as generic H2 app-stream lanes.
