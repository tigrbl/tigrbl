summary: "Runtime rollup is the declared generation of deterministic aggregate summaries from runtime records. It summarizes attempt, trace/qlog, replay, retry, idempotency, diagnostic, effect, and transport-equivalence records without erasing source proof. Rollup outputs may be consumed by compaction, reporting, replay review, or certification evidence when their policy and operators are declared."
