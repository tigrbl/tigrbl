body: |-
  ## Decision`nPOST_RESPONSE is the current canonical internal phase and is projected as POST_EMIT. *.emit_complete subevents occur only after runtime/Tigrcorn acknowledges the relevant send completion fence. Queued or scheduled send is not completion.`n`n## Rationale`nThis gives after-send hooks and callbacks a stable ordering point across HTTP, SSE, WS, WT, callbacks, and webhooks.`n`n## Consequences`nEmit completion requires runtime-owned acknowledgement semantics.`n`n## Traceability`nLinks: adr:1064, adr:1095, adr:1098, adr:1099, spc:2115.
