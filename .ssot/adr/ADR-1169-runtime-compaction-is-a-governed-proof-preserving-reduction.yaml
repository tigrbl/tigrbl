body: |-
  Runtime compaction is a declared reduction of completed runtime proof/state records. It may reduce repeated attempt, trace/qlog, replay, retry, idempotency, diagnostic, and rollup detail, but it must preserve required semantic identity, concrete instance identity, parentage, effect fences, replay drillback, and conformance reviewability.
