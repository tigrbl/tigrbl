body: |-
  Decision: Tigrbl retry and replay behavior must be keyed by runtime identity instead of inferred from transport shape. Replayable work must carry the applicable app_id, router_id, table_id, op_id, attempt_id, session_id, stream_id, datagram_id, engine_session_id, and trace_id identifiers, plus an idempotency or replay policy when mutation effects are possible. Consequence: transports may retry delivery only when the op contract declares stable retry or replay semantics; otherwise retry and replay fail closed with diagnostics.
