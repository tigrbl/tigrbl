summary: "Runtime codec lookup is separate from binding legality. JSON, JSON-RPC, NDJSON, text, bytes, and binary are distinct frame representations. WebTransport outer framing remains webtransport, while application payload framing is lane-scoped through inner_framing after lane legality validation. Unsupported or undeclared lane/framing combinations fail closed and must not silently fall back to generic JSON or text."
