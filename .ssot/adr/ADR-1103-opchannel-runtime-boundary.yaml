body: |-
  ## Decision`nOpChannel protocol/trait belongs at typing/ports boundaries; runtime owns concrete channel adapters; kernel stores only channel requirements and capability masks.`n`n## Rationale`nThis prevents concrete/runtime/kernel coupling while giving transport atoms one execution target.`n`n## Consequences`nPython defines typing protocol in tigrbl_typing and adapters in tigrbl_runtime. Rust defines ports trait and runtime adapters.`n`n## Traceability`nLinks: adr:1002, adr:1005, adr:1025, adr:1086, adr:1095, spc:2099, spc:2108.
