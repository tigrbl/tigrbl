body: |-
  ## Context
  Tigrbl already governs Python/Rust runtime parity lanes and KernelPlan contracts, but atom parity needs a certifiable suite shape with explicit SSOT entities, evidence, and fail-closed drift checks.
  
  ## Decision
  The fully paritable suite is certified only through SSOT ADRs, SPECs, features, tests, claims, evidence, a frozen boundary, and a release row. Each governed atom parity unit must be represented as a first-class feature or an explicit not-applicable record. KernelPlan parity remains a separate certifiable surface and composes with atom parity rather than replacing it.
  
  ## Consequences
  Atom inventory drift is release-relevant. Python and Rust atom surfaces must be compared from generated reports and parity corpus evidence before certification.
