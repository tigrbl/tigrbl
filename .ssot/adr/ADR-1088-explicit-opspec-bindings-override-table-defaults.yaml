body: |-
  Explicit operation binding declarations override table defaults only when represented inside the complete TableProfileSpec.ops declaration.

  Table-level op policy is not split across TABLE_PROFILE and external __tigrbl_ops__/OPS patches. A profile with one op is exactly one op.
