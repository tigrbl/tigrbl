body: |-
  Decision: Tigrbl projects application behavior onto HTTP/2 only through explicit request-stream, push-stream, and extension-context carrier legality.
  
  Owned boundary:
  - Tigrbl owns binding legality, table/profile projection, and fail-closed policy for HTTP/2-capable app behavior.
  - Tigrbl may consume runtime capability metadata but does not own HTTP/2 stream ID allocation or flow-control algorithms.
  
  Peer inputs:
  - tigr-asgi-contracts owns contract vocabulary.
  - Tigrcorn owns HTTP/2 runtime behavior.
  
  Forbidden claims:
  - Tigrbl must not treat HTTP/2 push as generic bidirectional app streaming.
  - Tigrbl must not borrow QUIC or WebTransport stream-ID semantics for HTTP/2 bindings.
