body: |-
  Decision: ASGI transport exposure is controlled by runtime projection policy and binding compatibility, not by table class or documentation profile alone. Rationale: ASGI scope, receive, and send are server-boundary inputs, while Tigrbl operation exposure is a semantic runtime decision. Consequence: runtime exposure must require declared compatible transport binding and must fail closed when unsupported.
