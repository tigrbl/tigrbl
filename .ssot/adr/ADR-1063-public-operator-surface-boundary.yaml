body: |-
  ## Decision
  
  1. Public operator surfaces are the explicitly governed, compatibility-relevant contracts that operators consume through transport, docs, diagnostics, security, and other runtime-facing projections.
  2. Public operator status is explicit; importability or facade export alone does not make a surface public.
  3. Among the schema/helper-like facade exports, only `get_schema()` is governed as a public operator helper surface.
  4. `bind()`, `rebind()`, `build_*()`, and `include_tables()` remain private authoring helpers even when exported from `tigrbl`.
  
  ## Context
  
  The older operator-surface ADR was too coarse and did not distinguish between facade-exported authoring helpers and explicitly supported public operator surfaces.
  
  ## Consequences
  
  - Public operator specs can stay narrow and stable.
  - Authoring helpers no longer need to be treated as operator-facing compatibility commitments.
  - Extension, authoring, and maintainer surfaces can evolve without accidentally widening the public operator boundary.
