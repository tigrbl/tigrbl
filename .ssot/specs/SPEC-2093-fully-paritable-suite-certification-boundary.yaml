body: |-
  ## Purpose
  Define the boundary and certification rules for the fully paritable suite.
  
  ## Requirements
  1. The suite boundary includes all generated atom parity feature rows, KernelPlan parity features, and parity inventory drift controls.
  2. Boundary certification requires frozen scope, linked claims, linked tests, linked evidence, and release coverage for every feature.
  3. Generated reports under .ssot/reports are evidence inputs, not independent authority.
  4. Certification must fail closed for untracked atoms, stale evidence, missing reciprocal links, or runtime lane gaps.
  5. Publication must not proceed until release certification succeeds.
