body: |-
  ## Intent
  
  Define engine-session interoperability for the concrete runtime session wrapper.
  
  ## Invariants
  
  - `DefaultSession` delegates transaction and CRUD methods to the underlying provider session with awaitable awareness.
  - The session wrapper may expose `run_sync()` for sync work on async-backed providers.
  - Interoperability does not invent provider methods that the underlying session does not implement.
  - Session interoperability must cover sync, async, and mixed bootstrap paths.
  
  ## Traceability
  
  - ADRs: `adr:1015`, `adr:1055`
  - Related features: `feat:engine-session-runtime-surface-001`, `feat:defaultsession-concrete-session-class-001`
