summary: "tigrbl_runtime executes compiled Tigrbl kernel plans only. Route and protocol selection, fallback policy, response envelope construction, phase behavior, and operation behavior are owned by tigrbl_kernel, tigrbl_atoms, and tigrbl_ops packages respectively. Runtime changes are limited to compiled plan execution, runtime context compatibility, and declared carrier lifecycle bridges."
