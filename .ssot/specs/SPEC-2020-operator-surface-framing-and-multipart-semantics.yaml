body: |-
  ## Decision
  
  1. Operator framing, multipart, stream, and upload semantics remain runtime contracts.
  2. Documentation projections for those operator surfaces are required parity outputs.
  3. Phase-closure conformance includes runtime/docs parity checks for operator surfaces.
  4. JSON-RPC batch framing is an operator-surface framing contract: batch requests execute in request order and return one result or error projection per request item unless protocol rules explicitly omit a response.
  5. Per-item JSON-RPC batch failures must remain isolated to the failed item and must not cancel sibling items by default.
  
  ## P2 Coverage
  
  - `pkgs/core/tigrbl_tests/tests/i9n/test_jsonrpc_batch_behavior.py`
  
