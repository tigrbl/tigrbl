body: |-
  ## Intent
  
  This document defines the runtime semantics for governed operator surfaces that
  depend on response framing, multipart parsing, or uploaded file handling.
  
  ## Invariants
  
  - streaming responses preserve produced chunk ordering and do not collapse
    multiple chunks into one accidental body.
  - WHATWG event streams emit `text/event-stream` framing compatible with
    produced event boundaries.
  - multipart and form parsing preserve field values without transport-specific
    loss.
  - uploaded-file handling preserves filename, content-type, and body access
    for runtime handlers.
  - docs-backed smoke paths and live runtime execution observe the same
    governed operator-surface semantics.
  
  ## Traceability
  
  - ADRs: `adr:1041`
  - Specs: `spc:2007`
  - Related feature granularity lives in the registry layer.
