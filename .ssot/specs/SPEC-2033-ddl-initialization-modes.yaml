body: |-
  ## Intent
  
  Define the supported DDL bootstrap execution modes and timing across sync and async execution contexts.
  
  ## Supported Bootstrap Modes
  
  - `initialize()` and `bootstrap_dbschema()` are the canonical bootstrap entrypoints for concrete DDL execution timing.
  - Outside a running event loop, DDL bootstrap executes synchronously and closes provider sessions synchronously.
  - Inside a running event loop with synchronous providers, DDL may still bootstrap synchronously and return a no-op or close task as needed.
  - Inside a running event loop with async providers, DDL bootstrap returns an awaitable and uses `run_sync()` or thread offloading where needed.
  - Repeated initialization is guarded by the concrete `_ddl_executed` marker or equivalent idempotence guard.
  
  ## Scope Boundaries
  
  - This spec governs bootstrap execution timing and mode behavior only.
  - Non-bootstrap DDL contract, namespace ensuring, namespace parity, and migration remain separate specs.
  
