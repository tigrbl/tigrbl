summary: "Scope: Define engine session acquisition, engine_session_id allocation, transaction begin, flush, commit, rollback, close, lease/reset behavior, and error handling under one operation attempt. Valid scenario: engine session starts, transaction commits, and session closes under the same attempt_id and trace_id. Invalid scenario: one attempt commits or rolls back a transaction opened by another attempt, or a runtime silently downgrades rollback requirements on an engine that does not declare rollback support. Invariants: no engine session leakage, no cross-attempt transaction mutation, no engine downgrade without declaration, and deterministic rollback/commit outcome reporting."
