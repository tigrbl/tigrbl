summary: "Wall-clock time, random values, unordered concurrent delivery, external service responses, database-generated values, and implementation-specific object layout are nondeterministic unless declared as inputs, constrained by policy, or normalized before comparison. A runtime path claiming determinism must fail closed or emit deterministic contract diagnostics when required nondeterministic inputs are missing or undeclared."
