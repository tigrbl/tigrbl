body: |-
  For every binding, retry ownership must be assigned to transport, runtime, engine adapter, or caller policy. Multiple layers must not independently retry the same semantic operation without a declared coordination policy. Transport-level redelivery must not become semantic retry unless the runtime retry policy declares equivalent behavior and parentage.
