body: |-
  ## Intent
  
  Define first-class outbound webhook delivery.
  
  ## Contract
  
  Webhook delivery declares event schema, outbound transport contract, payload framing, signing and authentication, retry and backoff, timeout, dead-letter handling, idempotency, delivery status, completion subevents, docs projection, and verification behavior.
  
  ## Traceability
  
  ADRs: adr:1099, adr:1100.
