body: |-
  ## Intent
  
  Declare the authoritative two-axis lifecycle matrix where rows are runtime family and subevent selectors and columns are kernel phases.
  
  ## Contract
  
  Subevents are not phases. Every executable unit has exactly one primary subevent. Matrix cells are compiler input and declare participation, hookability, transaction unit, loop region, and legality metadata.
  
  The row axis must use canonical runtime family and subevent selectors derived from the governed `tigr-asgi-contract` vocabulary.
  
  The phase axis and matrix-cell legality metadata are Tigrbl-owned compiler concerns, but the row axis does not define an alternate canonical family set.
  
  Legacy labels such as `socket`, `event_stream`, and repo-local `response` may be accepted only at compatibility boundaries and must be normalized before row generation.
