body: |-
  Defines the generated dataclass binding contract for Tigrbl spec schemas.
  
  Generated dataclasses are checked in under a versioned `tigrbl_spec.models` module layout and are produced by a repository tool, not at package import time.
  
  Generated classes represent the schema contract. Runtime-only behavior and validation that cannot be expressed in JSON Schema must be layered outside the generated contract.
  
  CI must detect drift between packaged schemas and generated dataclasses.
