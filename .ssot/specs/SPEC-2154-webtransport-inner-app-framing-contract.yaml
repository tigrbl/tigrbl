body: |-
  ## Intent
  
  Govern inner application framing for WebTransport without confusing it with the outer WebTransport transport identity.
  
  ## Contract
  
  WebTransport is governed through `WebTransportBindingSpec` profiles:
  
  - `session`
  - `bidi_stream`
  - `unidi_client_stream`
  - `unidi_server_stream`
  - `datagram`
  
  The `session` profile carries session lifecycle metadata and has no app-level payload framing.
  
  The stream profiles may carry app-level framed payloads only when the framing is legal for that profile and record-boundary behavior is explicit.
  
  The datagram profile may carry `bytes`, `binary`, `text`, or `json` payloads. `jsonrpc` and `ndjson` are excluded by default for datagrams because datagrams do not provide reliable stream continuity or ordered record sequencing.
  
  `message` is not a peer native WebTransport profile. Message-shaped application records live inside stream or datagram payload framing where explicitly supported.
  
  ## Required Separation
  
  `webtransport` identifies the outer transport/session layer.
  
  `framing` identifies inner app-level payload interpretation.
  
  `profile` identifies which WebTransport carrier is being used.
  
  In a multiplexed WebTransport session, each stream or datagram keeps its own payload framing metadata. A selected framing on one stream or datagram must not bleed into another lane, and datagram framing restrictions continue to apply even when streams in the same session allow broader record-oriented framing.
  
  ## Validation
  
  Tests must reject claims that `framing=webtransport` proves JSON, JSON-RPC, NDJSON, binary, bytes, text, or message support inside any WebTransport profile.
  
  Tests must reject a native WebTransport `message` profile unless a later ADR explicitly adds one.
  
  Tests that claim Tigrcorn-backed WebTransport multiplexing must prove lane-local framing preservation across at least two streams and two datagrams in one session.
