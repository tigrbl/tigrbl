body: |-
  ## Intent
  
  Define HTTP stream and SSE atom chains.
  
  ## Contract
  
  HTTP stream and SSE chains declare inbound and outbound stream lifecycles, SSE session/message/stream subevents, heartbeat and finalization behavior, iterator producers, transport chunk emission, disconnect handling, and POST_EMIT completion fences.
  
  Outbound HTTP `server_stream` response chains must emit one ASGI response body event for each normalized producer chunk, followed by a terminal empty response body event. Structured `stream`, `json`, and `ndjson` response records are newline-delimited JSON documents. `jsonrpc` response records are complete JSON-RPC 2.0 documents, one envelope per emitted chunk. Raw `bytes` and `binary` records are emitted as bytes; `text` records are UTF-8 encoded text.
  
  ## Traceability
  
  ADRs: adr:1092, adr:1094, adr:1095, adr:1100.
