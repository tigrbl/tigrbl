body: |-
  Defines the package contract for the Tigrbl spec schema catalog.
  
  The `tigrbl_spec` distribution must include versioned schema catalogs under `tigrbl_spec/schemas/{version}/`. Each catalog contains `manifest.json`, `bundle.json`, `shared.json`, and individual JSON Schema files for every governed spec kind.
  
  The schema catalog version is shared across the full catalog. The initial catalog version for this work is `0.3.20`.
  
  Wheel and sdist artifacts must contain the schema catalog files.
