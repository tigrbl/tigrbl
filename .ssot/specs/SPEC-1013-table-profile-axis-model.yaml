summary: "Defines the table profile axis model for separating canonical operation selection, blanket default bindings, per-operation bindings, documentation exposure, runtime exposure, and explicit override rules. A profile must preserve these axes independently during normalization, compilation, diagnostics, docs projection, runtime plan generation, trace, replay, and rollup. Binding profile tokens do not imply operation activation, docs visibility, public network mounting, or ASGI exposure unless those axes are declared."
