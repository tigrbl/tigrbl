body: |-
  ## Intent
  
  This document defines the canonical analytical verb family introduced by the
  Phase 3 operator-surface expansion.
  
  ## Canonical Verbs
  
  - `aggregate`
  - `group_by`
  
  ## Invariants
  
  - the analytical family is public only for the canonical verbs listed here.
  - runtime dispatch, docs builders, and default package exports preserve the
    same analytical family membership.
  - analytical verbs remain governed as semantic operations rather than
    transport-local conveniences.
  
  ## Traceability
  
  - ADRs: `adr:1049`
  - Related feature granularity lives in the registry layer.
