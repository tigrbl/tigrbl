body: |-
  ## Intent
  
  This document defines the canonical analytical verb family introduced by the
  Phase 3 operator-surface expansion.
  
  ## Canonical Verbs
  
  - `aggregate`
  - `group_by`
  
  ## Rules
  
  - the analytical family is public only for the canonical verbs listed here
  - runtime dispatch, docs builders, and default package exports must preserve the
    same analytical family membership
  - analytical verbs are governed as semantic operations, not as transport-local
    conveniences
  
  ## Traceability
  
  - ADRs: `adr:1049`
