body: |-
  ## Intent
  
  Define qualified runtime subevents derived above transport events.
  
  ## Contract
  
  Runtime subevents use qualified family leaves for request, response, session, message, stream, and datagram semantics. Coarse transport channel verbs remain compatibility/default vocabulary and do not replace qualified subevents.
  
