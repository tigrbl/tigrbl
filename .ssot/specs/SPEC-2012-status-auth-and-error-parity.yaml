body: |-
  ## Decision
  
  1. Status/auth/error parity includes runtime and documentation projections.
  2. OpenAPI/OpenRPC documented security schemes and challenges MUST match runtime behavior.
  3. Docs/runtime divergence in auth or error behavior is non-conforming.
