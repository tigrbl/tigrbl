body: |-
  ## Decision
  
  1. Status/auth/error parity includes runtime and documentation projections.
  2. OpenAPI/OpenRPC documented security schemes and challenges MUST match runtime behavior.
  3. Docs/runtime divergence in auth or error behavior is non-conforming.
  4. REST and JSON-RPC errors MUST derive from the same canonical outcome rules.
  5. Anonymous access, auth provider behavior, API key behavior, owner/tenant policy, and key digest behavior are parity-sensitive runtime contracts.
  6. Validation errors and transport error envelopes may differ only by protocol-native projection shape.
  
  ## P2 Coverage
  
  - `pkgs/core/tigrbl_tests/tests/i9n/test_allow_anon.py`
  - `pkgs/core/tigrbl_tests/tests/i9n/test_apikey_generation.py`
  - `pkgs/core/tigrbl_tests/tests/i9n/test_authn_provider_integration.py`
  - `pkgs/core/tigrbl_tests/tests/i9n/test_key_digest_uvicorn.py`
  - `pkgs/core/tigrbl_tests/tests/i9n/test_owner_tenant_policy.py`
  - `pkgs/core/tigrbl_tests/tests/i9n/test_error_mappings.py`
  
