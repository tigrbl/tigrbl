body: |-
  ## Intent
  
  This document governs status, auth, validation, and error projection parity
  for the current recovery lane.
  
  ## Invariants
  
  - allow-anon behavior derives only from canonical security metadata and
    matches generated documentation.
  - canonical create success projects to REST `201 Created` unless an explicit
    operation contract overrides it.
  - authentication and authorization failures are classified once and projected
    consistently across transports.
  - canonical validation failures preserve parity between REST and JSON-RPC
    projections.
  - success and error envelopes preserve governed response structure rather than
    transport-specific shapes.
  
  ## Targeted Failing Lanes
  
  - `pkgs/core/tigrbl_tests/tests/i9n/test_allow_anon.py`
  - `pkgs/core/tigrbl_tests/tests/i9n/test_apikey_generation.py`
  - `pkgs/core/tigrbl_tests/tests/i9n/test_authn_provider_integration.py`
  - `pkgs/core/tigrbl_tests/tests/i9n/test_error_mappings.py`
  
  ## Implementation Expectations
  
  - Fixes should centralize projection rules instead of patching individual handlers or routes one by one.
  - Documentation-support behavior must remain aligned with runtime anon-access and error-shape rules.
  - Response-structure regressions are release-blocking because they directly affect client interoperability.
  
  ## Traceability
  
  - ADRs: `adr:1032`
  - Related feature granularity lives in the registry layer.
