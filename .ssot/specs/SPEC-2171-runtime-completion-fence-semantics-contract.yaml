summary: "Scope: Define completion fences for runtime send completion, emit completion, stream close, datagram acceptance, peer delivery claims, failure, and terminal attempt completion. Valid scenario: stream, message, or datagram result reports the observed local completion fence before terminal success. Invalid scenario: runtime claims peer delivery when it only observed local send completion, or maps unsupported framing to another framing without declaration. Invariants: delivery claims are bounded by observed evidence, unsupported framing fails closed, retry/replay metadata preserves attempt boundaries, and completion cannot be asserted through an undocumented lifecycle transition."
