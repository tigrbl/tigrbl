body: |-
  ## Intent
  
  Define the canonical BindingSpec normalization contract for Tigrbl.
  
  ## Canonical Protocol BindingSpecs
  
  The canonical protocol BindingSpec set is:
  
  | Canonical spec | Transport identity | Secure selector | Carrier/profile selector |
  |---|---|---|---|
  | `HTTPBindingSpec` | HTTP-family request and stream transports | `secure=false` for HTTP and `secure=true` for HTTPS | `rest`, `jsonrpc`, `stream`, `client_stream`, `server_stream`, `sse` |
  | `WebSocketBindingSpec` | WebSocket message transport | `secure=false` for WS and `secure=true` for WSS | `message`, `jsonrpc`, `ndjson` |
  | `WebTransportBindingSpec` | WebTransport session transport | `secure=false` for WT and `secure=true` for secure WT where represented | `session`, `bidi_stream`, `unidi_client_stream`, `unidi_server_stream`, `datagram` |
  
  `StdioBindingSpec` is out of scope for this contract.
  
  ## Canonical Fields
  
  Canonical protocol BindingSpecs must expose or normalize into:
  
  - `secure`
  - `profile`
  - `family`
  - `exchange`
  - `framing`, as a typed `FramingSpec` child or equivalent normalized reference
  
  `PathSpec.path` owns the address path. BindingSpecs must not define an independent path field that conflicts with the containing PathSpec.
  
  `PathSpec.kind` remains an address-category discriminator. It is not the same as BindingSpec `profile`.
  
  Canonical AppSpec composition keeps BindingSpecs under `OpSpec.bindings`. `AppSpec`, `RouterSpec`, `PathSpec`, and `TableSpec` may own `ops`, but they MUST NOT own direct `bindings` collections.

  ## FramingSpec Authoring
  
  Authoring `framing` fields must contain concrete typed `FramingSpec` values. String or literal framing tokens are invalid as canonical authoring input.
  
  | Kind | Typed framing spec |
  |---|---|
  | `json` | `JsonFramingSpec` |
  | `jsonrpc` | `JsonRpcFramingSpec` |
  | `text` | `TextFramingSpec` |
  | `bytes` | `BytesFramingSpec` |
  | `binary` | `BinaryFramingSpec` |
  | `ndjson` | `NdjsonFramingSpec` |
  | `sse` | `SseFramingSpec` |
  
  The framing spec owns payload interpretation. The protocol binding owns carrier/session topology.
  
  `webtransport` is not a framing kind. WebTransport BindingSpecs own session and lane topology, while `control_stream`, `streams`, and `datagrams` declare typed lane-local app framing when they carry app payloads.

  ## Alias Normalization
  
  Convenience aliases are valid only as authoring shortcuts. Before compiler, runtime, docs, or support-matrix use, they normalize as follows:
  
  | Alias | Canonical protocol spec | secure | profile | family | exchange | default framing spec |
  |---|---|---:|---|---|---|---|
  | `HttpRestBindingSpec` | `HTTPBindingSpec` | `false` | `rest` | `request` | `unary` | `json` |
  | `HttpsRestBindingSpec` | `HTTPBindingSpec` | `true` | `rest` | `request` | `unary` | `json` |
  | `HttpJsonRpcBindingSpec` | `HTTPBindingSpec` | `false` | `rest` or `rpc_endpoint` | `request` | `unary` | `JsonRpcFramingSpec` |
  | `HttpsJsonRpcBindingSpec` | `HTTPBindingSpec` | `true` | `rest` or `rpc_endpoint` | `request` | `unary` | `JsonRpcFramingSpec` |
  | `HttpStreamBindingSpec` | `HTTPBindingSpec` | `false` | `server_stream` | `stream` | `server_stream` | `bytes` |
  | `HttpsStreamBindingSpec` | `HTTPBindingSpec` | `true` | `server_stream` | `stream` | `server_stream` | `bytes` |
  | `HttpClientStreamBindingSpec` | `HTTPBindingSpec` | `false` | `client_stream` | `stream` | `client_stream` | `bytes` |
  | `HttpsClientStreamBindingSpec` | `HTTPBindingSpec` | `true` | `client_stream` | `stream` | `client_stream` | `bytes` |
  | `SseBindingSpec` | `HTTPBindingSpec` | `false` | `sse` | `stream` | `server_stream` | `sse` |
  | `HttpsSseBindingSpec` | `HTTPBindingSpec` | `true` | `sse` | `stream` | `server_stream` | `sse` |
  | `WsBindingSpec` | `WebSocketBindingSpec` | `false` | `message` | `message` | `duplex` | `text` |
  | `WssBindingSpec` | `WebSocketBindingSpec` | `true` | `message` | `message` | `duplex` | `text` |
  | `WsJsonRpcBindingSpec` | `WebSocketBindingSpec` | `false` | `message` | `message` | `duplex` | `JsonRpcFramingSpec`; derives `jsonrpc` subprotocol |
  | `WssJsonRpcBindingSpec` | `WebSocketBindingSpec` | `true` | `message` | `message` | `duplex` | `JsonRpcFramingSpec`; derives `jsonrpc` subprotocol |
  | `WsNdjsonBindingSpec` | `WebSocketBindingSpec` | `false` | `ndjson` | `message` | `duplex` | `ndjson` |
  | `WssNdjsonBindingSpec` | `WebSocketBindingSpec` | `true` | `ndjson` | `message` | `duplex` | `ndjson` |
  | `WebTransportSessionBindingSpec` | `WebTransportBindingSpec` | profile-local | `session` | `session` | `unary` | none |
  | `WebTransportBidiStreamBindingSpec` | `WebTransportBindingSpec` | profile-local | `bidi_stream` | `stream` | `duplex` | `bytes` |
  | `WebTransportClientStreamBindingSpec` | `WebTransportBindingSpec` | profile-local | `unidi_client_stream` | `stream` | `client_stream` | `bytes` |
  | `WebTransportServerStreamBindingSpec` | `WebTransportBindingSpec` | profile-local | `unidi_server_stream` | `stream` | `server_stream` | `bytes` |
  | `WebTransportDatagramBindingSpec` | `WebTransportBindingSpec` | profile-local | `datagram` | `datagram` | `duplex` | `bytes` |
  
  ## Rules
  
  Alias expansion must be deterministic and idempotent.
  
  Alias expansion must not change the containing `PathSpec.path`.
  
  Profile and framing are separate. `rest`, `stream`, `server_stream`, `client_stream`, `message`, `session`, `bidi_stream`, `unidi_client_stream`, `unidi_server_stream`, and `datagram` are profile or classification values, not app-level framing tokens.
  
  JSON-RPC is an application framing. It is not a canonical protocol binding. Legacy aliases using JSON-RPC in the class name normalize to the selected protocol binding plus `JsonRpcFramingSpec`.
  
  WebTransport aliases and protocol bindings MUST NOT declare top-level app framing. Session/control/stream/datagram payload framing is lane-local and typed.

  Runtime support claims must be made against canonical protocol BindingSpec plus carrier/profile plus typed framing spec, not against alias names alone.
  
  ## Validation
  
  Static tests must prove every supported alias has one canonical expansion row.
  
  Runtime-facing tests must prove alias expansion happens before KernelPlan classification and docs/support projection.
  
  Negative tests must reject profile/framing confusion and BindingSpec path conflicts.
