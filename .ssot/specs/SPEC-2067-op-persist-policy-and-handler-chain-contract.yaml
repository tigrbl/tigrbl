body: |-
  ## Intent
  
  Define how operation persist policy is normalized and consumed by handler-chain, transaction, and storage projections.
  
  ## Canonical Surface
  
  - Persist policy belongs to the normalized operation declaration.
  - Public authoring tokens such as `skip`, `none`, `read`, `write`, `default`, and `persist` must normalize before runtime projection.
  - Canonical operations and custom operations use the same persist-policy vocabulary.
  - Persist policy must not be interpreted independently by REST, RPC, docs, or decorator layers.
  
  ## Projection Rules
  
  - Handler-chain builders consume normalized persist policy.
  - Transaction and persistence steps are included or skipped based on normalized policy.
  - Core handler selection remains target-driven; persist policy only controls persistence and transaction projection around the selected handler behavior.
  - Persist policy effects must be inspectable through owner-local hook or handler-chain registries.
  
