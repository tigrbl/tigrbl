body: |-
  ## Intent
  
  Define the governed runtime boundary for schema migration as distinct from bootstrap-only DDL helpers.
  
  ## Invariants
  
  - Schema migration is a distinct runtime surface from bootstrap-only DDL helpers such as `initialize()`, `ensure_schemas()`, `bootstrap_dbschema()`, and `register_sqlite_attach()`.
  - Migration ownership includes versioned changesets, planning, upgrade/downgrade execution, and compatibility boundaries across engines.
  - The active line may track the migration surface as absent or backlog work without treating that absence as an inventory gap.
  - Future migration work must not overload bootstrap helpers with version-history semantics.
  
  ## Traceability
  
  - ADRs: `adr:1055`
  - Related features: `feat:schema-migration-runtime-surface-001`
