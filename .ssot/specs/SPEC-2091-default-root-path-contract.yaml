body: |-
  ## Purpose
  
  Declare the default root-path behavior for Tigrbl Python runtime surfaces and apps.
  
  ## Scope
  
  This SPEC applies to Tigrbl app instances, Python executor paths, and framework-owned demos or server adapters that expose Tigrbl runtime behavior.
  
  ## Requirements
  
  1. A Tigrbl runtime surface MUST treat path `/` with method `GET` as a framework-owned default root request when no explicit non-default root binding is present.
  2. The default root response MUST use HTTP status `200`.
  3. The default root response body MUST be the JSON object `{ok: true}`.
  4. The default root response MUST be installed for all Tigrbl apps, including apps with system mounts disabled.
  5. An app, router, or compiled runtime plan that declares an explicit non-default root binding for `/` MUST override the default root response.
  6. Override detection MUST remove or bypass the framework default before dispatch when the explicit root route is registered on an app.
  7. Runtime default-root handling MUST NOT acquire an engine session, begin a transaction, or execute persistence work.
  8. The default root response MUST NOT replace `/system/healthz`, diagnostics endpoints, docs mounts, or application-owned root handlers.
  9. Conformance tests MUST cover both default root behavior and explicit-root override behavior for Python runtime lanes.
  10. Optional Rust/runtime-binding root behavior is retired under `adr:1185` and is not a required conformance lane.
  
  ## Non-Goals
  
  - This SPEC does not define health-check semantics beyond the static default root fallback.
  - This SPEC does not require POST, HEAD, WebSocket, JSON-RPC, or non-GET root behavior.
  - This SPEC does not require applications to expose docs or system diagnostics at `/`.
  
  ## Traceability
  
  This SPEC is governed by ADR-1087 and ADR-1185.
