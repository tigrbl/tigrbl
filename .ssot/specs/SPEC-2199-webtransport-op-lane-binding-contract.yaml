body: |-
  ## Intent
  
  Define how different `OpSpec` entries bind to different WebTransport lanes, streams, and datagrams under one session.
  
  ## Contract
  
  A WebTransport operation binding must identify:
  
  - the WebTransport session path or containing PathSpec;
  - the selected carrier: `session`, `bidi_stream`, `unidi_client_stream`, `unidi_server_stream`, or `datagram`;
  - a stable lane name or purpose when more than one carrier is declared for the table;
  - control-stream reservation metadata when the first bidirectional stream is reserved for control;
  - the lane-local `FramingSpec`.
  
  ## Operation Mapping
  
  CRUD and control-plane operations SHOULD bind to a `control` bidirectional stream when JSON-RPC framing is selected.
  
  Event and server-output operations SHOULD bind to `events` server streams or explicitly declared bidirectional streams.
  
  Upload and client-input operations SHOULD bind to `upload` client streams.
  
  Low-latency unordered or lossy operations SHOULD bind to datagram lanes and must use datagram-compatible framing.
  
  ## Examples
  
  One table may declare:
  
  - `create` on `control` / `bidi_stream` / `JsonRpcFramingSpec`;
  - `tail` on `events` / `unidi_server_stream` / `NdjsonFramingSpec`;
  - `append_chunk` on `upload` / `unidi_client_stream` / `BytesFramingSpec`;
  - `send_presence` on `presence` / `datagram` / `JsonFramingSpec`.
  
  ## Rules
  
  The first control stream policy is protocol topology. It does not itself imply JSON-RPC; the control stream's framing spec must declare JSON-RPC if JSON-RPC envelopes are required.
  
  A lane-local framing spec must not bleed into another lane in the same WebTransport session.
  
  `JsonRpcFramingSpec` and `NdjsonFramingSpec` are invalid on datagram lanes by default.
  
  A table that declares multiple operations on the same named lane must use compatible carrier and framing metadata for those operations or fail closed.
  
  ## Validation
  
  Tests must prove at least four operations on one table can lower to the `control`, `events`, `upload`, and `presence` lane examples with independent framing metadata.
  
  Negative tests must reject datagram JSON-RPC, datagram NDJSON, and conflicting carrier/framing declarations for one named lane.
