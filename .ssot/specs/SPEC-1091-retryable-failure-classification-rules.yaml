body: |-
  Only declared retryable failure classes may trigger retry. Retryable classifications must distinguish transient transport delivery, transient engine conflict, backpressure, timeout, cancellation, disconnect, unsupported framing, closed session, validation error, auth error, and permanent semantic failure. Unsupported framing, closed session mutation, validation failure, and undeclared engine downgrade must not be retried.
