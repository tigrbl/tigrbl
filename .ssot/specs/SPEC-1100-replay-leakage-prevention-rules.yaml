summary: "Replay must not cross session, stream, datagram, engine session, transaction, table, operation, principal, tenant, or runtime plan partitions unless a declared policy creates a new owned replay partition. Replaying a closed session, unsupported framing failure, rejected input, or foreign engine-session state preserves the original fail-closed outcome and cannot reopen or mutate the original partition."
