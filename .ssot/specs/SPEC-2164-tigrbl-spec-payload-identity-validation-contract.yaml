body: |-
  Defines the payload identity and validation contract for Tigrbl spec payloads.
  
  Every root spec payload must carry `spec_kind`, `spec_schema_version`, and `spec_type`.
  
  `spec_type` is the stable URN `urn:tigrbl:spec:{spec_kind}:{spec_schema_version}`.
  
  The public `tigrbl_spec` API must load schemas, resolve current and supported catalog versions, validate payloads by kind, and provide a load/validate/migrate path for consumers.
