body: |-
  ## Intent
  
  Define the contract for attaching operation declarations through `op_ctx`, `op_alias`, `alias_ctx`, and equivalent authoring helpers.
  
  ## Canonical Surface
  
  - Internal decorator attachment and external `bind=` attachment must produce canonical owner-local operation declarations.
  - Attachment targets include model classes, app classes, app instances, router classes, plain objects, and explicit collections of bind targets.
  - Multiple-target binding must place equivalent declarations on each target without sharing mutable declaration state.
  - Dynamic attachment must be discoverable by the same owner-local operation registry used for inline declarations.
  - Attachment helpers may wrap callables for descriptor behavior, but the canonical operation declaration remains inspectable on the attached callable or owner carrier.
  
  ## Projection Rules
  
  - Authoring helpers normalize public decorator inputs before attachment.
  - Attachment does not decide transport eligibility, core handler selection, persistence behavior, or documentation output by itself.
  - Owner-local registries remain the source consumed by later builders such as schema, hook, handler, REST, RPC, and docs projections.
  
  ## Traceability
  
