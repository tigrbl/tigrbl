summary: "For governed operations, same normalized input, same compiled runtime plan, same declared engine state, same idempotency or replay state, and same transport binding semantics must produce the same normalized result, error classification, persistence effects, emitted diagnostics, trace/qlog records, replay manifest, and rollup summary. Raw timing, transport byte layout, and ungoverned external effects are outside the invariant unless declared as normalized inputs."
