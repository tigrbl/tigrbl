body: |-
  ## Intent
  
  This document defines the target grammar and loading semantics for the unified
  `tigrbl` CLI when resolving app, router, and factory targets.
  
  ## Invariants
  
  - `<module:attr>` targets resolve as module-addressed imports without
    path-style parsing side effects.
  - `<path.py:attr>` targets preserve Windows absolute paths and split only on
    the final `:attr` segment rather than the drive-letter colon.
  - resolved target attributes may yield an app object, a router object, or a
    zero-arg factory returning one of those surfaces.
  - loader failures classify as target-resolution errors rather than as
    unrelated import-path corruption.
  - command execution and server-selection entrypoints use the same target
    loader implementation.
  
  ## Non Goals
  
  - live server capability negotiation
  - packaging or install-time smoke certification
  
  ## Traceability
  
  - ADRs: `adr:1039`
  - Related specs and implementation tracking live in the registry layer.
