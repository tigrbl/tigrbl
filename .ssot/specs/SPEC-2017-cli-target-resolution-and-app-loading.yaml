body: |-
  ## Intent
  
  This document defines the target grammar and loading semantics for the unified
  `tigrbl` CLI when resolving app, router, and factory targets.
  
  ## Rules
  
  - supported target forms are `<module:attr>` and `<path.py:attr>`
  - path-based targets must preserve Windows absolute paths without treating the
    drive-letter colon as the module/attribute separator
  - when a path-based target is used, the module name is derived from the file
    path and the final `:attr` segment only
  - target attributes may resolve to an app object, router object, or zero-arg
    factory returning one of those surfaces
  - loader failures must classify as target-resolution errors rather than as
    unrelated import-path corruption
  - command and server-selection paths must share the same target loader
  
  ## Non Goals
  
  - live server capability negotiation
  - packaging or install-time smoke certification
  
  ## Traceability
  
  - ADRs: `adr:1039`
  - Features: `feat:cli-target-resolution-001`, `feat:cli-001`, `feat:cli-002`
