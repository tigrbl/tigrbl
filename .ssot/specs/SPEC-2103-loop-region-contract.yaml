body: |-
  ## Intent
  
  Define first-class loop regions for repeated protocol execution.
  
  ## Contract
  
  Loop regions declare bounded or unbounded behavior, producer type, stream/message/datagram loop role, break conditions, close and disconnect handling, loop-local errors, and loop-local transaction boundary eligibility.
  
  ## Traceability
  
  ADRs: adr:1093, adr:1094, adr:1100.
