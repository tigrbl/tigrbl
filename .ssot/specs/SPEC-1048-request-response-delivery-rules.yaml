body: |-
  HTTP REST and HTTP JSON-RPC request-response bindings declare a single request attempt by default. The transport binding must not claim implicit retry, replay, exactly-once delivery, or cross-attempt ordering unless the op contract and runtime policy explicitly declare that behavior.
