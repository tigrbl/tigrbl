summary: "Diagnostics, trace records, qlog records, replay manifests, and rollup records must be stable for the same normalized attempt. Required stable fields include event kind, op_id, runtime_plan_id, atom_id or hook_id where applicable, attempt_id policy, session or engine-session parentage, error classification, rejection reason, source spec or binding provenance, and effect-fence state."
