body: |-
  ## Intent
  
  Define WebTransport session, stream, datagram, and app-framed atom chains.
  
  ## Contract
  
  WebTransport chains declare session open/accept/ready, bidirectional stream receive/send, client-to-server unidirectional stream receive, server-to-client unidirectional stream send, datagram receive/send, app-framed payload decode/encode paths, disconnect behavior, subevent ordering, and transport completion.
  
  WebTransport is modeled as one session with native lanes for bidirectional streams, client-to-server unidirectional streams, server-to-client unidirectional streams, and datagrams.
  
  Bidirectional stream lanes classify as `family=stream` and `exchange=duplex`.
  
  Client-to-server unidirectional stream lanes classify as `family=stream` and `exchange=client_stream`.
  
  Server-to-client unidirectional stream lanes classify as `family=stream` and `exchange=server_stream`.
  
  Datagram lanes classify as `family=datagram`; where both peers may send datagrams under a session, the exchange is `duplex`.
  
  App-framed message decode/encode is inner payload framing within stream or datagram lanes. `message` is not a peer native WebTransport transport lane.
  
  System atom handlers for `open_bidi_stream`, `open_unidi_stream`, `close_stream`, and `close_session` project semantic WebTransport control commands into wire-effect planning. They must preserve the distinction between command emission and delegated runtime stream or session allocation.
  
  ## Multiplexing Proof Boundary
  
  Native WebTransport multiplexing is proven only when one WebTransport session preserves independent lane identity across mixed traffic. Required evidence includes:
  
  - a single `scope[type] == webtransport` and single `session_id`;
  - at least two bidirectional stream ids;
  - at least one client-to-server unidirectional stream id;
  - at least one server-to-client unidirectional stream id;
  - at least two datagram ids;
  - interleaved stream and datagram send/receive events;
  - no native `webtransport.message.*` event path;
  - close behavior that prevents new stream or datagram traffic after session termination.
  
  Policy-only lane matrices and single-lane bridge tests do not satisfy this multiplexing proof boundary.
  
  ## Traceability
  
  ADRs: adr:1091, adr:1092, adr:1094, adr:1096, adr:1100, adr:1132, adr:1198.
