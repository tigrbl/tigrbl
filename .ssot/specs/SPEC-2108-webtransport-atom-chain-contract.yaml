body: |-
  ## Intent
  
  Define WebTransport session, stream, datagram, and app-framed atom chains.
  
  ## Contract
  
  WebTransport chains declare session open/accept/ready, stream receive/send, datagram receive/send, app-framed message decode/encode paths, disconnect behavior, subevent ordering, and transport completion.
  
