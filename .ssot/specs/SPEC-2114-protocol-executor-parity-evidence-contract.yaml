body: |-
  ## Intent
  
  Define evidence requirements for Python and Rust protocol executor parity.
  
  ## Contract
  
  Parity evidence covers atom order, event order, phase tree shape, loop behavior, iterator behavior, WebTransport subevents, callbacks, webhooks, error branches, and transport completion semantics.
  
  ## Traceability
  
  ADRs: adr:1020, adr:1088, adr:1093, adr:1094, adr:1100.
