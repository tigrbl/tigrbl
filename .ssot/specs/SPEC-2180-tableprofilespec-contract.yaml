body: |-
  TableProfileSpec is the typed table-level profile declaration.

  It includes kind, role, ops, default_bindings, docs_exposure, runtime_exposure, custom, and namespace. Its ops field uses existing OpSpec entries and represents the complete table-level op set. Its default_bindings field uses existing BindingSpec entries.
