body: |-
  The idempotency record and the protected operation effect must be fenced together. Commit may publish duplicate success only when both the effect and idempotency record are committed. Rollback, constraint failure, unsupported engine capability, or aborted lifecycle transition must not leave a reusable success record. Partial state must fail closed or remain pending according to declared recovery policy.
