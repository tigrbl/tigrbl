summary: "Contract: model mapping binds handlers.<op>.invoke, handlers.<op>.dispatch, and handlers.<op>.core to the parent class. invoke executes the full op lifecycle, dispatch skips ingress, post-commit, and egress while retaining dispatch-side behavior, and core invokes only the parent-bound op core callable. The concrete mapping layer owns model/alias resolution for these callables and delegates only explicit phase-chain execution to runtime. Runtime must not provide tigrbl_runtime.executors.invoke or any equivalent direct op invocation module. Existing raw compatibility aliases remain callable but are not the canonical names."
