body: |-
  Compiled atom and hook chains must emit a minimal runtime requirement projection for each governed op and runtime plan. The projection records enforceable requirements only: lifecycle, identity, engine, transport, framing, delivery, idempotency, retry, replay, diagnostics, and rollup or compaction requirements. It must not become a redundant capability vector or full atom inventory.
