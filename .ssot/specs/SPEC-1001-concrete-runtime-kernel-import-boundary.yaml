body: |-
  ## Contract
  
  1. `tigrbl_concrete` package source must not contain static imports from `tigrbl_kernel`.
  2. `tigrbl_concrete` package source must not contain literal dynamic import calls targeting `tigrbl_kernel`.
  3. Importing `tigrbl_concrete` must not load `tigrbl_kernel` into `sys.modules`.
  4. `pkgs/core/tigrbl_concrete/pyproject.toml` must not list `tigrbl-kernel` in required or optional dependencies.
  5. `tigrbl_runtime` remains the authorized package boundary for importing `tigrbl_kernel` and mediating kernel lifecycle operations.
  
  ## Required Verification
  
  - Static AST scan of `pkgs/core/tigrbl_concrete/tigrbl_concrete` for forbidden imports.
  - Dependency metadata scan of `pkgs/core/tigrbl_concrete/pyproject.toml`.
  - Isolated interpreter import probe proving `import tigrbl_concrete` does not load `tigrbl_kernel`.
  
  ## Non-Conformance
  
  A direct `tigrbl_concrete` import of `tigrbl_kernel`, a literal dynamic import of `tigrbl_kernel`, a direct package dependency on `tigrbl-kernel`, or transitive kernel loading during package import is release-blocking for this boundary.
