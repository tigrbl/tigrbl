tags: []
summary: "A direct `tigrbl_concrete` import of `tigrbl_kernel`, a literal dynamic import of `tigrbl_kernel`, a direct package dependency on `tigrbl-kernel`, or transitive kernel loading during package import is release-blocking for this boundary."
