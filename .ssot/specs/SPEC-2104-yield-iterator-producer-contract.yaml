  ## Intent
  
  Define sync and async iterator producers for loop regions.
  
  ## Contract
  
  Iterator producers normalize sync and async iteration, cancellation, finalization, exception mapping, chunk typing, backpressure signals, and terminal emission into executor-visible loop behavior.
  
