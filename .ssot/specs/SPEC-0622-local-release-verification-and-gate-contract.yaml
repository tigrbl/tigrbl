body: |-
  ## Status
  
  Draft contract.
  
  ## Verification
  
  A local verifier validates schemas, recomputes governed source hashes, recomputes source root hash, validates evidence bundle contents, verifies evidence paths, compares artifact hashes, and emits a canonical verification report.
  
  ## Gates
  
  Release certification, promotion, and publication may be configured to require a current source snapshot, evidence bundle, artifact manifest, and passing verification report.
  
  When configured for `T3` enforcement, the local release verification report is a `T3` gate input. `T3` evidence or verification reports SHOULD record:
  
  - release id,
  - boundary ids,
  - source snapshot id or hash,
  - evidence bundle id or hash,
  - artifact manifest id or hash,
  - verification report result,
  - certification guard result,
  - blocking issue result,
  - blocking risk result.
  
  `T3` evidence SHALL NOT be treated as a repeated `T2` test report without release, boundary, or profile certification context.
  
  ## Policy
  
  Policy controls should define required artifact kinds, path policy mode, required bundle/report presence, and whether assurance gates are advisory or blocking.
