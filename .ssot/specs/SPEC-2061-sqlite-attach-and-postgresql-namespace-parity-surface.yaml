body: |-
  ## Intent
  
  Define the governed parity rules between PostgreSQL schema namespaces and SQLite attachment maps.
  
  ## Canonical Surface
  
  - The namespace concept covered here is the PostgreSQL schema-like namespace and its SQLite attachment-map equivalent.
  - `register_sqlite_attach()` is the governed attachment-registration helper for SQLite namespace parity behavior.
  - Bootstrap helpers such as `bootstrap_dbschema()` may apply namespace parity rules during bootstrap, but parity remains distinct from bootstrap timing and from generic DDL contract.
  - Namespace parity does not govern model/table/column/datatype schema definitions and does not govern migration history.
  
  ## Invariants
  
  - PostgreSQL namespace preparation and SQLite attachment registration must remain semantically aligned where Tigrbl claims cross-engine namespace support.
  - SQLite attachment behavior is not described as `CREATE SCHEMA`; it is the parity mechanism for the namespace concept on SQLite.
  - Public operator and docs surfaces do not redefine namespace parity semantics.
  
  ## Traceability
  
  - ADRs: `adr:1055`, `adr:1064`
  - Related features: `feat:sqlite-attach-runtime-surface-001`, `feat:bootstrap-dbschema-runtime-surface-001`, `feat:ddl-runtime-surface-001`
