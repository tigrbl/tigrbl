summary: "Delivery state must be partitioned by the applicable runtime identity tuple, including app_id, router_id, table_id, op_id, attempt_id, session_id, stream_id, datagram_id, engine_session_id, and trace_id. No transport session, stream, datagram, or engine session may observe or mutate delivery state owned by another identity partition."
