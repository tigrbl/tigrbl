tags: []
summary: "Scope: define how ASGI scope maps to Tigrbl transport metadata without making ASGI scope the semantic authority. Required projection fields include scope type, method, path, query string, headers, client and server tuples, scheme, root path, subprotocols, extension metadata, WebTransport metadata where present, and normalized semantic and concrete ids. Valid scenarios include HTTP scope projecting request metadata, websocket scope projecting session/message metadata, and WebTransport-like scope projecting session metadata with explicit extension handling. Invalid scenarios include server-specific scope extensions becoming canonical state without an allowlist rule or missing identity fields being silently synthesized without trace."
