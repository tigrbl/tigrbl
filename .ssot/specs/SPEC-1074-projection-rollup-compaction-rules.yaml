summary: "Requirement projection must be compact enough to support runtime plan summaries, trace rollups, qlog correlation, replay manifests, and compaction without expanding the full atom chain. Rollups must preserve drillback to source atom_id, hook_id, op_id, runtime_plan_id, and concrete parentage so summaries remain auditable and leakage-safe."
