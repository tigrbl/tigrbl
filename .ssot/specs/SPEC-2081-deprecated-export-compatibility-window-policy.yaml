body: |-
  ## Decision
  
  1. Deprecated public exports may remain available only inside an explicitly declared compatibility window.
  2. The compatibility window must identify the version where deprecation starts and the version boundary where removal is expected.
  3. Deprecated exports must remain discoverable as deprecated while they are still exposed.
  4. After the declared removal boundary, the deprecated export must be absent unless a later accepted ADR extends the window.
  5. Release promotion may treat stale deprecated exports as non-conforming when the removal boundary has passed.
  
