summary: "Trace and qlog records for session-affecting work must preserve enough semantic and concrete parentage to prove ownership. Required fields are event-kind specific but include trace_id plus applicable app_id, router_id, table_id, op_id, atom_id, attempt_id, session_id, stream_id, datagram_id, engine_session_id, transaction_id, replay_id, and original_attempt_id."
