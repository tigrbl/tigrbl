summary: "Retry and replay are valid only when the op contract declares idempotency, replay, or stable retry semantics for the operation and its side effects. Mutation retries require an idempotency key or declared replay policy; otherwise retry and replay must fail closed with a deterministic unsupported-policy diagnostic."
