summary: "Atom-chain requirement projection must declare engine and transaction requirements before execution. Examples include transaction ownership, rollback requirement, constraint behavior, schema readiness, engine session parentage, isolation level where declared, and unsupported capability rejection. A chain requiring rollback, schema readiness, or engine-session isolation must not execute on an engine path that lacks those requirements unless an explicit downgrade is declared and accepted by policy."
