summary: "Replay mode must declare observe-only, compare-only, dry-run, or effectful behavior. Effectful replay requires idempotency, stable replay policy, or explicit effect-fence guarantees and must not duplicate persisted effects. Observe-only and compare-only replay must not mutate persistence, session state, engine session state, or external outputs."
