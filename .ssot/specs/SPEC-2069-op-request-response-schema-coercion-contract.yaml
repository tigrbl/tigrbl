body: |-
  ## Intent
  
  Define how request and response schema declarations on operations are normalized and projected.
  
  ## Canonical Surface
  
  - Operation declarations may specify request and response schemas by direct schema object or by owner-local schema reference string.
  - Schema reference strings must resolve through the canonical schema declaration and registry surface.
  - Request schema metadata and response schema metadata remain distinct even when both refer to the same schema family.
  - Schema coercion belongs to operation materialization and schema projection, not to transport-specific builders.
  
  ## Projection Rules
  
  - `schema_ctx` declarations provide owner-local schema aliases and direction metadata used by operation schema references.
  - Direct schema objects pass through unchanged after validation.
  - REST, RPC, OpenAPI, OpenRPC, and schema-bundle projections consume the normalized schema metadata.
  - Missing or ambiguous schema references must fail as declaration/materialization errors rather than silently producing incomplete docs.
  
