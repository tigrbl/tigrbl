body: |-
  ## Decision
  
  1. Required documentation route surfaces are part of the canonical operator surface.
  2. Docs route support includes canonical mount paths, prefix behavior, and enable/disable semantics.
  3. Route registration for docs surfaces MUST be derived from canonical route materialization and MUST NOT use a side registration subsystem.
  4. Authn/authz behavior on docs routes is normative and testable.
  5. OpenAPI, OpenRPC, Swagger, Lens, and favicon documentation route mounts must work for both app and router mounting forms where supported.
  6. Python runtime executors and the Rust runtime executor MUST expose the same default documentation endpoint contract for these surfaces.
  
  ## Endpoint Contract
  
  - `/openapi.json` serves the OpenAPI document.
  - `/openrpc.json` serves the OpenRPC document.
  - `/docs` hosts the Swagger UIX for the OpenAPI document. Swagger UIX MUST NOT require a separate canonical `/swagger` endpoint; any `/swagger` compatibility route must redirect or delegate to `/docs`.
  - `/lens` hosts the Lens UIX for the OpenRPC document.
  - `/favicon.svg` serves the default SVG favicon payload where the default favicon is enabled.
  - `/favicon.ico` behaves as a browser favicon endpoint and redirects or delegates to the canonical favicon payload unless an explicit `.ico` asset is configured.
  - Runtime-specific console or diagnostic pages MUST NOT occupy `/docs` or `/lens`.
  
  ## Integration Coverage
  
  - `pkgs/core/tigrbl_tests/tests/i9n/test_mountable_openapi_uvicorn.py`
  - `pkgs/core/tigrbl_tests/tests/i9n/test_mountable_openrpc_uvicorn.py`
  - `pkgs/core/tigrbl_tests/tests/i9n/test_mountable_swagger_uvicorn.py`
