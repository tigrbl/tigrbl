body: |-
  ## Decision
  
  1. Required documentation route surfaces are part of the canonical operator surface.
  2. Docs route support includes canonical mount paths, prefix behavior, and enable/disable semantics.
  3. Route registration for docs surfaces MUST be derived from canonical route materialization and MUST NOT use a side registration subsystem.
  4. Authn/authz behavior on docs routes is normative and testable.
