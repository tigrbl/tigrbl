body: |-
  ## Intent
  
  Define outbound callback delivery as the replacement contract for the prior outbound webhook-delivery surface.
  
  ## Contract
  
  1. Outbound callback delivery emits a runtime-managed event payload to a configured remote endpoint.
  2. The delivery contract MUST declare event schema, endpoint metadata, payload framing, signing or authentication, retry and backoff policy, timeout behavior, idempotency key handling, dead-letter behavior, delivery status, and completion subevents.
  3. HTTP POST is an allowed outbound delivery mechanism, but using HTTP POST does not make this surface an inbound webhook.
  4. Outbound callback delivery MUST NOT be represented as `WebhookSpec` and MUST NOT imply a public `CallbackSpec`.
  5. Delivery ordering relative to transaction completion, egress shaping, egress finalization, callback fences, and `POST_EMIT` MUST be explicit and diagnostics-visible.
  6. Compatibility modules or test names that still use webhook vocabulary are historical aliases until renamed; normative docs and new tests use callback-delivery vocabulary.
  
