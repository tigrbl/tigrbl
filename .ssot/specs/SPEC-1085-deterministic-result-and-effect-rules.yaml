summary: "For deterministic operation classes, normalized result shape, error shape, persistence effect set, emitted domain diagnostics, idempotent duplicate behavior, and declared rollback or commit outcome must match for equivalent attempts. Engine-generated values, timestamps, randomness, and external service responses must be normalized, supplied as declared inputs, or excluded from deterministic equivalence."
