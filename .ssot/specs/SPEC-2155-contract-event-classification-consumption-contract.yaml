body: |-
  ## Intent
  
  Define how Tigrbl consumes tigr-asgi-contract event classification as bridge truth.
  
  ## Contract
  
  Tigrbl consumes `(scope, channel, event)` plus classification metadata from tigr-asgi-contract. Canonical ASGI event names remain unchanged.
  
  Classification metadata may include:
  
  - `scope_type`
  - `binding`
  - `profile`
  - `family`
  - `exchange`
  - `direction`
  - `framing`
  
  `channel` is the ASGI callable side: `receive` or `send`.
  
  `direction` is semantic peer flow: client-to-server, server-to-client, bidirectional, or control.
  
  `binding` identifies the broad contract binding surface. Tigrbl-local BindingSpec governance refines that into canonical BindingSpec plus `profile`.
  
  ## Tigrbl Consumption Rules
  
  Tigrbl derives runtime semantics from `(scope, channel, event)` and classification attributes. It must not invent custom event names to replace canonical ASGI event names.
  
  Tigrbl BindingSpecs select contract classifications; they do not redefine the event taxonomy.
  
  Alias BindingSpecs normalize to canonical BindingSpec plus profile before classification is consumed by KernelPlan or runtime gating.
  
  ## Validation
  
  Static tests must verify that Tigrbl documentation and SSOT rows use canonical event names and classification attributes rather than a parallel event-name taxonomy.
  
  Runtime-facing tests must verify that BindingSpec aliases normalize before event classification consumption.
