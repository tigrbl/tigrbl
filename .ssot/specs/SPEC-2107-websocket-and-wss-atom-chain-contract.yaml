body: |-
  ## Intent
  
  Define WebSocket and WSS atom chains.
  
  ## Contract
  
  WebSocket and WSS chains declare session connect and accept, receive loops, message decode and handling, outbound send, close behavior, per-message transaction options, close code/reason metadata, and WSS TLS metadata projection.
  
  WebSocket and WSS classify the application carrier as `family=message` with `exchange=duplex` for message receive/send loops. Session open and close remain session lifecycle concerns.
  
  Channel classification distinguishes ASGI `receive` events such as connect, receive, and disconnect from ASGI `send` events such as accept, send, and close. Semantic direction remains separate metadata.
  
  Framing and subprotocol legality are binding constraints over the message carrier. They do not create alternate event identity names.
  
  ## Traceability
  
