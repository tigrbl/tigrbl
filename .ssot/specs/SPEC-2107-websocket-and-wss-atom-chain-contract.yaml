body: |-
  ## Intent
  
  Define WebSocket and WSS atom chains.
  
  ## Contract
  
  WebSocket and WSS chains declare session connect and accept, receive loops, message decode and handling, outbound send, close behavior, per-message transaction options, close code/reason metadata, and WSS TLS metadata projection.
  
