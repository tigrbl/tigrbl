body: |-
  ## Intent
  
  Define the governed engine-interoperability surface across multiple providers and bootstrap paths.
  
  ## Invariants
  
  - Engine interoperability includes provider resolution across app, router, table, and op scopes.
  - Multi-provider bootstrap may group tables by resolved provider before DDL execution.
  - Interoperability includes both sync and async provider binds.
  - Transport projection may depend on resolved engines but does not redefine engine behavior.
  
  ## Traceability
  
  - ADRs: `adr:1015`, `adr:1055`
