body: |-
  ## Intent`nDeclare owner and dispatch loop ownership modes for eventful protocols.`n`n## Contract`nOwner mode gives the main handler the channel loop. Dispatch mode gives the runtime the loop and invokes compiled subevent handlers. Default is dispatch when subevent handlers exist, otherwise owner.
