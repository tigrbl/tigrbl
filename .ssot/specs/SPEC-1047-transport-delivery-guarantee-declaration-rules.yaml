summary: "Each transport binding must declare its delivery class, ordering scope, retry policy, replay support, acknowledgement or cursor support, and loss behavior. Undeclared guarantees are unsupported, and unsupported guarantees must be rejected at compile time or binding resolution time instead of silently downgraded."
