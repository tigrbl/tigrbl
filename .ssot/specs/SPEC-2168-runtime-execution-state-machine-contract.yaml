summary: "Scope: Define canonical runtime object types, states, legal transitions, terminal states, fail-closed states, and required transition metadata for Tigrbl runtime execution. Required identifiers include app_id, router_id, table_id, op_id, atom_id, attempt_id, session_id, stream_id, datagram_id, engine_session_id, and trace_id where applicable. Valid scenario: REST create moves through received, resolved, planned, executing, committed, emitted, completed. Invalid scenario: closed session receives payload or datagram moves through stream close. Invariants: no undocumented lifecycle transition, no cross-session leakage, no cross-engine-session leakage, and no unsupported framing fallback."
