body: |-
  This SPEC defines the plain HTTP/3 stream taxonomy used by Tigrbl support matrices. h3 request streams are client initiated bidirectional streams carrying one request and its responses. h3 push streams are server initiated unidirectional response streams and are not arbitrary bidirectional application streams. h3 control and QPACK streams are typed transport streams and must not be treated as app-level payload carriers. Extension streams must name the extension context before application framing is allowed. WebTransport-over-h3 is outside this plain h3 taxonomy and remains governed by WebTransport BindingSpec profiles and lane-local inner framing rules.
