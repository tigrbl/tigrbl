body: |-
  Define the default transport binding tokens generated for canonical operation verbs and reject incompatible verb/profile combinations.
  
  REST profile kinds lower supported verbs to HttpRestBindingSpec. HTTP JSON-RPC profile kinds lower supported verbs to HttpJsonRpcBindingSpec. REST+JSON-RPC profile kinds lower supported verbs to both bindings in REST-then-JSON-RPC order. OLAP profile kinds reject mutation verbs before kernel planning.
  
  WebTransport profile kinds lower `open_bidi_stream`, `open_unidi_stream`, `close_stream`, and `close_session` to a bidirectional control stream using explicit JSON-RPC app framing unless an allowed OpSpec override supplies a different lane-local framing.
