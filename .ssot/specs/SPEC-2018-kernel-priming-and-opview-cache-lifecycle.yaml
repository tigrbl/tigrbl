body: |-
  ## Intent
  
  This document defines the runtime contract for default-kernel creation,
  idempotent priming, and OpView cache lifecycle across docs, harness, and
  transport ingress.
  
  ## Invariants
  
  - a materialized app or router surface has one logical default kernel
    identity for its compiled plan scope, and `kernel_plan` compilation
    attaches to that identity.
  - repeated `ensure_primed()` calls keep an already-usable default kernel
    available without duplication.
  - `get_opview()` may compile on demand, but on-demand materialization reuses
    canonical cache ownership rather than forking a second implicit kernel.
  - explicit invalidation is required before cache replacement or default-kernel
    reset.
  - sync harness execution and async runtime execution observe the same priming
    and cache semantics.
  
  ## Traceability
  
  - ADRs: `adr:1016`, `adr:1031`, `adr:1048`
  - Related feature granularity lives in the registry layer.
