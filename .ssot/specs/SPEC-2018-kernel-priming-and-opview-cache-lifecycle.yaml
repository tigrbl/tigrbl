body: |-
  ## Intent
  
  This document defines the runtime contract for default-kernel creation,
  idempotent priming, and OpView cache lifecycle across docs, harness, and
  transport ingress.
  
  ## Rules
  
  - a materialized app or router surface has one logical default kernel identity
    for its compiled plan scope
  - `ensure_primed()` is idempotent and must leave an already-usable default
    kernel available after repeated calls
  - `kernel_plan` compilation and OpView caches attach to the same logical kernel
    identity
  - `get_opview()` may compile on demand, but on-demand materialization must reuse
    canonical cache ownership rather than fork a second implicit kernel
  - explicit invalidation is required before cache replacement or default-kernel
    reset
  - sync harness execution and async runtime execution must observe the same
    priming and cache semantics
  
  ## Traceability
  
  - ADRs: `adr:1016`, `adr:1031`, `adr:1048`
  - Feature: `feat:kernel-prime-opview-cache-001`
