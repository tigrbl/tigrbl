body: |-
  ## Intent
  
  Define the contract for `member` and `collection` arity when projecting operations into routes and documentation.
  
  ## Canonical Surface
  
  - `Arity` is operation metadata owned by the canonical operation declaration.
  - `member` arity identifies operations scoped to one resource identity.
  - `collection` arity identifies operations scoped to the collection or owner surface.
  - If arity is omitted, canonical targets may infer default arity from target semantics.
  - Custom operations may declare arity explicitly and must not rely on transport builders to infer hidden semantics.
  
  ## Projection Rules
  
  - REST path templates derive identity path parameters from arity.
  - OpenAPI path parameters must match the REST path template produced from arity.
  - JSON-RPC projection may not expose path parameters, but it must preserve the same semantic member or collection expectation.
  - Documentation builders consume normalized operation arity, not raw decorator inputs.
  
