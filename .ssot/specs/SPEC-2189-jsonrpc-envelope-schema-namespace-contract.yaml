title: "JSON-RPC envelope schema namespace contract"
status: "draft"
origin: "repo-local"
decision_date: null
tags: []
summary: "Contract: JSON-RPC public envelope model classes must have a non-transport schema namespace before tigrbl.transport.jsonrpc.models and tigrbl_concrete.transport.jsonrpc.models are removed. The schema namespace must preserve request, notification, success response, error response, batch, id, and error object behavior currently relied on by tests and examples. Runtime JSON-RPC payload validation remains authoritative in the tigrbl_atoms frame codec registry; schema models are public data contracts and authoring aids, not dispatch hot-path modules. Compatibility modules may re-export the schema namespace during the deprecation window, but new code must import from the schema namespace or call tigrbl_atoms.atoms.framing encode/decode APIs for runtime frames."
