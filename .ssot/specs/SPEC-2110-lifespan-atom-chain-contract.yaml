  ## Intent
  
  Define the governed lifespan runtime chain.
  
  ## Contract
  
  Lifespan handling declares startup and shutdown event order, app readiness state, failure behavior, state mutation boundaries, completion behavior, and whether execution is KernelPlan-owned or an explicit governed out-of-band boundary.
  
