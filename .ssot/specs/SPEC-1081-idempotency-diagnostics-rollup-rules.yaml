summary: "Idempotency diagnostics, trace records, qlog records, replay manifests, and runtime rollups must record key scope, idempotency record id, original_attempt_id, duplicate attempt id, payload compatibility decision, effect fence state, stable response policy, and rejection reason. Rollups must preserve enough drillback to prove no cross-session or cross-engine-session leakage occurred."
