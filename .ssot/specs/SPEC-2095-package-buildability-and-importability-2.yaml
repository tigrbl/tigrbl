body: |-
  ## Scope
  
  This SPEC requires a repo-wide check that every active package under `pkgs/` is syntactically valid and importable in CI.
  
  ## Requirements
  
  1. Discover `pyproject.toml` files under `pkgs/` and exclude archive artifacts.
  2. Ensure package metadata includes a project name.
  3. Compile package source and import expected module from source trees.
  4. Fail for any package that cannot be imported.
