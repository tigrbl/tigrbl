body: |-
  ## Intent
  
  Define the bootstrappable ORM mixin surface for default rows, bootstrap seeding, and explicit reseeding.
  
  ## Invariants
  
  - `Bootstrappable` owns `DEFAULT_ROWS`-based seeding for the mapped class that defines it.
  - Automatic seeding is attached at table-creation time and remains class-local.
  - Only mapped columns on the owning class may be inserted during bootstrap seeding.
  - Idempotency is guaranteed only when primary-key material permits dialect-specific do-nothing or ignore semantics.
  - `ensure_bootstrapped()` is the explicit manual reseeding path.
  - `tigrbl.orm.mixins.Bootstrappable` is a compatibility projection of the governed Bootstrappable mixin surface.
  
  ## Verification
  
  - `pkgs/core/tigrbl_tests/tigrbl_tests/tests/test_orm_alias_exports.py`
  
