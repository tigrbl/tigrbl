body: |-
  HTTP REST, HTTP JSON-RPC, HTTP stream, and SSE bindings must reject framing mismatches. REST body framing must not fallback to JSON-RPC, JSON-RPC must not fallback to REST body parsing, and SSE events must not be interpreted as JSON-RPC messages unless the binding explicitly declares that semantic operation surface.
