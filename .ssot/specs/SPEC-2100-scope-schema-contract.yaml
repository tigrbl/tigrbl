body: |-
  ## Intent
  
  Define canonical scope schemas for protocol runtime surfaces.
  
  ## Contract
  
  Scope schemas cover HTTP version details, websocket secure and TLS metadata, WebTransport and QUIC extension metadata, lifespan metadata, static-file projection metadata, and validation fixtures for accepted server-boundary inputs.
  
