body: |-
  ## Intent
  
  Define canonical scope schemas for protocol runtime surfaces consumed by Tigrbl at the ASGI boundary.
  
  ## Contract
  
  Scope schemas cover HTTP version details, websocket secure and TLS metadata, WebTransport and QUIC extension metadata, lifespan metadata, static-file projection metadata, and validation fixtures for accepted server-boundary inputs.
  
  Tigrbl consumes broad contract scope types only: `http`, `websocket`, `webtransport`, and `lifespan`. HTTP/1.1, HTTP/2, HTTP/3, TLS, mTLS, ALPN, QUIC, WebSocket subprotocols, and WebTransport capability flags are scope metadata or extension fields, not new scope types.
  
  Scope metadata may participate in classification, but runtime semantics are derived from `scope`, ASGI `channel`, canonical event name, binding, family, exchange, direction, and payload discriminators.
  
  ## Traceability
  
  ADRs: adr:1005, adr:1091, adr:1096, adr:1097, adr:1132.
