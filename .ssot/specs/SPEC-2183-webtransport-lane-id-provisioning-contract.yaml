summary: "This SPEC defines WebTransport lane-id provisioning in Tigrbl. LaneId bit 0 encodes initiator, bit 1 encodes direction, and the remaining high bits encode ordinal. max_streams <= 256 selects uint8 with 64 ordinals per initiator/direction class and 256 total lane ids. 257 <= max_streams <= 65536 selects uint16. max_streams above 65536 is invalid for a single WebTransport session. Runtime session state must expose the selected width and enforce max_streams for distinct streams."
