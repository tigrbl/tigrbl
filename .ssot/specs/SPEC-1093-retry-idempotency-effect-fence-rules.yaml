body: |-
  Mutation retry requires declared idempotency, replay policy, or stable retry semantics before side effects. A retry must not reuse open transactions, partially committed state, or mutable engine/session state from a failed attempt unless a declared lease/reset policy makes that state safe. Effect fences must prove the failed attempt either rolled back, completed, or is quarantined before retry effects are admitted.
