body: |-
  ## Purpose
  Define the certifiable atom parity contract for Python and Rust atom surfaces.
  
  ## Requirements
  1. Each governed atom parity feature records Python and Rust lane applicability.
  2. Matching atom pairs are compared by normalized domain.subject identity, input contract, output contract, side effects, error envelope, phase ordering, and trace label.
  3. Missing or structurally one-runtime-only atoms are tracked with not_applicable or void lane metadata and a concrete reason.
  4. Evidence artifacts must include inventory, feature mapping, parity results, and stale/missing surface detection.
  5. A parity claim is not certifiable unless linked tests and evidence exist and pass.
