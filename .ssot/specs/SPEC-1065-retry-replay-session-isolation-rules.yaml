summary: "Retry and replay may correlate to prior attempts only through declared idempotency or replay policy and preserved parentage. A retry cannot reuse mutable state from an unrelated session, stream, datagram, or engine session, and replay must preserve the original session parentage without mutating closed or unrelated session state."
