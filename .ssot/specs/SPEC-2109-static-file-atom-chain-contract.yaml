body: |-
  ## Intent
  
  Define the governed static-file runtime chain.
  
  ## Contract
  
  Static file handling declares routing, file response or pathsend behavior, range and cache header behavior, traversal and security checks, completion behavior, and whether execution is KernelPlan-owned or an explicit governed out-of-band boundary.
  
