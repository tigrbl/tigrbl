body: |-
  ## Purpose
  
  This contract specifies the observable mapping-plan compilation shape between declarations and materialized operation projections.
  
  ## Contract
  
  1. Mapping-plan compilation must expose a deterministic phase order: collect, merge, bind models, bind ops, bind hooks, bind deps, then seal.
  2. `collect_ctx` must produce a collection context for the target model without executing transport dispatch or handlers.
  3. `mapping_plan.compile_plan()` must represent the governed compilation steps in the canonical order.
  4. `mapping_plan.plan(ctx)` must expose the visible operation specs produced from the collected and merged model declarations.
  5. Default canonical operations must become visible through mapping-plan output after declaration collection and merge.
  6. Mapping-plan shape changes that add, remove, reorder, or rename phases require explicit SSOT document review.
  7. Nested routing, acronym resource naming, and path-schema/RPC materialization must derive from compiled mapping output rather than transport-local naming logic.
  
  ## Related Decisions
  
  - ADR-1016 governs kernel plan compilation broadly.
  - ADR-1077 narrows the mapping/bootstrap compilation boundary.
  - ADR-1014 governs REST/JSON-RPC semantic parity.
  
  ## Integration Coverage
  
  - `pkgs/core/tigrbl_tests/tests/i9n/test_acronym_route_name.py`
  - `pkgs/core/tigrbl_tests/tests/i9n/test_nested_path_schema_and_rpc.py`
  - `pkgs/core/tigrbl_tests/tests/i9n/test_nested_routing_depth.py`
  - `pkgs/core/tigrbl_tests/tests/i9n/test_symmetry_parity.py`
  
  ## Verification
  
  - Harness tests should verify the canonical phase order.
  - Harness tests should verify visible default operation specs for representative models.
  - Tests should keep mapping-plan compilation separate from transport execution behavior.
