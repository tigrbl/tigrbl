summary: "Replay comparison must compare normalized result, error classification, persistence effects, effect-fence outcome, emitted diagnostics, trace/qlog fields, idempotency behavior, lifecycle terminal state, and rollup summary according to the declared replay policy. Raw transport bytes, incidental object layout, wall-clock time, randomness, and undeclared external effects are excluded unless normalized as replay inputs."
