body: |-
  ## Intent
  
  Define the canonical contract for websocket binding transport, framing, subprotocol negotiation, path-kind convergence, documentation projection metadata, and support-level distinctions between mature and provisional websocket framing surfaces.
  
  ## Contract
  
  1. `WsBindingSpec.proto` MUST be `ws` or `wss`.
  2. `WsBindingSpec.subprotocols` MUST be an ordered tuple of websocket subprotocol tokens, defaulting to an empty tuple when no subprotocol is required or advertised.
  3. `WsBindingSpec.framing` MUST describe post-handshake message interpretation and MUST default to `text` unless the binding declares a different supported or governed framing token.
  4. Websocket text is the mature baseline websocket framing surface.
  5. JSON-RPC websocket framing MUST be represented as `framing=jsonrpc` on `WsBindingSpec` or as an equivalent normalized binding that lowers to that canonical value.
  6. `framing=jsonrpc` MUST require or normalize a JSON-RPC-compatible websocket subprotocol token and MUST reject explicitly incompatible subprotocol combinations.
  7. Websocket `binary` and websocket `bytes` may remain in governed framing vocabulary, but they must not be described as equivalent to mature framing-atom support until explicit runtime decode/encode closure exists.
  8. NDJSON websocket framing MUST remain planned and fail-closed until the canonical framing vocabulary and runtime decoder are implemented.
  9. `PathSpec.kind` MUST converge with websocket binding declarations: generic websocket path kinds allow mature text behavior, JSON-RPC path kinds require JSON-RPC framing, and NDJSON path kinds require explicit planned/fail-closed NDJSON handling.
  10. Docs projection MUST derive websocket protocol, framing, and subprotocol metadata from selected websocket bindings rather than from docs payload paths or UIX paths.
  11. Runtime compilation MUST consume the normalized binding metadata and MUST NOT infer websocket framing solely from path strings.
  
  ## WebSocket Binding Matrix
  
  | Scenario | Binding | Path kind | Expected support |
  |---|---|---|---|
  | WS text | `WsBindingSpec(proto=ws, framing=text, subprotocols=())` | `websocket` | Supported |
  | WSS text | `WsBindingSpec(proto=wss, framing=text, subprotocols=())` | `websocket` | Supported |
  | WS JSON-RPC | `WsBindingSpec(proto=ws, framing=jsonrpc, subprotocols=(jsonrpc,))` | `ws-jsonrpc` | Active-line supported |
  | WSS JSON-RPC | `WsBindingSpec(proto=wss, framing=jsonrpc, subprotocols=(jsonrpc,))` | `wss-jsonrpc` | Active-line supported |
  | WS binary | `WsBindingSpec(proto=ws, framing=binary, subprotocols=())` | `websocket` | Governed vocabulary; runtime support remains partial |
  | WSS binary | `WsBindingSpec(proto=wss, framing=binary, subprotocols=())` | `websocket` | Governed vocabulary; runtime support remains partial |
  | WS NDJSON | `WsBindingSpec(proto=ws, framing=ndjson, subprotocols=(ndjson,))` | `ws-ndjson` | Planned/fail-closed |
  | WSS NDJSON | `WsBindingSpec(proto=wss, framing=ndjson, subprotocols=(ndjson,))` | `wss-ndjson` | Planned/fail-closed |
  
  ## Validation Matrix
  
  | Scenario | Expected |
  |---|---|
  | `proto=ws` or `proto=wss` with `framing=text` and no subprotocol | Valid. |
  | `framing=jsonrpc` with JSON-RPC-compatible subprotocol token | Valid. |
  | `framing=jsonrpc` with no subprotocol token | Valid only if normalized to the canonical JSON-RPC subprotocol requirement. |
  | `framing=jsonrpc` with `subprotocols=(graphql-ws,)` | Invalid. |
  | `framing=binary` before explicit framing-atom closure | Governed but not equivalent to mature websocket text support. |
  | `framing=ndjson` before NDJSON websocket implementation | Planned/fail-closed. |
  | `PathSpec.kind=ws-jsonrpc` with non-JSON-RPC websocket framing | Invalid. |
  | `PathSpec.kind=websocket` with JSON-RPC framing but no explicit JSON-RPC path kind or convergence rule | Invalid or normalized to the JSON-RPC path kind by concrete lowering. |
  | Docs payload includes websocket metadata outside its selected projection | Invalid. |
  
