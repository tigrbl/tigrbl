body: |-
  ## Intent
  
  Define the canonical contract for websocket binding transport, framing, subprotocol negotiation, path-kind convergence, documentation projection metadata, and support-level distinctions between mature and provisional websocket framing surfaces.
  
  ## Contract
  
  1. `WsBindingSpec.proto` MUST be `ws` or `wss`.
  2. `WsBindingSpec.subprotocols` MUST be an ordered tuple of websocket subprotocol tokens, defaulting to an empty tuple when no subprotocol is required or advertised.
  3. `WsBindingSpec.framing` MUST describe post-handshake message interpretation and MUST default to `text` unless the binding declares a different supported or governed framing token.
  4. WebSocket and WSS target framing vocabulary is `text`, `bytes`, `binary`, `json`, `jsonrpc`, and `ndjson`.
  5. Websocket text is the mature baseline websocket framing surface at the canonical binding layer.
  6. JSON-RPC websocket framing MUST be represented as `framing=jsonrpc` on `WsBindingSpec` or as an equivalent normalized binding that lowers to that canonical value.
  7. `framing=jsonrpc` MUST require or normalize a JSON-RPC-compatible websocket subprotocol token and MUST reject explicitly incompatible subprotocol combinations.
  8. Websocket `binary` and websocket `bytes` may remain in governed framing vocabulary, but they must not be described as equivalent to mature framing-atom support until explicit runtime decode/encode closure exists.
  9. NDJSON websocket framing MUST remain planned and fail-closed until the canonical framing vocabulary and runtime decoder are implemented.
  10. `PathSpec.kind` MUST converge with websocket binding declarations: generic websocket path kinds allow mature text behavior, JSON-RPC path kinds require JSON-RPC framing, and NDJSON path kinds require explicit planned/fail-closed NDJSON handling.
  11. Docs projection MUST derive websocket protocol, framing, and subprotocol metadata from selected websocket bindings rather than from docs payload paths or UIX paths.
  12. Runtime compilation MUST consume the normalized binding metadata and MUST NOT infer websocket framing solely from path strings.
  13. A supported websocket server claim requires proof that the runtime accepts the websocket handshake before waiting for application payload.
  14. A supported `wss` claim requires proof that secure websocket routes preserve their own lowered route identity and do not collapse onto `ws` metadata or handlers.
  15. A supported websocket JSON-RPC claim requires proof of protocol-native JSON-RPC reply behavior; plain text echo of the inbound JSON-RPC request does not satisfy the contract.
  16. Canonical binding support and live Tigrcorn server-client support are separate proof classes. A row may be canonically governed while still remaining partial on Tigrcorn.
  
  ## WebSocket Binding Matrix
  
  | Scenario | Binding | Path kind | Expected support |
  |---|---|---|---|
  | WS text | `WsBindingSpec(proto=ws, framing=text, subprotocols=())` | `websocket` | Canonically supported; Tigrcorn e2e proof still required |
  | WSS text | `WsBindingSpec(proto=wss, framing=text, subprotocols=())` | `websocket` | Canonically supported; Tigrcorn e2e proof still required |
  | WS JSON | `WsBindingSpec(proto=ws, framing=json, subprotocols=())` | `websocket` | Governed vocabulary; runtime support requires explicit codec closure |
  | WSS JSON | `WsBindingSpec(proto=wss, framing=json, subprotocols=())` | `websocket` | Governed vocabulary; runtime support requires explicit codec closure |
  | WS JSON-RPC | `WsBindingSpec(proto=ws, framing=jsonrpc, subprotocols=(jsonrpc,))` | `ws-jsonrpc` | Canonically supported; live server support is proof-gated |
  | WSS JSON-RPC | `WsBindingSpec(proto=wss, framing=jsonrpc, subprotocols=(jsonrpc,))` | `wss-jsonrpc` | Canonically supported; live server support is proof-gated |
  | WS bytes | `WsBindingSpec(proto=ws, framing=bytes, subprotocols=())` | `websocket` | Governed vocabulary; runtime support remains partial |
  | WSS bytes | `WsBindingSpec(proto=wss, framing=bytes, subprotocols=())` | `websocket` | Governed vocabulary; runtime support remains partial |
  | WS binary | `WsBindingSpec(proto=ws, framing=binary, subprotocols=())` | `websocket` | Governed vocabulary; runtime support remains partial |
  | WSS binary | `WsBindingSpec(proto=wss, framing=binary, subprotocols=())` | `websocket` | Governed vocabulary; runtime support remains partial |
  | WS NDJSON | `WsBindingSpec(proto=ws, framing=ndjson, subprotocols=(ndjson,))` | `ws-ndjson` | Planned/fail-closed |
  | WSS NDJSON | `WsBindingSpec(proto=wss, framing=ndjson, subprotocols=(ndjson,))` | `wss-ndjson` | Planned/fail-closed |
  
  ## Validation Matrix
  
  | Scenario | Expected |
  |---|---|
  | `proto=ws` or `proto=wss` with `framing=text` and no subprotocol | Valid. |
  | `framing=jsonrpc` with JSON-RPC-compatible subprotocol token | Valid. |
  | `framing=jsonrpc` with no subprotocol token | Valid only if normalized to the canonical JSON-RPC subprotocol requirement. |
  | `framing=jsonrpc` with `subprotocols=(graphql-ws,)` | Invalid. |
  | `framing=json` without explicit JSON codec closure | Governed vocabulary but not mature runtime support. |
  | `framing=bytes` or `framing=binary` before explicit framing-atom closure | Governed vocabulary but not equivalent to mature websocket text support. |
  | `framing=ndjson` before NDJSON websocket implementation | Planned/fail-closed. |
  | `PathSpec.kind=ws-jsonrpc` with non-JSON-RPC websocket framing | Invalid. |
  | `PathSpec.kind=websocket` with JSON-RPC framing but no explicit JSON-RPC path kind or convergence rule | Invalid or normalized to the JSON-RPC path kind by concrete lowering. |
  | Docs payload includes websocket metadata outside its selected projection | Invalid. |
  | Server accepts only after first application payload | Invalid. |
  | `wss` route lowers onto `ws` path, protocol, framing, or endpoint identity | Invalid. |
  | JSON-RPC websocket route emits plain text echo instead of JSON-RPC response semantics | Invalid. |
  
