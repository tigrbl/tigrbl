body: |-
  Selector resolution, binding lowering, atom ordering, hook ordering, phase ordering, and requirement projection must use declared precedence and stable tie-breakers. Hidden route precedence, unscoped shadowing, unordered sets, and ambient registration order are invalid sources of deterministic behavior.
