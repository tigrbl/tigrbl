body: |-
  ## Intent
  
  Define the normative Tigrbl app-level framing support matrix by protocol profile.
  
  ## Contract
  
  App-level framing is payload interpretation metadata and is selected per canonical protocol BindingSpec profile as a concrete typed `FramingSpec`. String or literal framing tokens are invalid as canonical authoring input.
  
  Secure variants repeat their framing policy locally. TLS, mTLS, ALPN, QUIC, and HTTP version facts remain scope metadata.
  
  | Protocol / profile | Canonical BindingSpec | Family | Exchange | App-level framing support |
  |---|---|---|---|---|
  | `http.rest` | `HTTPBindingSpec` | `request` | `unary` | `JsonFramingSpec` required; `TextFramingSpec`, `BytesFramingSpec`, `BinaryFramingSpec` allowed for explicitly declared non-JSON endpoints |
  | `https.rest` | `HTTPBindingSpec` | `request` | `unary` | `json` required; `text`, `bytes`, `binary` allowed for explicitly declared non-JSON endpoints |
  | `http` + JSON-RPC framing | `HTTPBindingSpec` | `request` | `unary` | `JsonRpcFramingSpec` required and exclusive |
  | `https` + JSON-RPC framing | `HTTPBindingSpec` | `request` | `unary` | `JsonRpcFramingSpec` required and exclusive |
  | `http.stream.request` | `HTTPBindingSpec` | `stream` | `client_stream` | `bytes`, `binary`, `text`, `json`, `ndjson` |
  | `https.stream.request` | `HTTPBindingSpec` | `stream` | `client_stream` | `bytes`, `binary`, `text`, `json`, `ndjson` |
  | `http.stream.response` | `HTTPBindingSpec` | `stream` | `server_stream` | `BytesFramingSpec`, `BinaryFramingSpec`, `TextFramingSpec`, `JsonFramingSpec`, `JsonRpcFramingSpec`, `NdjsonFramingSpec`; JSON-RPC is one complete envelope per response chunk |
  | `https.stream.response` | `HTTPBindingSpec` | `stream` | `server_stream` | `BytesFramingSpec`, `BinaryFramingSpec`, `TextFramingSpec`, `JsonFramingSpec`, `JsonRpcFramingSpec`, `NdjsonFramingSpec`; JSON-RPC is one complete envelope per response chunk |
  | `http.sse` | `HTTPBindingSpec` | `stream` | `server_stream` | `sse` required and exclusive |
  | `https.sse` | `HTTPBindingSpec` | `stream` | `server_stream` | `sse` required and exclusive |
  | `ws.message` | `WebSocketBindingSpec` | `message` | `duplex` | `TextFramingSpec`, `BytesFramingSpec`, `BinaryFramingSpec`, `JsonFramingSpec`, `JsonRpcFramingSpec`, `NdjsonFramingSpec`; JSON-RPC derives or requires compatible subprotocol metadata |
  | `wss.message` | `WebSocketBindingSpec` | `message` | `duplex` | `TextFramingSpec`, `BytesFramingSpec`, `BinaryFramingSpec`, `JsonFramingSpec`, `JsonRpcFramingSpec`, `NdjsonFramingSpec`; JSON-RPC derives or requires compatible subprotocol metadata |
  | `wt.session` | `WebTransportBindingSpec` | `session` | `unary` | no app-level framing; session metadata only |
  | `wts.session` | `WebTransportBindingSpec` | `session` | `unary` | no app-level framing; session metadata only |
  | `wt.bidi_stream` | `WebTransportBindingSpec` | `stream` | `duplex` | `bytes`, `binary`, `text`, `json`, `jsonrpc`, `ndjson`; stream record-boundary rules required |
  | `wts.bidi_stream` | `WebTransportBindingSpec` | `stream` | `duplex` | `bytes`, `binary`, `text`, `json`, `jsonrpc`, `ndjson`; stream record-boundary rules required |
  | `wt.unidi_client_stream` | `WebTransportBindingSpec` | `stream` | `client_stream` | `bytes`, `binary`, `text`, `json`, `jsonrpc`, `ndjson`; stream record-boundary rules required |
  | `wts.unidi_client_stream` | `WebTransportBindingSpec` | `stream` | `client_stream` | `bytes`, `binary`, `text`, `json`, `jsonrpc`, `ndjson`; stream record-boundary rules required |
  | `wt.unidi_server_stream` | `WebTransportBindingSpec` | `stream` | `server_stream` | `bytes`, `binary`, `text`, `json`, `jsonrpc`, `ndjson`; stream record-boundary rules required |
  | `wts.unidi_server_stream` | `WebTransportBindingSpec` | `stream` | `server_stream` | `bytes`, `binary`, `text`, `json`, `jsonrpc`, `ndjson`; stream record-boundary rules required |
  | `wt.datagram` | `WebTransportBindingSpec` | `datagram` | `duplex` | `BytesFramingSpec`, `BinaryFramingSpec`, `TextFramingSpec`, `JsonFramingSpec`, `JsonRpcFramingSpec`; `NdjsonFramingSpec` excluded by default |
  | `wts.datagram` | `WebTransportBindingSpec` | `datagram` | `duplex` | `BytesFramingSpec`, `BinaryFramingSpec`, `TextFramingSpec`, `JsonFramingSpec`, `JsonRpcFramingSpec`; `NdjsonFramingSpec` excluded by default |
  
  ## Rules
  
  `JsonRpcFramingSpec` means complete JSON-RPC message semantics and must not be inferred from `JsonFramingSpec`, `NdjsonFramingSpec`, or generic stream carriers.
  
  `NdjsonFramingSpec` means newline-delimited JSON records and must not imply JSON-RPC semantics.
  
  `SseFramingSpec` is exclusive to the SSE profile.
  
  `webtransport` is transport identity only, not app-level framing. App-level framing lives inside the selected WebTransport lane profile when that lane carries application payloads.
  
  ## Validation
  
  Matrix tests must prove every supported BindingSpec profile has a local typed framing declaration.
  
  Runtime-support tests must distinguish intended framing policy from mature runtime implementation.
