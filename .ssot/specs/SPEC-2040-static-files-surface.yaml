body: |-
  ## Intent
  
  Define the governed static-files surface for concrete app and router mounts.
  
  ## Invariants
  
  - `mount_static()` records explicit static mount declarations.
  - Static serving uses traversal-safe path resolution beneath the configured mount root.
  - Only existing regular files are served.
  - Static misses return normal not-found responses.
  - Static serving is distinct from docs payload mounts and UIX rendering.
  
