body: |-
  ## Intent
  Define UUID and ULID identity codec behavior and lowering to runtime opaque16 values.
  
  ## UUID Text
  Canonical UUID output is lowercase RFC-style text with hyphens. Parsers may accept uppercase as compatibility input and emit canonical lowercase output. Generic UUID codecs preserve bytes and should not require version-specific semantics.
  
  ## UUID Runtime
  UUID values lower to opaque16. UUID objects and UUID strings are not stored in EventKey, IdentityVector, KernelPlan, dispatch tables, or runtime sidecars.
  
  ## ULID Text
  Canonical ULID output is a 26-character Crockford Base32 string in uppercase. Ambiguous, non-canonical, or malformed text is rejected unless an explicit compatibility mode allows it.
  
  ## ULID Runtime
  ULID values lower to opaque16 with timestamp-first byte ordering preserved. ULID generator policy, including monotonic generation, is separate from codec policy.
  
  ## Registry Integration
  The scalar registry distinguishes uuid, ulid, u128, and opaque16 even when they share the same physical width.
