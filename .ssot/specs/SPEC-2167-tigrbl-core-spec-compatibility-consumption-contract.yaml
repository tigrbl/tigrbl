body: |-
  Defines the compatibility consumption contract for `tigrbl_core._spec`.
  
  `tigrbl_core._spec` must continue to provide existing compatibility imports and runtime behavior, while consuming schema/catalog authority from `tigrbl_spec`.
  
  `tigrbl_core` must not package or regenerate a competing authoritative schema catalog. Any schema-generation compatibility wrapper must delegate to `tigrbl_spec`.
