body: |-
  ## Intent
  
  Define the default WebTransport control-plane operation contract used by appspecs, opspecs, protocol binding specs, and runtime atom planning.
  
  ## Operation Set
  
  The default control-plane operation set is:
  
  - `open_bidi_stream`: request creation or attachment of a bidirectional WebTransport stream.
  - `open_unidi_stream`: request creation or attachment of a unidirectional WebTransport stream.
  - `close_stream`: request closure of a named stream or stream binding.
  - `close_session`: request closure of the WebTransport session.
  
  ## Package Ownership
  
  The operation implementation package is `tigrbl_ops_webtransport`. The package returns structured command payloads and performs payload validation. It does not own QUIC, HTTP/3, ASGI, or server runtime stream allocation.
  
  ## Binding Rules
  
  Default WebTransport table/profile lowering must bind these control-plane operations to a WebTransport bidirectional stream. The default app framing is JSON-RPC unless a more specific, validated lane-local framing override is present.
  
  Explicit OpSpec bindings may override the default only if the requested lane kind and framing are legal for WebTransport control-plane commands. Invalid overrides fail closed through binding-token lowering and operation matrix validation.
  
  ## Runtime And Atom Rules
  
  Atom handlers for the four operations are system atoms and must be classified as wire effects. Kernel and atom metadata must preserve the distinction between a semantic control command and the delegated runtime act of opening or closing a WebTransport stream or session.
  
  ## Validation
  
  Conformance requires focused tests for package behavior, package importability, default binding lowering, concrete mapping package selection, sys atom handler projection, and kernel effect classification.
