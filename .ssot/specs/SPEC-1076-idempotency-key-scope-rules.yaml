body: |-
  Idempotency keys are scoped by semantic and concrete parentage. Scope includes app_id, router_id, table_id, op_id, binding_id or runtime_plan_id, tenant or principal where available, session_id where applicable, engine_session_id where applicable, and the submitted idempotency key. Cross-op, cross-table, cross-session, cross-engine-session, or cross-principal reuse is invalid unless an explicit policy creates a shared scope.
