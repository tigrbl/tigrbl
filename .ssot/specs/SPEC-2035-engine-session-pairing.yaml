body: |-
  ## Intent
  
  Define the governed pairing between engine providers and session acquisition surfaces.
  
  ## Invariants
  
  - Engine providers own how sessions are acquired for runtime and DDL work.
  - Session pairing may be expressed through provider `get_db()`, `sessionmaker`, `async_sessionmaker`, or wrapped factory behavior.
  - `wrap_sessionmaker()` is the canonical concrete helper for applying `SessionSpec` to provider factories.
  - Concrete runtime surfaces may depend on the pairing, but they do not redefine it.
  
  ## Traceability
  
  - ADRs: `adr:1015`, `adr:1055`
  - Related features: `feat:engine-session-runtime-surface-001`, `feat:defaultsession-concrete-session-class-001`
