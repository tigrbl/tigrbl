body: |-
  ## Intent
  
  Define how BindingSpecs project protocol event metadata into compiled runtime metadata.
  
  ## Contract
  
  BindingSpecs declare or derive transport events, exchange, family, framing, subevents, transaction unit, loop shape, emit behavior, close behavior, and channel requirements used by KernelPlan compilation and hook selection.
  
  BindingSpecs select and constrain contract classifications. They do not redefine canonical ASGI event identity and must not require a parallel event-name field at the server/framework boundary.
  
  BindingSpec projection must emit canonical runtime family and subevent metadata derived from the governed `tigr-asgi-contract` vocabulary.
  
  Projection code may accept legacy or convenience authoring tokens, but it must normalize them before compiled metadata is emitted.
  
  In particular:
  
  - WebSocket projections must not emit `socket` as a canonical runtime family.
  - WebSocket message loops classify as `family=message` and `exchange=duplex`.
  - SSE projections must not emit `event_stream` as a canonical runtime family.
  - Repo-local `response` family projections must normalize to the governed canonical family vocabulary before KernelPlan rows, hook selectors, or event-key metadata are emitted.
  - WebTransport stream and datagram projections must preserve native lane classification rather than collapsing app-framed payloads into `message`.
  - Canonical emitted subevents must be governed qualified subevents rather than coarse channel verbs.
  
  ## Traceability
  
