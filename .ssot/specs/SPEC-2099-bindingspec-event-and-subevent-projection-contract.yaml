body: |-
  ## Intent
  
  Define how BindingSpecs project protocol event metadata into compiled runtime metadata.
  
  ## Contract
  
  BindingSpecs declare or derive transport events, exchange, family, framing, subevents, transaction unit, loop shape, emit behavior, close behavior, and channel requirements used by KernelPlan compilation and hook selection.
  
