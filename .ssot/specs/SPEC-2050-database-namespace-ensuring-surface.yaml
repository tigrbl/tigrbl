body: |-
  ## Intent
  
  Define the governed database-namespace ensuring surface for `ensure_schemas()` and equivalent engine-aware namespace preparation behavior.
  
  ## Canonical Surface
  
  - `ensure_schemas()` is the governed namespace-ensuring surface.
  - Namespace ensuring is explicit, engine-aware, and separate from model-schema materialization, bootstrap timing, and migration history.
  - Namespace ensuring is best-effort preparation of database namespaces; it is not a migration planner or version-table owner.
  - Namespace ensuring may be invoked by bootstrap helpers, but it remains a distinct governed concern.
  
  ## Invariants
  
  - The word "schema" in this spec refers to database namespace semantics such as PostgreSQL schemas, not `_spec`/Pydantic/model schema objects.
  - Namespace ensuring behavior must not be used to widen public operator or authoring-helper semantics.
  
  ## Traceability
  
  - ADRs: `adr:1055`, `adr:1064`
  - Related features: `feat:ensure-schemas-runtime-surface-001`
