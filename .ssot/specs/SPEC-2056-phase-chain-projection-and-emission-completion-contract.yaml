body: |-
  ## Intent
  
  This document defines the canonical runtime phase chain, the allowed compatibility projections, and the contract between public hook phases and transport-completion fences.
  
  ## Canonical Phase Chain
  
  - `INGRESS_BEGIN -> INGRESS_PARSE -> INGRESS_ROUTE -> PRE_TX_BEGIN -> START_TX? -> PRE_HANDLER -> HANDLER -> POST_HANDLER -> PRE_COMMIT -> TX_COMMIT? -> POST_COMMIT -> POST_RESPONSE -> EGRESS_SHAPE -> EGRESS_FINALIZE -> POST_EMIT?`
  - `START_TX` and `TX_COMMIT` are omitted when the selected execution path does not own or enter a transaction.
  - `POST_EMIT` is present only when the selected transport exposes an explicit completion fence.
  
  ## Projection Rules
  
  - `INGRESS_ROUTE` is canonical.
  - `INGRESS_DISPATCH` is not an allowed compatibility projection, alias, parity label, or diagnostics label.
  - Compatibility projections may omit phases when they are not entered, but they may not rename canonical phases.
  - Public hook phases remain `PRE_TX_BEGIN` through `POST_RESPONSE` plus the governed `ON_*` and `TX_ROLLBACK` phases.
  
  ## Completion Contract
  
  - `POST_RESPONSE` is a public response-finalization phase and does not imply completed transport emission.
  - `EGRESS_SHAPE` and `EGRESS_FINALIZE` remain runtime-owned egress phases.
  - `POST_EMIT` marks completed transport emission when an explicit completion fence exists.
  
  ## Error Phases
  
  - `ON_ERROR`, `ON_PRE_TX_BEGIN_ERROR`, `ON_START_TX_ERROR`, `ON_PRE_HANDLER_ERROR`, `ON_HANDLER_ERROR`, `ON_POST_HANDLER_ERROR`, `ON_PRE_COMMIT_ERROR`, `ON_TX_COMMIT_ERROR`, `ON_POST_COMMIT_ERROR`, `ON_POST_RESPONSE_ERROR`, `TX_ROLLBACK`
  
  ## Traceability
  
  - ADRs: `adr:1009`, `adr:1010`, `adr:1068`
  - Related specs: `spc:2028`
