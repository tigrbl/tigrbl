body: |-
  ## Intent
  
  Define first-class inbound webhook ingress without inventing a parallel router, callback, or lifecycle model.
  
  ## Contract
  
  1. An inbound webhook is an externally invoked HTTP event ingress endpoint.
  2. Canonical lowering MUST use existing spec composition:
     - `PathSpec(kind=resource)` owns the webhook URL path.
     - `OpSpec(target=custom)` owns handler semantics, request/response schemas, dependencies, and acknowledgement policy.
     - `HttpRestBindingSpec(proto=http.rest or https.rest, methods=(POST,), path=<containing path>)` owns the HTTP POST selector.
  3. The inbound webhook contract MAY define authoring conveniences, but those conveniences MUST normalize to `PathSpec + OpSpec + HttpRestBindingSpec` before runtime compilation, documentation projection, or conformance checks consume them.
  4. Signature verification, timestamp tolerance, replay protection, idempotency keys, event-type selection, payload schema, acknowledgement status, and failure response policy are ingress concerns and MUST be explicit in the webhook op contract or associated policy metadata.
  5. Startup and shutdown lifespan handlers are not webhook callbacks.
  6. `POST_RESPONSE` hooks are in-process semantic hooks. `POST_EMIT` remains a runtime-owned completion fence and is not a public webhook or callback hook phase.
  7. Inbound webhook documentation projection MUST expose the HTTP POST ingress operation through the ordinary docs projection path selected for HTTP/REST operations.
  
  ## Traceability
  
