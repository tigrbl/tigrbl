summary: "Replay policy must be declared before replay is admitted. The policy identifies eligible operations, replay modes, original attempt source, normalized input snapshot requirements, schema and runtime plan compatibility, effectful or observe-only behavior, idempotency requirements, nondeterminism boundaries, and unsupported replay rejection. Replay must not be inferred from retry, transport redelivery, idempotency key reuse, qlog presence, or trace availability."
