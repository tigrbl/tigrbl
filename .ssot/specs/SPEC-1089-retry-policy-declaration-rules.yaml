body: |-
  Retry policy must be declared before operation execution. The policy identifies eligible operations, retryable failure classes, maximum attempts, budget, backoff schedule, jitter policy, idempotency or replay requirement for mutations, transport/runtime ownership, and unsupported retry rejection. Retry must not be inferred from transport shape, HTTP method, connection failure, engine exception, or handler implementation.
