body: |-
  ## Decision
  
  1. Canonical factories and shortcuts MUST preserve route and docs projection consistency.
  2. Factory-driven materialization effects on docs-exposed routes are normative.
  3. Factory canonicalization cannot introduce docs/runtime exposure divergence.
