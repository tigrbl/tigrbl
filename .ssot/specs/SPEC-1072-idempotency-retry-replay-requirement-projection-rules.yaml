body: |-
  Atom-chain requirement projection must declare idempotency, retry, replay, attempt parentage, dedupe key, and replay source requirements when the op or atom chain supports retryable or replayable behavior. CREATE with an idempotency key must avoid duplicate effects, replay must preserve original_attempt_id parentage, and unsupported retry or replay must fail closed rather than silently re-execute side effects.
