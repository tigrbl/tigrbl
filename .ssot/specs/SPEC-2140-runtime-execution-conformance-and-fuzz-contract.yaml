body: |-
  ## Intent
  Define required conformance, negative, fuzz, and parity evidence for runtime physical layouts used by atoms, compiled kernel plans, runtime dispatch, identity/scalar references, and Python/Rust runtime codecs.
  
  ## Required Conformance Tests
  Every runtime physical layout MUST provide round-trip tests for representative valid values, deterministic encode tests where encoding exists, deterministic decode/materialization tests, boundary value tests for counts and lengths, and compatibility tests for supported versions.
  
  ## Required Negative Tests
  Negative tests MUST include unsupported version, unknown required tag, nonzero reserved bits, truncated header, truncated section, offset overflow, length overflow, count mismatch, invalid fixed-width scalar length, scalar overflow, invalid enum or flag value, invalid atom/phase pairing, invalid branch reference, dangling table index, invalid identity shape reference, and unsupported scalar code.
  
  ## Fuzz And Property Tests
  Fuzz or property tests SHOULD target RuntimeEventKey, dispatch metadata records, packed KernelPlan records, phase-chain and phase-tree records, atom-chain tables, callback-fence tables, identity/scalar reference tables, runtime codec envelopes, and batch sidecars/slabs.
  
  ## Parity Tests
  Where Python and Rust both consume a runtime physical format, parity tests MUST prove equivalent canonical bytes or compact payloads, equivalent validation failures, equivalent dispatch results, equivalent plan traversal, and equivalent cold-metadata deferral for representative cases.
  
  ## Evidence Boundaries
  This SPEC covers runtime execution formats only. Engine recovery, WAL replay, page checksums, storage block corruption, and persistence-specific fuzzing belong to engine-specific evidence contracts.
  
  ## Release Gate
  A runtime physical layout SHOULD NOT be marked release-grade unless the linked tests and evidence cover both success behavior and invalid-layout rejection. Unsupported or ambiguous layouts MUST fail before atom execution.
