body: |-
  ## Intent
  
  This document defines the governed hook extension surface for Tigrbl.
  
  ## Canonical Surface
  
  - The hook extension surface includes `HookSpec`, `HookPhase`, and the canonical hook phase/type layer.
  - Hook attachment through app, router, table, and op declarations is part of the hook surface because it governs where hook behavior may be declared.
  - Phase legality, selector semantics, and deterministic execution ordering remain part of the hook extension surface.
  - Hooks remain distinct from middleware: hooks participate in phase-bound semantic execution, while middleware wraps the transport/runtime boundary.
  
  ## Public and Base Projection
  
  - Public or semi-public hook projection may appear through `tigrbl`, `tigrbl_base`, `hook_ctx`, `build_hooks`, and diagnostics builders such as hook-oriented system endpoints.
  - Public projection does not widen the legal hook model beyond the canonical spec-layer contract.
  
  ## Feature Granularity
  
  - One parent feature may track the hook extension surface as a whole.
  - Separate child features may track:
    - phase and selector semantics;
    - attachment and ordering behavior;
    - public and base projection of hook-facing contracts.
  
  ## Classification Rules
  
  - phase/selector feature: legal phases and selector vocabulary
  - attachment/ordering feature: declaration surfaces and deterministic execution order
  - projection feature: public or base export surfaces that project hook contracts
  
  ## Traceability
  
  - ADRs: `adr:1004`, `adr:1009`, `adr:1010`, `adr:1052`, `adr:1053`
  - Related specs: `spc:2025`, `spc:2026`
