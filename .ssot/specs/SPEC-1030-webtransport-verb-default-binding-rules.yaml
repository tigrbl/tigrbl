body: |-
  ## Intent
  
  Define default binding lowering for WebTransport session, bidirectional stream, client stream, server stream, and datagram operation verbs with lane-compatible defaults.
  
  ## Default Operation Mapping
  
  When a WebTransport table profile declares a control stream, the default control binding is:
  
  - carrier: `bidi_stream`
  - lane purpose: `control`
  - opens: `first`
  - framing: `JsonRpcFramingSpec`
  
  The default control stream may carry:
  
  - `create`
  - `read`
  - `update`
  - `replace`
  - `merge`
  - `delete`
  - `list`
  - `clear`
  - `count`
  - `exists`
  - `checkpoint`
  - `open_bidi_stream`
  - `open_unidi_stream`
  - `close_stream`
  - `close_session`
  
  Server-to-client stream defaults:
  
  - `subscribe`, `tail`, and `download` lower to `unidi_server_stream` or explicitly declared `bidi_stream` lanes.
  - Default lane purpose is `events`.
  - Default framing is `NdjsonFramingSpec` unless the table profile declares a different stream-compatible framing.
  
  Client-to-server stream defaults:
  
  - `upload` and `append_chunk` lower to `unidi_client_stream`.
  - Default lane purpose is `upload`.
  - Default framing is `BytesFramingSpec`.
  
  Datagram defaults:
  
  - `send_datagram` lowers to `datagram`.
  - Default lane purpose is `presence` unless explicitly overridden.
  - Default framing is `BytesFramingSpec` unless the profile declares `JsonFramingSpec`, `TextFramingSpec`, or `BinaryFramingSpec`.
  
  ## Rejections
  
  `JsonRpcFramingSpec` and `NdjsonFramingSpec` must fail closed on datagram defaults.
  
  A default WebTransport binding must not infer one operation's framing from another operation's lane.
  
  ## Validation
  
  Tests must cover at least one table where CRUD and control-plane ops use the control stream, `tail` uses an events stream, `append_chunk` uses an upload stream, and `send_datagram` uses a datagram lane.
