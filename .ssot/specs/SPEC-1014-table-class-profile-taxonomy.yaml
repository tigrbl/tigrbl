body: |-
  Define abstract, concrete, transport-specific, documentation, runtime exposure, and compatibility roles for table profile classes.

  HTTP concrete table profile taxonomy includes REST-only, HTTP JSON-RPC-only, and REST+JSON-RPC parity classes. RestJsonRpcTable is the CRUD parity class. RestOltpTable, JsonRpcOltpTable, and RestJsonRpcOltpTable are OLTP protocol-family classes. RestOlapTable, JsonRpcOlapTable, and RestJsonRpcOlapTable are OLAP protocol-family classes. OltpTable and OlapTable are REST-basis compatibility names.
