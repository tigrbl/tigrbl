body: |-
  HTTP stream, SSE, WebSocket, and WebTransport stream bindings must declare their ordering scope. HTTP stream order is scoped to chunks within the response attempt, SSE order is scoped to emitted event sequence and reconnect cursor policy, WebSocket order is scoped to the connection lane, and WebTransport stream order is scoped to the stream_id.
