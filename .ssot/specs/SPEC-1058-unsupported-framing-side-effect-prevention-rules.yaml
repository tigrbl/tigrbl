summary: "Unsupported framing rejection must have no persistence effects, no atom-chain side effects, no emitted operation result, no session state ownership transfer, and no cross-session or cross-engine-session leakage. Rejection may record diagnostics only within the rejecting attempt or transport/session identity partition."
