body: |-
  The authored registry is entity-centric JSON.
  The graph export is derived and consists of nodes and typed edges.
  
  Representative edge types:
  - `SCOPES`
  - `USES_BOUNDARY`
  - `ASSERTS`
  - `VERIFIES`
  - `SUPPORTS`
  - `DERIVES_FROM`
  - `AFFECTS`
  - `PUBLISHES`
  - `INCLUDES`
  - `REQUIRES`
  
  A `REQUIRES` edge derived from `feature.requires` SHALL represent a passing prerequisite relationship.
  It SHALL NOT be used to model parent/leaf, umbrella/member, category/item, or inventory grouping
  composition. Such grouping remains a feature inventory convention unless represented through a separate
  SSOT entity with its own semantics.
