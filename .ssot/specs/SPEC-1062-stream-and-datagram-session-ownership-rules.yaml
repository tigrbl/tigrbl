body: |-
  stream_id and datagram_id are concrete child identifiers owned by exactly one session_id and transport binding partition. A stream or datagram cannot read, mutate, close, replay, or emit state for another session; cross-lane or cross-session ownership transfer is invalid unless a declared lifecycle transition explicitly creates a new owned instance.
