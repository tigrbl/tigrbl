body: |-
  ## Decision
  
  1. Supported server runner surface is normative for declared runners.
  2. Runner support includes preserving required docs route/payload/UI availability where applicable.
  3. Runner compatibility and failure behavior must be testable and classification-stable.
  4. Uvicorn-backed protocol modes must preserve Tigrbl-owned application semantics: routing, dispatch, validation, status projection, and error mapping.
  5. Runner-specific behavior is non-semantic unless a SPEC explicitly marks it as part of the Tigrbl contract.
  
  ## Integration Coverage
  
  - `pkgs/core/tigrbl_tests/tests/i9n/test_uvicorn_transport_behavior.py`
  - `pkgs/core/tigrbl_tests/tests/i9n/test_tigrbl_app_uvicorn.py`
  - `pkgs/core/tigrbl_tests/tests/i9n/test_tigrbl_api_uvicorn.py`
  
