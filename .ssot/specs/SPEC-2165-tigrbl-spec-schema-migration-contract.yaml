body: |-
  Defines the Tigrbl spec schema migration contract.
  
  Migrations are catalog-level and adjacent. Every version update requires a registered migration from the previous supported catalog version to the next catalog version.
  
  The public API must expose payload migration from a source catalog version to a target catalog version, report the migration path, and fail clearly when a downgrade, skipped transition, or unknown version is requested.
  
  Identity migrations are explicit registered migrations.
