body: |-
  ## Intent
  Define which execution responsibilities belong to KernelPlan compilation, atom implementation, engine implementation, and Python executors that consume a compiled plan without re-authoring plan semantics at runtime.

  This SPEC also defines execution-path structural constraints shared by `tigrbl_kernel`, `tigrbl_atoms`, and `tigrbl_runtime`:
  - zero dynamic field lookup
  - cache-friendly layout
  - protocol-agnostic payload

  These constraints are normative for execution-path data and code, not advisory style preferences.

  ## Python-Only Runtime Constraint
  Core Tigrbl supports Python runtime executors only. `tigrbl_kernel` MUST NOT expose supported Rust compiler, Rust plan, or Rust spec helpers such as `rust_spec`, `rust_plan`, or `rust_compile`.

  Compatibility shims, if retained temporarily, must be explicit deprecation surfaces governed by `adr:1185` and `spc:2187`; they must not behave as supported executor compiler paths.

  ## Shared Structural Constraints
  ### Zero dynamic field lookup
  Execution-path code MUST prefer precompiled field selection, fixed keys, typed slots, or stable row layouts.

  Execution-path code MUST NOT depend on:
  - opportunistic `getattr` or `hasattr` probing across multiple candidate field names
  - protocol-specific payload guessing based on ad hoc key presence
  - runtime reconstruction of semantic meaning by scanning heterogeneous payload shapes

  Bounded cache/index acceleration over already-compiled plan data is allowed. Reflection-oriented fallback logic is not.

  ### Cache-friendly layout
  Execution-path artifacts MUST favor stable, compact, repeated layouts that are cheap to traverse.

  ### Protocol-agnostic payload
  Payload passed across execution boundaries SHOULD be protocol-agnostic unless a boundary is explicitly protocol-specific.

  ## Authority Split
  ### Kernel authority
  The Python kernel compiler owns all artifacts that decide what execution steps exist, how they are grouped, what order or barriers they preserve, which callback fences apply, which subevent handlers are selected, and which transaction policy applies to a subevent or phase path.

  Kernel-owned artifacts include transport atom chains, segment descriptions, fused segment layouts, phase trees, callback metadata, subevent handler lookup tables, subevent transaction-unit tables, and dispatch metadata sufficient to choose a plan path without semantic-object reconstruction.

  ### Atom authority
  Atoms own concrete executable units referenced by the plan.

  ### Engine authority
  Engines own provider/session/storage behavior.

  ### Executor authority
  Python executors consume a compiled `KernelPlan`.

  Executor-owned behavior is limited to:
  - creating and carrying per-request execution context
  - selecting the already-compiled plan path for the current request/channel
  - traversing compiled phases, branches, segments, and tables
  - invoking referenced atoms and engine hooks
  - applying already-compiled error branches, rollback branches, and completion behavior
  - surfacing plan-driven outcomes to runtime integration boundaries

  Executors MUST NOT act as fallback compilers, synthesize callback-fence policy, construct new subevent transaction policy, or invent alternate language-specific compiler outputs.

  ## Invalid Placements
  The following are non-conformant:
  - runtime helper modules that restate protocol-chain structure outside the plan
  - runtime-owned callback policy descriptors that are not compiler-produced artifacts
  - runtime-owned subevent transaction wrappers that decide policy rather than invoking plan-selected policy
  - executor code that acts as a fallback compiler for missing plan sections
  - `tigrbl_kernel` Rust compiler/spec/plan helpers that appear as supported in-core runtime paths
  - execution-path payloads whose meaning depends on dynamic field discovery rather than canonical compiled fields

  ## Evidence
  Tests and review evidence for this SPEC MUST prove:
  - compiled plan artifacts contain the authority needed for execution
  - executor traversal works by consuming compiled plan sections rather than reconstructing policy
  - atom implementations are invokable via plan references
  - execution-path payload and table layouts avoid dynamic semantic lookup in the governed path
  - Rust kernel compiler/spec/plan helpers are deprecated, removed, or fail closed as unsupported surfaces
