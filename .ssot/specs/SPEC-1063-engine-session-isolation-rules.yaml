summary: "engine_session_id and transaction_id must be owned by the attempt_id, session_id, app_id, router_id, table_id, and op_id that acquired them. Commit, rollback, flush, close, lease, reset, retry, and diagnostic events must fail closed when the engine session or transaction parentage does not match the active attempt partition."
