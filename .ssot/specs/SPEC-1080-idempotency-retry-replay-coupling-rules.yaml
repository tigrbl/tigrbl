summary: "Transport retry, runtime retry, and replay may consume idempotency only when the operation declares idempotent behavior or a replay policy. Non-idempotent mutation retry without policy fails closed. Replay must preserve original_attempt_id and duplicate attempts must link to the original attempt, trace_id, qlog record, and idempotency record."
