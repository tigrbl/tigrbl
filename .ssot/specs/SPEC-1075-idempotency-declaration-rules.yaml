summary: "Operations that support idempotency must declare the idempotency policy in the compiled runtime contract. The declaration identifies eligible verbs or custom ops, key source, duplicate response behavior, payload compatibility rules, storage/fence behavior, retry/replay coupling, and unsupported-policy rejection. Idempotency must not be inferred solely from HTTP method, transport, engine, or handler naming."
