summary: "Retry budgets, max attempts, backoff schedule, jitter policy, ordering guarantees, and terminal exhaustion behavior must be declared and deterministic unless nondeterministic jitter is explicitly declared as an input. Retry order must preserve declared per-operation, per-session, per-stream, per-datagram, or per-engine-session ordering constraints."
