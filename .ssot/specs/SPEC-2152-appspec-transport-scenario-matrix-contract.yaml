body: |-
  ## Intent

  Define the canonical AppSpec transport scenario matrix across path kinds, protocol bindings, exchange modes, framing modes, documentation projections, static surfaces, and nested mounts.

  The matrix is a coverage truth for canonical lowering. Supported rows are not
  merely declarative inventory; they must lower from canonical AppSpec graphs
  into runtime behavior and docs/runtime parity checks.

  ## Contract

  1. Transport scenario coverage MUST be modeled separately from engine binding.
  2. `PathSpec` owns concrete address paths.
  3. Binding specs own protocol, exchange, framing, selector, and transport-specific invocation semantics.
  4. `DocsProjectionSpec`, `DocsPayloadSpec`, and `DocsUixSpec` own documentation projection and documentation exposure semantics.
  5. The transport matrix MUST enumerate both implemented and planned/fail-closed scenarios so missing support is explicit.
  6. HTTP REST and HTTP JSON-RPC MUST remain first-class request/response surfaces.
  7. HTTP stream and HTTPS stream MUST have canonical path representation instead of being hidden under generic resource paths.
  8. SSE MUST remain a server-stream surface with `sse` framing.
  9. WebSocket and WSS MUST support text/binary baseline framing.
  10. WS+JSON-RPC and WSS+JSON-RPC MUST be symmetric canonical scenarios represented by websocket protocol plus JSON-RPC framing or an equivalent normalized binding.
  11. WS+NDJSON and WSS+NDJSON MUST be explicit planned/fail-closed scenarios until `ndjson` framing and corresponding path kinds are implemented.
  12. WebTransport MUST remain a bidirectional stream/datagram-capable transport scenario.
  13. Message and datagram binding scenarios MUST be represented in the matrix even when their canonical address model is not path-owned.
  14. Docs payload and docs UIX scenarios MUST prove inclusion is selected by docs projection policy, not by incidental path exposure or ad hoc runtime route inspection.
  15. Static file serving and nested app mounts MUST be ordinary canonical path scenarios with their own spec payloads.
  16. Websocket subprotocol negotiation MUST be modeled separately from websocket message framing under `spc:2153`.
  17. The transport matrix MUST NOT be treated as a canonical spec graph entity or a required production module. It is a governed coverage contract whose rows are satisfied by canonical spec entities such as `PathSpec`, binding specs, docs projection specs, `AppSpec`, `RouterSpec`, `TableSpec`, and `OpSpec`.
  18. Runtime lowerers and docs emitters MUST derive supported rows from canonical AppSpec entities after normalization. Reconstructing transport support exclusively from legacy model/router artifacts is invalid for matrix closure.

  ## Implementation Boundary

  The authoritative transport matrix is the SSOT/SPEC table and its linked tests. Implementations satisfy the matrix by adding fields, validation, and lowering behavior to the existing canonical spec layers. A standalone production `transport_matrix` module MUST NOT become a second source of truth for path kinds, protocol bindings, docs projection, static serving, nested mounts, or websocket framing/subprotocol semantics.

  ## Transport Matrix

  | Scenario | Binding | Path kind | Expected support |
  |---|---|---|---|
  | HTTP REST | `HttpRestBindingSpec(proto="http.rest")` | `resource` | Supported |
  | HTTPS REST | `HttpRestBindingSpec(proto="https.rest")` | `resource` | Supported |
  | HTTP JSON-RPC | `HttpJsonRpcBindingSpec(proto="http.jsonrpc")` | `jsonrpc` | Supported |
  | HTTPS JSON-RPC | `HttpJsonRpcBindingSpec(proto="https.jsonrpc")` | `jsonrpc` | Supported |
  | HTTP stream | `HttpStreamBindingSpec(proto="http.stream")` | `stream` | Planned canonical path coverage |
  | HTTPS stream | `HttpStreamBindingSpec(proto="https.stream")` | `stream` | Planned canonical path coverage |
  | HTTP SSE | `SseBindingSpec(proto="http.sse")` | `sse` | Supported |
  | HTTPS SSE | `SseBindingSpec(proto="https.sse")` | `sse` | Supported |
  | WS text | `WsBindingSpec(proto="ws", framing="text", subprotocols=())` | `websocket` | Supported |
  | WSS text | `WsBindingSpec(proto="wss", framing="text", subprotocols=())` | `websocket` | Supported |
  | WS binary | `WsBindingSpec(proto="ws", framing="binary", subprotocols=())` | `websocket` | Supported |
  | WSS binary | `WsBindingSpec(proto="wss", framing="binary", subprotocols=())` | `websocket` | Supported |
  | WS JSON-RPC | `WsBindingSpec(proto="ws", framing="jsonrpc", subprotocols=("jsonrpc",))` | `ws-jsonrpc` | Planned canonical symmetry |
  | WSS JSON-RPC | `WsBindingSpec(proto="wss", framing="jsonrpc", subprotocols=("jsonrpc",))` | `wss-jsonrpc` | Partially supported; needs corpus symmetry |
  | WS NDJSON | `WsBindingSpec(proto="ws", framing="ndjson", subprotocols=("ndjson",))` | `ws-ndjson` | Planned/fail-closed |
  | WSS NDJSON | `WsBindingSpec(proto="wss", framing="ndjson", subprotocols=("ndjson",))` | `wss-ndjson` | Planned/fail-closed |
  | WebTransport | `WebTransportBindingSpec()` | `webtransport` | Supported |
  | Message bus | `MessageBindingSpec(proto=...)` | non-path or message address | Partial; address model pending |
  | Datagram | `DatagramBindingSpec(proto=...)` | non-path or datagram address | Partial; address model pending |
  | Docs payload | `DocsPayloadSpec(...)` | `docs-payload` | Supported by docs projection contract |
  | Docs UIX | `DocsUixSpec(...)` | `docs-uix` | Supported by docs projection contract |
  | Static files | static spec payload | `static` | Structural; canonical static spec pending |
  | Nested app mount | mount spec payload | `mount` | Structural; canonical mount spec pending |

  ## Validation Matrix

  | Scenario | Expected |
  |---|---|
  | Every supported binding appears in the matrix | Valid. |
  | A binding path conflicts with containing `PathSpec.path` | Invalid. |
  | A JSON-RPC binding declares a method but conflicts with dispatcher path | Invalid. |
  | `http.stream` lacks `stream` path coverage | Fails planned transport matrix test until implemented. |
  | `ws` JSON-RPC has no symmetric path kind with `wss` JSON-RPC | Fails planned transport matrix test until implemented. |
  | `ndjson` framing is referenced before supported | Must fail closed with explicit planned status. |
  | `framing="jsonrpc"` is paired with an unrelated subprotocol such as `graphql-ws` | Invalid. |
  | Websocket docs projection includes framing or subprotocol metadata outside its selected binding scope | Invalid. |
  | Docs payload includes protocols outside its projection | Invalid. |
  | Docs UIX selects payload or projection not declared in the canonical tree | Invalid. |
  | Static and mount paths lack canonical payload shape | Planned/fail-closed until spec payloads are defined. |
  | A production `transport_matrix` module becomes the authority for supported transports | Invalid; the SSOT matrix is coverage truth and canonical spec entities own implementation behavior. |

  ## Traceability

  - ADRs: `adr:1129`, `adr:1131`, `adr:1006`, `adr:1007`, `adr:1023`, `adr:1051`, `adr:1080`
  - Companion specs: `spc:2153`
  - Defines features: `feat:transport-scenario-matrix-001`, `feat:transport-stream-pathkind-001`, `feat:transport-ws-wss-jsonrpc-001`, `feat:transport-ws-wss-ndjson-001`, `feat:docs-transport-projection-selection-001`, `feat:ws-jsonrpc-subprotocol-parity-001`, `feat:ws-ndjson-fail-closed-001`, `feat:wsbindingspec-framing-subprotocol-validation-001`

  ## Verification Plan

  - `tst:transport-scenario-matrix-contract`
  - `tst:transport-stream-pathkind-contract`
  - `tst:transport-ws-jsonrpc-contract`
  - `tst:transport-ws-ndjson-contract`
  - `tst:docs-transport-projection-selection-contract`
  - `tst:ws-jsonrpc-subprotocol-parity-contract`
  - `tst:ws-ndjson-fail-closed-contract`
  - `tst:wsbindingspec-framing-subprotocol-validation-contract`

  Tests MUST assert transport matrix rows through canonical spec entities and their lowering/validation behavior. They MUST NOT require a standalone production `transport_matrix` module, and they MUST fail if runtime parity is achieved only through non-canonical legacy reconstruction.
