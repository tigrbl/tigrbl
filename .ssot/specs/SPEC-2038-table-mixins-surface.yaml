body: |-
  ## Intent
  
  Define the governed table-mixins surface for reusable ORM behavior.
  
  ## Invariants
  
  - Table mixins may contribute columns, hooks, schemas, deps, security deps, and marker capability.
  - Mixin-defined surface area participates in normal MRO-based collection and does not bypass table contracts.
  - Mixins remain composable and class-local.
  - Mixin projection through `tigrbl.orm.mixins` does not redefine canonical table ownership.
  
  ## Traceability
  
  - ADRs: `adr:1056`, `adr:1053`
  - Related features: `feat:bootstrappable-table-mixin-001`
