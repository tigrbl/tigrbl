title: "Runtime Parentage Graph"
status: "draft"
origin: "repo-local"
decision_date: null
tags: []
summary: "Defines parentage rules between semantic ids and concrete runtime ids. Required relationships include attempt_id to op_id to table_id to router_id to app_id, atom execution to atom_id plus attempt_id plus runtime_plan_id, stream_id to session_id, datagram_id to session_id, transaction_id to engine_session_id to attempt_id, trace_id to attempt_id or session_id as declared by event kind, and replay_id to original_attempt_id. Valid scenario: an attempt trace can be drilled back to op_id, table_id, router_id, and app_id, while atom execution events also name atom_id and runtime_plan_id. Invalid scenario: an event references a stream_id from another session_id, an engine_session_id from another attempt_id, or an atom execution only as an unlabeled callable. Invariants: every concrete event has stable identity and parentage, cross-scope references are explicit and validated, mismatched parentage fails closed, and rollup records retain enough parentage for drillback."
