summary: "A duplicate idempotent attempt must return the declared stable behavior. Valid behaviors include returning the original normalized result, returning a declared already-applied response, or returning a declared stable tombstone for duplicate DELETE. The runtime must not expose accidental behavior that depends on storage exceptions, transport retry timing, or handler side effects."
