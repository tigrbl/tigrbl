summary: "Delivery diagnostics must report the declared ordering scope, retry source, replay source, idempotency source, unsupported guarantee rejection, and relevant correlation identifiers. Diagnostics must be deterministic for the same binding contract and must distinguish transport limitations from op-level policy limitations."
