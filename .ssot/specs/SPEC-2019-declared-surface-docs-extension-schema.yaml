body: |-
  ## Intent
  
  This document defines the governed extension fields emitted for declared
  transport and operator surfaces in generated documentation.
  
  ## Invariants
  
  - docs builders emit `x-tigrbl-surface.binding.family` whenever a surface is
    bound to a declared transport family.
  - docs builders emit `x-tigrbl-surface.binding.proto` whenever a concrete
    protocol binding is declared.
  - docs builders emit `exchange`, `framing`, `subevents`, and `txScope` when
    those declarations exist on the bound surface.
  - undeclared metadata fields are omitted rather than synthesized from
    transport-specific guesses.
  - OpenAPI and OpenRPC projections agree on the declared-surface metadata they
    share.
  
  ## Traceability
  
  - ADRs: `adr:1030`
  - Specs: `spc:2010`
  - Related feature granularity lives in the registry layer.
