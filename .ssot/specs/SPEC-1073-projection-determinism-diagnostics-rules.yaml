summary: "Requirement projection must be deterministic for the same compiled atom and hook chain. Diagnostics must name the requirement key, source atom_id, hook_id where applicable, op_id, runtime_plan_id, binding identity, concrete attempt or session ids, and rejection reason. Diagnostics must not rely only on handler names or transport adapter names."
