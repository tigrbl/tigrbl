body: |-
  ## Intent
  
  This document defines the governed module, export, and public-facade projection surface for `tigrbl_core._spec`.
  
  ## Canonical Layer Surface
  
  - The canonical `_spec` module surface is the unique set of backing modules referenced by `tigrbl_core._spec.__init__._EXPORTS`, together with `hook_types` for the `PHASE` and `PHASES` aliases.
  - The canonical `_spec` export surface is the full key set of `tigrbl_core._spec.__init__._EXPORTS`.
  - `PHASE` and `PHASES` are governed `_spec` aliases even though they are materialized through special-case logic rather than ordinary `_EXPORTS` lookup.
  - `AppSpec`, `RouterSpec`, `TableSpec`, `ColumnSpec`, `FieldSpec`, `IOSpec`, `ForeignKeySpec`, and `ResponseSpec` remain governed typed contract objects when nested into authored composition surfaces.
  
  ## Public Operator Projection
  
  - The governed public operator projection for `_spec` is the intersection of the `_spec` export surface with `tigrbl.__all__`.
  - A governed public `_spec` export must continue to name the same underlying `_spec` contract concept even if the import path is projected through the facade.
  - `_spec` exports that are not re-exported through `tigrbl.__all__` remain governed private/internal `_spec` surface rather than public operator surface.
  
  ## Composition Surface
  
  - App/router/table composition rules are specified by the AppSpec and RouterSpec composition contract.
  - Router-owned tables and `TableSpec.model_ref` are spec-layer behaviors, not runtime-only conveniences.
  - Nested typed spec objects may be used to describe portable authored surfaces before concrete runtime materialization.
  
  ## Feature Granularity
  
  - One feature row may track each governed `_spec` module.
  - One feature row may track each governed `_spec` export.
  - One additional feature row may track each `_spec` export that is promoted into the public `tigrbl` facade.
  - Additional feature rows may track nested composition behaviors that span multiple exported spec objects.
  
  ## Classification Rules
  
  - module feature: ownership of the concrete backing module inside `tigrbl_core._spec`
  - export feature: ownership of the governed symbol exported from `tigrbl_core._spec`
  - public export feature: facade/operator-surface exposure of an `_spec` export through `tigrbl`
  - composition feature: behavior that requires multiple typed spec objects to compose into one authored surface
  
  ## Verification
  
  - `pkgs/core/tigrbl_tests/v4/tests/spec/test_master_app_spec_surface.py`
  
