body: |-
  ## Intent
  
  Define the canonical transport event registry for eventful protocol runtime support.
  
  ## Contract
  
  The registry declares inbound and outbound transport events, ASGI channel, semantic direction, required or optional status, event-to-scope mapping, extension namespace, and validation expectations for HTTP, WebSocket/WSS, WebTransport, static files, lifespan, callbacks, and webhooks.
  
  Tigrbl must consume canonical ASGI and tigr-asgi-contract event names as event identity. It must not introduce a required alternate event-name field to restate a lane.
  
  Runtime classification uses `event + channel + scope_type + binding + family + exchange + direction` plus required payload discriminators.
  
  `channel` is the ASGI callable side, `receive` or `send`. `direction` is peer-flow semantics and remains distinct from channel.
  
  ## Traceability
  
  ADRs: adr:1091, adr:1095, adr:1096, adr:1097, adr:1132.
