body: |-
  ## Intent
  
  Define the canonical transport event registry for eventful protocol runtime support.
  
  ## Contract
  
  The registry declares inbound and outbound transport events, direction, required or optional status, event-to-scope mapping, extension namespace, and validation expectations for HTTP, WebSocket/WSS, WebTransport, static files, lifespan, callbacks, and webhooks.
  
