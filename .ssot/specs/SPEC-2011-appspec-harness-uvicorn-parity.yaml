body: |-
  ## Content
  
  Date: 2026-04-16
  Kind: repo-local
  
  ## Scope
  
  This spec governs the current recovery lane for:
  
  - AppSpec materialization
  - imperative harness assembly
  - kernel bootstrap and plan priming
  - Uvicorn-backed REST / JSON-RPC end-to-end behavior
  - engine resolver precedence and multi-table routing under Uvicorn
  
  ## Required Invariants
  
  - AppSpec and imperative assembly compile to the same semantic kernel-plan outcome for equivalent declarations.
  - Kernel priming is idempotent and does not duplicate or mutate semantic opview identity.
  - Harness execution uses the same compiled routing and projection rules as ordinary runtime execution.
  - REST and JSON-RPC consume the same canonical operation result.
  - Request / response JSON-RPC calls return JSON-RPC envelopes; only notifications may project to `204 No Content`.
  - Engine resolver precedence, router prefixing, and multi-table resolution are transport-agnostic decisions applied before final projection.
  
  ## Targeted Failing Lanes
  
  - `pkgs/core/tigrbl_tests/tests/harness/test_03_appspec_uvicorn_e2e.py`
  - `pkgs/core/tigrbl_tests/tests/harness_e2e/test_00_appspec_uvicorn_rest_rpc.py`
  - `pkgs/core/tigrbl_tests/tests/harness_e2e/test_01_imperative_uvicorn_rest_rpc.py`
  - `pkgs/core/tigrbl_tests/tests/harness_v3/test_bootstrap_kernel_compilation.py`
  - `pkgs/core/tigrbl_tests/tests/harness_v3/test_kernel_plan_routing.py`
  - `pkgs/core/tigrbl_tests/tests/harness_v3/test_uvicorn_e2e_appspec.py`
  - `pkgs/core/tigrbl_tests/tests/i9n/test_engine_resolver_uvicorn.py`
  
  ## Implementation Expectations
  
  - Fixes must converge on one compiled-plan and one projection path rather than introducing harness-only or transport-specific branches.
  - Resolver and multi-table behavior must be verified in both mounted and prefixed Uvicorn scenarios.
  - Regression proof should prefer the existing `tigrbl_tests` parity lanes rather than adding new bespoke smoke tests first.
  
  ## Traceability
  
  - ADR: `adr/ADR-0030-appspec-harness-and-uvicorn-projections-preserve-canonical-outcomes.md`
  - Features:
    - `feat:appspec-harness-uvicorn-e2e-parity-001`
    - `feat:kernel-bootstrap-plan-parity-001`
    - `feat:engine-resolver-multi-table-rpc-001`
