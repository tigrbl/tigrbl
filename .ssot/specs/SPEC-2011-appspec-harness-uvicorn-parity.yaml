body: |-
  ## Intent
  
  This document governs the recovery lane for AppSpec materialization,
  imperative harness assembly, and Uvicorn-backed REST / JSON-RPC execution.
  
  ## Invariants
  
  - equivalent AppSpec and imperative declarations compile to the same semantic
    kernel plan.
  - harness execution uses the same compiled routing and projection rules as
    ordinary runtime execution.
  - REST and JSON-RPC consume the same canonical operation result under
    Uvicorn-backed execution.
  - request/response JSON-RPC calls return JSON-RPC envelopes and only
    notifications may project to `204 No Content`.
  - engine resolver precedence is transport-agnostic and resolves before final
    projection.
  - mounted and prefixed Uvicorn scenarios preserve the same routing semantics.
  - multi-table routing preserves the same semantic behavior across REST and
    JSON-RPC.
  
  Kernel bootstrap, priming, and OpView cache lifecycle are governed
  normatively by `spc:2018`.
  
  ## Targeted Failing Lanes
  
  - `pkgs/core/tigrbl_tests/tests/harness/test_03_appspec_uvicorn_e2e.py`
  - `pkgs/core/tigrbl_tests/tests/harness_e2e/test_00_appspec_uvicorn_rest_rpc.py`
  - `pkgs/core/tigrbl_tests/tests/harness_e2e/test_01_imperative_uvicorn_rest_rpc.py`
  - `pkgs/core/tigrbl_tests/tests/harness_v3/test_bootstrap_kernel_compilation.py`
  - `pkgs/core/tigrbl_tests/tests/harness_v3/test_kernel_plan_routing.py`
  - `pkgs/core/tigrbl_tests/tests/harness_v3/test_uvicorn_e2e_appspec.py`
  - `pkgs/core/tigrbl_tests/tests/i9n/test_engine_resolver_uvicorn.py`
  
  ## Implementation Expectations
  
  - Fixes must converge on one compiled-plan and one projection path rather than introducing harness-only or transport-specific branches.
  - Resolver and multi-table behavior must be verified in both mounted and prefixed Uvicorn scenarios.
  - Regression proof should prefer the existing `tigrbl_tests` parity lanes rather than adding new bespoke smoke tests first.
  
  ## Traceability
  
  - ADRs: `adr:1031`
  - Specs: `spc:2018`
  - Related feature granularity lives in the registry layer.
