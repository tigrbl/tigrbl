body: |-
  ## Intent
  Define compiled parameter shapes for protocol bindings and keep ParamShape distinct from IdentityShape.
  
  ## Structure
  ParamShape contains param_shape_id:u32, path_count:u8, query_count:u8, header_count:u8, body_count:u8, scope_count:u8, flags, and ParamDescriptor entries.
  
  Each ParamDescriptor contains param_id:u32, location:u8, scalar_type:u8 or u16, required flags, decoder_id:u16, validator_chain_id:u32, and optional canonical name ID.
  
  ## Scope
  ParamShape includes all bound parameters from path, query, header, body, scope, context, or protocol metadata. IdentityShape includes only identity-bearing values derived from params or context.
  
  ## Invariants
  ParamShape IDs are deterministic for equivalent canonical parameter descriptors. Parameter name interning and scalar codes must be stable across Python and Rust runtime lanes.
