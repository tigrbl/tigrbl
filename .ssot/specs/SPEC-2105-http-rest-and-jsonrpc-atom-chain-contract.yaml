body: |-
  ## Intent
  
  Define unary HTTP REST and HTTP JSON-RPC atom chains.
  
  ## Contract
  
  REST and HTTP JSON-RPC chains declare ingress, binding match, framing decode where needed, exchange/family/subevent derivation, operation resolution, handler execution, response shaping, framing encode where needed, transport emission, and completion.
  
