body: |-
  ## Intent
  
  Define the required projection effects of a materialized `OpSpec`.
  
  ## Canonical Surface
  
  - `OpSpec` is the normalized operation declaration consumed by projection builders.
  - Materialization may produce schemas, column/default bindings, storage behavior, REST routes, JSON-RPC methods, hooks, handler atoms, documentation records, and system-step registry entries.
  - Projection builders may produce different views of the same operation, but they must not reinterpret raw decorator inputs independently.
  - Projection gaps are implementation-status gaps against the materialization contract.
  
  ## Projection Rules
  
  - Schema builders consume operation request and response metadata.
  - Handler builders consume target, alias, arity, persist policy, hooks, and core handler metadata.
  - REST and JSON-RPC builders consume normalized operation bindings and semantic metadata.
  - Hook and atom registries consume normalized phase and handler-chain projections.
  - System registries and docs consume materialized operation records rather than transport-specific side channels.
  
