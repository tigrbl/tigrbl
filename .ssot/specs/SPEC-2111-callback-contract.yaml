body: |-
  ## Intent
  
  Define first-class runtime callbacks.
  
  ## Contract
  
  Callbacks declare registration, invocation, lifecycle, transaction ordering, security context, result handling, cancellation, retry eligibility, error behavior, observability, and Python/Rust executor parity requirements.
  
