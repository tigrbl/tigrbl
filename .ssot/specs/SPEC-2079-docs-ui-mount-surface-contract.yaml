body: |-
  ## Decision
  
  1. Docs UI surfaces are supported as explicit mounts over canonical docs payload routes.
  2. UI support obligations are limited to availability and mount behavior, not framework-specific rendering internals.
  3. UI surfaces MUST consume canonical payload routes and MUST NOT define independent projection logic.
