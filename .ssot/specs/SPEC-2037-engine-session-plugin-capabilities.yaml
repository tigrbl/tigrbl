body: |-
  ## Intent
  
  Define engine-session plugin capabilities that influence provider resolution and session construction.
  
  ## Invariants
  
  - Engine plugins may advertise or resolve sync/async session-factory behavior.
  - Session plugin capabilities include factory construction, provider acquisition, and `SessionSpec` application.
  - Plugin capability resolution remains engine-owned and may affect runtime and DDL execution paths.
  - Session capability extension does not bypass engine precedence rules.
  
  ## Traceability
  
  - ADRs: `adr:1015`, `adr:1055`
  - Related features: `feat:engine-surface-plugin-resolution-001`, `feat:engine-session-runtime-surface-001`
