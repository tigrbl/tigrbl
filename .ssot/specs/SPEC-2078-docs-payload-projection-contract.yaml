body: |-
  ## Decision
  
  1. Documentation payloads (OpenAPI/OpenRPC and related docs artifacts) are canonical projections.
  2. Payload generation MUST be deterministic for equivalent canonical inputs.
  3. Security, operation visibility, request/response schema references, and status/error metadata emitted in payloads are normative.
  4. Payload projections MUST derive from canonical metadata ownership boundaries.
  5. Payload inclusion MUST be selected from canonical docs projection policy rather than inferred only from mounted runtime routes or incidental docs endpoints.
  6. Docs payload paths such as `/openapi.json` and `/openrpc.json` MAY be ordinary canonical path nodes, but the payload contract is still governed by the selected docs projection rather than by path presence alone.
  7. Bulk operation schemas, clear response schemas, schema examples, and client-facing request/response schema objects are part of the payload projection contract.
  
  ## Integration Coverage
  
  - `pkgs/core/tigrbl_tests/tests/i9n/test_bulk_docs_client.py`
  - `pkgs/core/tigrbl_tests/tests/i9n/test_openapi_clear_response_schema.py`
  - `pkgs/core/tigrbl_tests/tests/i9n/test_openapi_schema_examples_presence.py`
  - `pkgs/core/tigrbl_tests/tests/i9n/test_schema.py`
  
