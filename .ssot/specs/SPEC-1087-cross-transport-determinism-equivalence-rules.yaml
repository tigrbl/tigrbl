summary: "When transports bind to the same semantic operation and equivalent normalized inputs, REST, HTTP JSON-RPC, WebSocket JSON-RPC, stream/SSE, WebTransport stream, and WebTransport datagram surfaces must produce equivalent normalized semantics where the op declares equivalence. Transport-specific envelope fields are excluded; normalized result, error classification, persistence effects, idempotency behavior, and diagnostics are compared."
