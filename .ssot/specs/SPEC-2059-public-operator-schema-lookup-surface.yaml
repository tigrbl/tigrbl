body: |-
  ## Intent
  
  Define the governed public operator schema-lookup surface exposed through `get_schema()` on the `tigrbl` facade.
  
  ## Canonical Surface
  
  - `get_schema()` is the only schema/helper-like facade export that is governed as a public operator helper surface.
  - `get_schema()` is a read-only lookup over already-declared or already-bound schema objects; it does not become a schema-definition authority.
  - `get_schema()` may resolve schema objects for operator-facing runtime/docs integration without widening the authoring-helper surface.
  - Internal builder helpers such as `_build_schema()` and `_build_list_params()` are not governed public operator surfaces.
  
  ## Classification Rules
  
  - lookup-helper feature: read-only schema lookup surface explicitly supported on the facade
  - non-goal: builder/materialization helpers becoming public merely because they are importable
  
  ## Traceability
  
  - ADRs: `adr:1039`, `adr:1052`, `adr:1063`
  - Related features: `feat:get-schema-python-helper-surface-001`
