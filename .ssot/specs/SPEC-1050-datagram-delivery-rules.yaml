body: |-
  WebTransport datagram bindings must declare unordered and unreliable delivery unless a higher-level acknowledgement, deduplication, or replay policy is explicitly bound. Datagram delivery must not be lowered to stream ordering, request-response ordering, or exactly-once behavior by fallback.
