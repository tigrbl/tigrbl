body: |-
  ## Intent
  
  Define the governed default canonical engine catalog and engine-family default-selection behavior for Tigrbl.
  
  ## Canonical Surface
  
  - The default canonical engine catalog is engine-owned and distinct from runtime dispatch/executor concepts.
  - Built-in engine families and their family-default rules are governed inputs to engine resolution, lowering, provider selection, and bootstrap behavior.
  - Family-default behavior must remain aligned with the datatype-lowering and registry-bridge contracts.
  - Catalog/default semantics may be projected through engine plugins and builders, but those projections do not make the engine catalog a runtime-owned surface.
  
  ## Classification Rules
  
  - catalog feature: built-in/default engine-family inventory and catalog semantics
  - family-default feature: default engine-family selection and family-alignment behavior
  - non-goal: describing the engine catalog as a runtime-dispatch boundary
  
