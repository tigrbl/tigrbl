body: |-
  ## Intent
  
  Define when protocol session metadata may be derived from typed framing specs without making framing and session metadata the same layer.
  
  ## Contract
  
  Framing-derived session metadata is allowed only when:
  
  - the framing spec explicitly declares a required protocol/session metadata value;
  - the selected protocol binding supports that metadata field;
  - the derived value does not conflict with an explicit advanced protocol binding declaration;
  - validation records the derived value as protocol/session metadata, not as framing.
  
  ## WebSocket JSON-RPC
  
  `WebSocketProtocolBindingSpec` with `JsonRpcFramingSpec` derives:
  
  - `websocket_subprotocol = "jsonrpc"`
  
  The new protocol binding spec does not author `subprotocols` or `required_subprotocol`.
  
  The derived session label does not parse JSON-RPC payloads. JSON-RPC parsing remains the responsibility of `JsonRpcFramingSpec`.
  
  ## Non-WebSocket Protocols
  
  HTTP and WebTransport do not use WebSocket subprotocol negotiation. `JsonRpcFramingSpec` on HTTP or WebTransport must not create a WebSocket subprotocol field.
  
  WebTransport control-stream reservation is selected by protocol binding topology, not by JSON-RPC framing. WebTransport exposes a lane catalog from `control_stream`, `streams`, and `datagrams`; it must not project WebSocket subprotocol metadata.
  
  ## Validation
  
  Tests must prove that WebSocket JSON-RPC derives `websocket_subprotocol="jsonrpc"`, HTTP JSON-RPC does not, and WebTransport JSON-RPC does not.
  
  Tests must prove authored WebSocket subprotocol metadata is not part of the new `WebSocketProtocolBindingSpec` schema.
