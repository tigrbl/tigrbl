body: |-
  ## Intent
  
  Define when protocol session metadata may be derived from typed framing specs without making framing and session metadata the same layer.
  
  ## Contract
  
  Framing-derived session metadata is allowed only when:
  
  - the framing spec explicitly declares a required protocol/session metadata value;
  - the selected protocol binding supports that metadata field;
  - the derived value does not conflict with an explicit advanced protocol binding declaration;
  - validation records the derived value as protocol/session metadata, not as framing.
  
  ## WebSocket JSON-RPC
  
  `WebSocketProtocolBindingSpec` with `JsonRpcFramingSpec` derives:
  
  - `required_subprotocol = "jsonrpc"`
  
  If an author explicitly declares compatible WebSocket subprotocol metadata, validation succeeds.
  
  If an author explicitly declares incompatible WebSocket subprotocol metadata, validation fails closed.
  
  The derived subprotocol does not parse JSON-RPC payloads. JSON-RPC parsing remains the responsibility of `JsonRpcFramingSpec`.
  
  ## Non-WebSocket Protocols
  
  HTTP and WebTransport do not use WebSocket subprotocol negotiation. `JsonRpcFramingSpec` on HTTP or WebTransport must not create a WebSocket subprotocol field.
  
  WebTransport control-stream reservation may be selected by protocol binding policy, but it is not derived from JSON-RPC framing unless a later ADR explicitly adds that derivation rule.
  
  ## Validation
  
  Tests must prove that WebSocket JSON-RPC derives `jsonrpc` subprotocol metadata, HTTP JSON-RPC does not, and WebTransport JSON-RPC does not.
  
  Tests must prove incompatible explicit WebSocket subprotocol metadata fails closed.
