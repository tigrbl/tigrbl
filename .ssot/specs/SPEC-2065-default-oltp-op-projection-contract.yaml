body: |-
  ## Intent
  
  Define how the default canonical OLTP operation family projects through core handlers, REST routes, JSON-RPC methods, and capability-gated exposure.
  
  ## Canonical Surface
  
  - The default OLTP projection surface covers `create`, `read`, `list`, `update`, `replace`, `merge`, `delete`, `clear`, and governed bulk variants.
  - Each default operation maps to one canonical target and one default core handler family.
  - REST and JSON-RPC projections must preserve the same semantic availability decisions.
  - Route or method collisions among default operations must resolve through explicit precedence rules rather than registration order.
  - Capability-gated bulk operations may be omitted or fall back only when the fallback preserves the same semantic contract.
  
  ## Projection Rules
  
  - REST route shape and HTTP method defaults derive from target semantics.
  - JSON-RPC method exposure derives from public alias and semantic availability.
  - Non-bulk-capable models must prefer valid non-bulk operations instead of exposing invalid bulk projections.
  - Shadowing between `create` and `bulk_create`, or between `clear` and `bulk_delete`, must be deterministic and testable.
  - Default REST and default RPC operation sets must remain semantically equivalent under integration execution.
  
  ## Integration Coverage
  
  - `pkgs/core/tigrbl_tests/tests/i9n/test_v3_default_rest_ops.py`
  - `pkgs/core/tigrbl_tests/tests/i9n/test_v3_default_rpc_ops.py`
  - `pkgs/core/tigrbl_tests/tests/i9n/test_v3_bulk_rest_endpoints.py`
  - `pkgs/core/tigrbl_tests/tests/i9n/test_op_ctx_core_crud_order.py`
  
