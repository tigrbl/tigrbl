body: |-
  ## Intent
  
  Define the contract for resolving `alias`, `target`, canonical target defaults, and custom operation targets.
  
  ## Canonical Surface
  
  - `alias` is the public operation name used for owner lookup, handler exposure, transport projection, and docs projection.
  - `target` is the semantic operation identity used for default behavior, canonical handler selection, default arity, and capability interpretation.
  - If `target` is omitted, custom operation declarations default to `custom` unless a canonical declaration form specifies otherwise.
  - If `alias` is omitted for a canonical target, the public alias defaults to the target name.
  - Alias declarations over canonical targets preserve canonical target behavior unless an explicit handler override is provided.
  - `custom` targets are first-class operation extensions and must not mutate canonical target meanings.
  
  ## Projection Rules
  
  - Owner registries must index by public alias while preserving target metadata.
  - Core handler selection must use target semantics before considering explicit handler override behavior.
  - REST and RPC projections use alias for public method naming, but target remains the source for default route shape and operation-family behavior.
  - Alias and target resolution must be deterministic and inspectable through `OpSpec` or equivalent normalized declarations.
  - Canonical-only alias policy must reject invalid aliases and block alias exposure when the declaration requests canonical-only behavior.
  
  ## Integration Coverage
  
  - `pkgs/core/tigrbl_tests/tests/i9n/test_op_ctx_alias_examples.py`
  - `pkgs/core/tigrbl_tests/tests/i9n/test_verb_alias_policy.py`
  - `pkgs/core/tigrbl_tests/tests/i9n/test_op_ctx_core_crud_order.py`
  
