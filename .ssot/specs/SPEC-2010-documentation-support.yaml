body: |-
  ## Decision
  
  SPEC-2010 is the umbrella documentation contract and index.
  
  1. Route support requirements are delegated to SPEC-2077.
  2. Payload projection requirements are delegated to SPEC-2078.
  3. UI support requirements are delegated to SPEC-2079.
  4. Runtime/docs parity requirements are delegated to SPEC-2080.
  
  ## Normative Statement
  
  Implementations claiming documentation support MUST satisfy all applicable delegated docs contracts.
