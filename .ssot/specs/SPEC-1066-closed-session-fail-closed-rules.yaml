summary: "A closed, aborted, or terminal session cannot receive payload, stream chunks, datagrams, retry effects, replay effects, or unsupported framing recovery that reopens or mutates the session. Any such input must fail closed with scoped diagnostics and without creating cross-session ownership transfer."
