summary: "Contract: tigrbl.transport.* and tigrbl_concrete.transport.* modules are compatibility shims and must not be treated as runtime hot-path transport implementations. Deprecated imports must remain importable during the compatibility window and emit DeprecationWarning with actionable replacement text. REST warning: tigrbl.transport.rest is deprecated and retained only as a compatibility shim. It is not used by the Tigrbl runtime hot path and will be removed in a future release. Use TigrblApp/TigrblRouter mounting APIs or tigrbl_concrete model binding surfaces instead. JSON-RPC models warning: tigrbl.transport.jsonrpc.models is deprecated and retained only as a compatibility shim. It is not used by the Tigrbl runtime hot path and will be removed in a future release. Use the JSON-RPC schema namespace once available; use tigrbl_atoms.atoms.framing codecs for runtime JSON-RPC payload validation. JSON-RPC helpers warning: tigrbl.transport.jsonrpc.helpers is deprecated and retained only as a compatibility shim. It is not used by the Tigrbl runtime hot path and will be removed in a future release. Use tigrbl_atoms.atoms.framing.encode_frame/decode_frame with framing=jsonrpc for JSON-RPC envelopes. Removal readiness requires updated examples, docs, import compatibility tests, warning tests, and an architecture test proving the runtime hot path does not import compatibility transport modules."
