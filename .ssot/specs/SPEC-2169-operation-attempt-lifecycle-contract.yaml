title: "Operation Attempt Lifecycle Contract"
status: "draft"
origin: "repo-local"
decision_date: null
tags: []
summary: "Scope: Define one operation attempt from receipt to terminal outcome. Attempt states include received, resolved, planned, executing, committed, emitted, completed, failed, and aborted. Each attempt must carry attempt_id, trace_id, op_id, and applicable app_id, router_id, table_id, atom_id, session_id, stream_id, datagram_id, and engine_session_id. Valid scenario: retry with a declared idempotency key correlates to the original attempt without duplicating side effects. Invalid scenario: side effect is emitted without an attempt_id or is attributed to a different op_id. Invariants: deterministic parentage, idempotency key correlation where declared, no cross-session leakage, and no hidden lifecycle transition."
