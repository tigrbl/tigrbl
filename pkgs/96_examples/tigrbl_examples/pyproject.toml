[project]
name = "tigrbl-examples"
version = "0.4.5.dev4"
description = "Packaged Tigrbl example modules migrated from the test support package."
readme = "README.md"
license = { file = "LICENSE" }
keywords = [
    "tigrbl",
    "examples",
    "asgi",
    "api",
    "json-rpc",
    "rest",
    "sqlalchemy",
    "pydantic",
    "pytest",
    "openapi",
    "openrpc",
    "schema-first",
]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "Intended Audience :: Information Technology",
    "Framework :: AsyncIO",
    "Operating System :: OS Independent",
    "Programming Language :: Python",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3 :: Only",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Programming Language :: Python :: 3.14",
    "Topic :: Internet :: WWW/HTTP",
    "Topic :: Software Development :: Libraries :: Application Frameworks",
    "Topic :: Software Development :: Libraries :: Python Modules",
]
requires-python = ">=3.10,<3.15"
authors = [{ name = "Jacob Stewart", email = "jacob@swarmauri.com" }]

dependencies = [
    "tigrbl",
    "tigrbl_client",
    "httpx>=0.27.0,<0.28",
    "pytest>=8.0",
    "pytest-asyncio>=0.24.0",
    "uvicorn",
]

[project.urls]
Organization = "https://github.com/tigrbl"
Discord = "https://discord.gg/K4YTAPapjR"
Homepage = "https://github.com/tigrbl/tigrbl"
Repository = "https://github.com/tigrbl/tigrbl/tree/master/pkgs/96_examples/tigrbl_examples"
Issues = "https://github.com/tigrbl/tigrbl/issues"

[tool.uv.sources]
tigrbl = { workspace = true }
tigrbl_client = { workspace = true }

[build-system]
requires = ["poetry-core>=1.0.0"]
build-backend = "poetry.core.masonry.api"

[tool.poetry]
packages = [
    { include = "tigrbl_examples" },
]

[dependency-groups]
dev = [
    "pytest>=8.0",
    "ruff>=0.9",
]
