[project]
name = "tigrbl-canon"
version = "0.4.4.dev1"
description = "Deprecated legacy compatibility package for Tigrbl canonical mapping, router binding, schema attachment, RPC and REST exposure, and column inference utilities."
readme = "README.md"
license = { file = "LICENSE" }
keywords = [
    "tigrbl",
    "asgi",
    "api",
    "canonical mapping",
    "compatibility",
    "deprecated",
    "router binding",
    "schema attachment",
    "column inference",
    "json-rpc",
    "rpc",
    "rest",
    "canon",
    "canonicalization",
    "routing",
    "mapping",
    "openapi",
    "openrpc",
    "schema-first",
    "migration",
]
classifiers = [
    "Development Status :: 7 - Inactive",
    "Environment :: Web Environment",
    "Intended Audience :: Developers",
    "Intended Audience :: Information Technology",
    "Framework :: AsyncIO",
    "License :: OSI Approved :: Apache Software License",
    "Operating System :: OS Independent",
    "Programming Language :: Python",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3 :: Only",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Programming Language :: Python :: 3.14",
    "Topic :: Internet :: WWW/HTTP",
    "Topic :: Internet :: WWW/HTTP :: Dynamic Content",
    "Topic :: Software Development :: Code Generators",
    "Topic :: Software Development :: Libraries :: Application Frameworks",
    "Topic :: Software Development :: Libraries :: Python Modules",
    "Typing :: Typed",
]
requires-python = ">=3.10,<3.15"
authors = [{ name = "Jacob Stewart", email = "jacob@swarmauri.com" }]

dependencies = [
    "tigrbl",
    "tigrbl-concrete",
    "tigrbl-ops-oltp",
    "tigrbl-base",
    "tigrbl-core",
    "tigrbl-runtime",
    "tigrbl-atoms",
]


[project.urls]
Organization = "https://github.com/tigrbl"
Discord = "https://discord.gg/K4YTAPapjR"
Homepage = "https://github.com/tigrbl/tigrbl"
Repository = "https://github.com/tigrbl/tigrbl/tree/master/pkgs/deprecated/tigrbl_canon"
Issues = "https://github.com/tigrbl/tigrbl/issues"

[tool.uv.sources]
"tigrbl" = { workspace = true }
"tigrbl-concrete" = { workspace = true }
"tigrbl-ops-oltp" = { workspace = true }
"tigrbl-base" = { workspace = true }
"tigrbl-core" = { workspace = true }
"tigrbl-runtime" = { workspace = true }
"tigrbl-atoms" = { workspace = true }

[build-system]
requires = ["poetry-core>=1.0.0"]
build-backend = "poetry.core.masonry.api"


[tool.poetry]
packages = [
    { include = "tigrbl_canon" },
]

[dependency-groups]
dev = [
    "pytest>=8.0",
    "ruff>=0.9",
]
