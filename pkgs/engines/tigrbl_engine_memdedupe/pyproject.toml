[build-system]
requires = ["hatchling>=1.25.0"]
build-backend = "hatchling.build"

[project]
name = "tigrbl_engine_memdedupe"
version = "0.4.0"
description = "In-memory dedupe engine plugin for idempotency tracking, duplicate suppression, and Tigrbl workflow coordination."
readme = "README.md"
license = { file = "LICENSE" }
keywords = [
    "tigrbl",
    "asgi",
    "api",
    "json-rpc",
    "rest",
    "sqlalchemy",
    "pydantic",
    "engine",
    "plugin",
    "database",
    "memdedupe",
    "dedupe",
    "idempotency",
    "inmemory",
    "cache",
    "openapi",
    "openrpc",
    "schema-first",
]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "Intended Audience :: Information Technology",
    "Framework :: AsyncIO",
    "Operating System :: OS Independent",
    "Programming Language :: Python",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3 :: Only",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Internet :: WWW/HTTP",
    "Topic :: Software Development :: Libraries :: Application Frameworks",
    "Topic :: Software Development :: Libraries :: Python Modules",
    "Topic :: Database",
]
requires-python = ">=3.10,<3.14"
dependencies = ["tigrbl"]


[project.urls]
Organization = "https://github.com/tigrbl"
Discord = "https://discord.gg/K4YTAPapjR"
Homepage = "https://github.com/tigrbl/tigrbl"
Repository = "https://github.com/tigrbl/tigrbl/tree/master/pkgs/engines/tigrbl_engine_memdedupe"
Issues = "https://github.com/tigrbl/tigrbl/issues"

[project.entry-points."tigrbl.engine"]
memdedupe = "tigrbl_engine_memdedupe.plugin:register"

[tool.uv.sources]
tigrbl = { workspace = true }
