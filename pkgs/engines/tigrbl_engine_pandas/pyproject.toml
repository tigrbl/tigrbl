[build-system]
requires = ["hatchling>=1.20"]
build-backend = "hatchling.build"

[project]
name = "tigrbl_engine_pandas"
version = "0.4.0"
description = "Pandas engine plugin for transactional DataFrame sessions, tabular workflows, and Tigrbl data integration."
readme = "README.md"
license = { file = "LICENSE" }
keywords = [
    "tigrbl",
    "asgi",
    "api",
    "json-rpc",
    "rest",
    "sqlalchemy",
    "pydantic",
    "engine",
    "plugin",
    "database",
    "pandas",
    "dataframe",
    "transactions",
    "openapi",
    "openrpc",
    "schema-first",
]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "Intended Audience :: Information Technology",
    "Framework :: AsyncIO",
    "License :: OSI Approved :: Apache Software License",
    "Operating System :: OS Independent",
    "Programming Language :: Python",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3 :: Only",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Internet :: WWW/HTTP",
    "Topic :: Software Development :: Libraries :: Application Frameworks",
    "Topic :: Software Development :: Libraries :: Python Modules",
    "Topic :: Database",
]
authors = [{ name = "Jacob Stewart", email = "jacob@swarmauri.com" }]
requires-python = ">=3.10,<3.14"
dependencies = [
  "pandas>=2.0",
  "tigrbl",
]


[project.urls]
Organization = "https://github.com/tigrbl"
Discord = "https://discord.gg/K4YTAPapjR"
Homepage = "https://github.com/tigrbl/tigrbl"
Repository = "https://github.com/tigrbl/tigrbl/tree/master/pkgs/engines/tigrbl_engine_pandas"
Issues = "https://github.com/tigrbl/tigrbl/issues"

[project.entry-points."tigrbl.engine"]
pandas = "tigrbl_engine_pandas:register"

[tool.hatch.build.targets.wheel]
packages = ["src/tigrbl_engine_pandas"]

[dependency-groups]
dev = [
  "pytest>=8.0",
  "pytest-asyncio>=0.24.0",
  "pytest-xdist>=3.6.1",
  "pytest-json-report>=1.5.0",
  "python-dotenv",
  "requests>=2.32.3",
  "flake8>=7.0",
  "pytest-timeout>=2.3.1",
  "ruff>=0.9.9",
  "pytest-benchmark>=4.0.0",
]

[tool.uv.sources]
tigrbl = { workspace = true }
