[build-system]
requires = ["hatchling>=1.25.0"]
build-backend = "hatchling.build"

[project]
name = "tigrbl_engine_csv"
version = "0.4.0"
description = "CSV engine plugin for file-backed tables, pandas DataFrames, and lightweight Tigrbl data workflows."
readme = "README.md"
license = { file = "LICENSE" }
keywords = [
    "tigrbl",
    "asgi",
    "api",
    "json-rpc",
    "rest",
    "sqlalchemy",
    "pydantic",
    "engine",
    "plugin",
    "database",
    "csv",
    "pandas",
    "dataframe",
    "files",
    "openapi",
    "openrpc",
    "schema-first",
]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "Intended Audience :: Information Technology",
    "Framework :: AsyncIO",
    "Operating System :: OS Independent",
    "Programming Language :: Python",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3 :: Only",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Internet :: WWW/HTTP",
    "Topic :: Software Development :: Libraries :: Application Frameworks",
    "Topic :: Software Development :: Libraries :: Python Modules",
    "Topic :: Database",
]
authors = [{ name = "Jacob Stewart", email = "jacob@swarmauri.com" }]
requires-python = ">=3.10,<3.14"
dependencies = [
    "pandas>=2.0",
    "tigrbl>=0.3.0.dev4",
    "tigrbl_engine_pandas>=0.1.0",
]


[project.urls]
Organization = "https://github.com/tigrbl"
Discord = "https://discord.gg/K4YTAPapjR"
Homepage = "https://github.com/tigrbl/tigrbl"
Repository = "https://github.com/tigrbl/tigrbl/tree/master/pkgs/engines/tigrbl_engine_csv"
Issues = "https://github.com/tigrbl/tigrbl/issues"

[project.entry-points."tigrbl.engine"]
csv = "tigrbl_engine_csv:register"

[dependency-groups]
dev = [
    "pytest>=8.0.0",
    "pytest-asyncio>=0.24.0",
    "sqlalchemy>=2.0",
    "ruff>=0.11.0",
]

[tool.uv.sources]
tigrbl = { workspace = true }
"tigrbl-engine-pandas" = { workspace = true }
