[build-system]
requires = ["hatchling>=1.25.0"]
build-backend = "hatchling.build"

[project]
name = "tigrbl_engine_memkv"
version = "0.4.0"
description = "tigrbl_engine_memkv is an in-memory key-value engine plugin for process-local key-value storage for lightweight Tigrbl engine workflows."
readme = "README.md"
license = "Apache-2.0"
keywords = [
    "tigrbl",
    "asgi",
    "api",
    "json-rpc",
    "rest",
    "sqlalchemy",
    "pydantic",
    "engine",
    "plugin",
    "database",
    "memkv",
    "key-value",
    "kv-store",
    "inmemory",
    "cache",
]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "Intended Audience :: Information Technology",
    "Operating System :: OS Independent",
    "Programming Language :: Python",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3 :: Only",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Internet :: WWW/HTTP",
    "Topic :: Software Development :: Libraries :: Application Frameworks",
    "Topic :: Software Development :: Libraries :: Python Modules",
    "Topic :: Database",
]
requires-python = ">=3.10,<3.14"
dependencies = ["tigrbl"]


[project.urls]
Organization = "https://github.com/tigrbl"
Discord = "https://discord.gg/K4YTAPapjR"
Homepage = "https://github.com/tigrbl/tigrbl"
Repository = "https://github.com/tigrbl/tigrbl/tree/master/pkgs/engines/tigrbl_engine_memkv"
Issues = "https://github.com/tigrbl/tigrbl/issues"

[project.entry-points."tigrbl.engine"]
memkv = "tigrbl_engine_memkv.plugin:register"

[tool.uv.sources]
tigrbl = { workspace = true }
