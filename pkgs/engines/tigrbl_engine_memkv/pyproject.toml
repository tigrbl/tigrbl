[build-system]
requires = ["hatchling>=1.25.0"]
build-backend = "hatchling.build"

[project]
name = "tigrbl_engine_memkv"
version = "0.1.11"
requires-python = ">=3.10,<3.14"
dependencies = ["tigrbl"]

[project.entry-points."tigrbl.engine"]
memkv = "tigrbl_engine_memkv.plugin:register"

[tool.uv.sources]
tigrbl = { workspace = true }
