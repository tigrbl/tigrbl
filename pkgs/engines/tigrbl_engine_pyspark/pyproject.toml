[build-system]
requires = ["hatchling>=1.25.0"]
build-backend = "hatchling.build"

[project]
name = "tigrbl_engine_pyspark"
version = "0.4.0"
description = "tigrbl_engine_pyspark is a PySpark engine plugin for PySpark DataFrame integration for distributed Tigrbl analytics workflows."
readme = "README.md"
license = "Apache-2.0"
keywords = [
    "tigrbl",
    "asgi",
    "api",
    "json-rpc",
    "rest",
    "sqlalchemy",
    "pydantic",
    "engine",
    "plugin",
    "database",
    "pyspark",
    "spark",
    "distributed",
    "analytics",
]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "Intended Audience :: Information Technology",
    "Operating System :: OS Independent",
    "Programming Language :: Python",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3 :: Only",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Internet :: WWW/HTTP",
    "Topic :: Software Development :: Libraries :: Application Frameworks",
    "Topic :: Software Development :: Libraries :: Python Modules",
    "Topic :: Database",
]
authors = [{ name = "Jacob Stewart", email = "jacob@swarmauri.com" }]
requires-python = ">=3.10,<3.14"
dependencies = [
  "pyspark>=3.4",
  "tigrbl>=0.3.0.dev4",
]


[project.urls]
Organization = "https://github.com/tigrbl"
Discord = "https://discord.gg/K4YTAPapjR"
Homepage = "https://github.com/tigrbl/tigrbl"
Repository = "https://github.com/tigrbl/tigrbl/tree/master/pkgs/engines/tigrbl_engine_pyspark"
Issues = "https://github.com/tigrbl/tigrbl/issues"

[project.entry-points."tigrbl.engine"]
pyspark = "tigrbl_engine_pyspark:register"

[dependency-groups]
dev = [
    "ruff>=0.11.0",
]

[tool.uv.sources]
tigrbl = { workspace = true }
