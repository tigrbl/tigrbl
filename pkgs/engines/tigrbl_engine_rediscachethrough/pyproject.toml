[build-system]
requires = ["hatchling>=1.25.0"]
build-backend = "hatchling.build"

[project]
name = "tigrbl_engine_rediscachethrough"
version = "0.4.0"
description = "tigrbl_engine_rediscachethrough is a Redis cache-through engine plugin for Redis and PostgreSQL cache-through workflows for Tigrbl data access."
readme = "README.md"
license = "Apache-2.0"
keywords = [
    "tigrbl",
    "asgi",
    "api",
    "json-rpc",
    "rest",
    "sqlalchemy",
    "pydantic",
    "engine",
    "plugin",
    "database",
    "rediscachethrough",
    "redis",
    "cache-through",
    "postgresql",
]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "Intended Audience :: Information Technology",
    "Operating System :: OS Independent",
    "Programming Language :: Python",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3 :: Only",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Internet :: WWW/HTTP",
    "Topic :: Software Development :: Libraries :: Application Frameworks",
    "Topic :: Software Development :: Libraries :: Python Modules",
    "Topic :: Database",
]
authors = [{ name = "Jacob Stewart", email = "jacob@swarmauri.com" }]
requires-python = ">=3.10,<3.14"
dependencies = [
  "tigrbl>=0.3.0.dev4",
  "redis>=5.0",
]


[project.urls]
Organization = "https://github.com/tigrbl"
Discord = "https://discord.gg/K4YTAPapjR"
Homepage = "https://github.com/tigrbl/tigrbl"
Repository = "https://github.com/tigrbl/tigrbl/tree/master/pkgs/engines/tigrbl_engine_rediscachethrough"
Issues = "https://github.com/tigrbl/tigrbl/issues"

[project.entry-points."tigrbl.engine"]
rediscachethrough = "tigrbl_engine_rediscachethrough:register"

[dependency-groups]
dev = [
  "pytest>=8.0",
  "pytest-asyncio>=0.24.0",
  "pytest-xdist>=3.6.1",
  "pytest-json-report>=1.5.0",
  "python-dotenv",
  "requests>=2.32.3",
  "flake8>=7.0",
  "pytest-timeout>=2.3.1",
  "ruff>=0.9.9",
  "pytest-benchmark>=4.0.0",
]

[tool.uv.sources]
tigrbl = { workspace = true }
