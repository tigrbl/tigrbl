[build-system]
requires = ["hatchling>=1.25.0"]
build-backend = "hatchling.build"

[project]
name = "tigrbl_engine_sqlite"
version = "0.4.0.dev1"
description = "SQLite engine plugin for Tigrbl."
readme = "README.md"
license = "Apache-2.0"
authors = [{ name = "Jacob Stewart", email = "jacob@swarmauri.com" }]
keywords = ["tigrbl", "engine", "sqlite", "sqlalchemy", "transaction"]
requires-python = ">=3.10,<3.14"
classifiers = [
    "Development Status :: 1 - Planning",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
]
dependencies = [
    "SQLAlchemy>=2.0,<3.0",
    "tigrbl>=0.3.0.dev4",
]


[project.urls]
Organization = "https://github.com/tigrbl"
Discord = "https://discord.gg/K4YTAPapjR"
Homepage = "https://github.com/tigrbl/tigrbl"
Repository = "https://github.com/tigrbl/tigrbl/tree/master/pkgs/engines/tigrbl_engine_sqlite"
Issues = "https://github.com/tigrbl/tigrbl/issues"

[project.entry-points."tigrbl.engine"]
sqlite = "tigrbl_engine_sqlite:register"

[dependency-groups]
dev = [
    "ruff>=0.11.0",
]

[tool.uv.sources]
tigrbl = { workspace = true }
