[build-system]
requires = ["hatchling>=1.25.0"]
build-backend = "hatchling.build"

[project]
name = "tigrbl_engine_smart_contract"
version = "0.1.0"
description = "EVM smart contract engine plugin for Tigrbl with configurable RPC URL and ABI."
readme = "README.md"
license = { file = "LICENSE" }
authors = [{ name = "Jacob Stewart", email = "jacob@swarmauri.com" }]
keywords = ["tigrbl", "engine", "smart-contract", "evm", "web3", "rpc", "abi"]
requires-python = ">=3.10,<3.13"
classifiers = [
    "Development Status :: 3 - Alpha",
    "License :: OSI Approved :: Apache Software License",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
]
dependencies = [
    "tigrbl>=0.3.0.dev4",
    "web3>=7.0.0",
]

[project.urls]
Homepage = "https://github.com/swarmauri/swarmauri-sdk"

[project.entry-points."tigrbl.engine"]
smart_contract = "tigrbl_engine_smart_contract.plugin:register"

[dependency-groups]
dev = [
    "ruff>=0.11.0",
]
