[build-system]
requires = ["hatchling>=1.25.0"]
build-backend = "hatchling.build"

[project]
name = "tigrbl_engine_memlru"
version = "0.1.13.dev1"
requires-python = ">=3.10,<3.14"
dependencies = ["tigrbl"]


[project.urls]
Homepage = "https://github.com/swarmauri/tigrbl"
Repository = "https://github.com/swarmauri/tigrbl/tree/main/pkgs/engines/tigrbl_engine_memlru"
Issues = "https://github.com/swarmauri/tigrbl/issues"

[project.entry-points."tigrbl.engine"]
memlru = "tigrbl_engine_memlru.plugin:register"

[tool.uv.sources]
tigrbl = { workspace = true }
