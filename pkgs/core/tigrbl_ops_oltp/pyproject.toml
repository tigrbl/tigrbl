[project]
name = "tigrbl-ops-oltp"
version = "0.4.0"
description = "tigrbl-ops-oltp is an OLTP operations package for transactional OLTP operation handlers for Tigrbl CRUD and bulk workloads."
readme = "README.md"
license = "Apache-2.0"
keywords = [
    "tigrbl",
    "asgi",
    "api",
    "json-rpc",
    "rest",
    "sqlalchemy",
    "pydantic",
    "ops",
    "oltp",
    "crud",
    "transactions",
]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "Intended Audience :: Information Technology",
    "Operating System :: OS Independent",
    "Programming Language :: Python",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3 :: Only",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Internet :: WWW/HTTP",
    "Topic :: Software Development :: Libraries :: Application Frameworks",
    "Topic :: Software Development :: Libraries :: Python Modules",
]
requires-python = ">=3.10,<3.14"
authors = [{ name = "Jacob Stewart", email = "jacob@swarmauri.com" }]

dependencies = [
    "tigrbl-orm",
    "tigrbl-base",
    "tigrbl-core",
]


[project.urls]
Organization = "https://github.com/tigrbl"
Discord = "https://discord.gg/K4YTAPapjR"
Homepage = "https://github.com/tigrbl/tigrbl"
Repository = "https://github.com/tigrbl/tigrbl/tree/master/pkgs/core/tigrbl_ops_oltp"
Issues = "https://github.com/tigrbl/tigrbl/issues"

[tool.uv.sources]
"tigrbl-orm" = { workspace = true }
"tigrbl-base" = { workspace = true }
"tigrbl-core" = { workspace = true }

[build-system]
requires = ["poetry-core>=1.0.0"]
build-backend = "poetry.core.masonry.api"


[tool.poetry]
packages = [
    { include = "tigrbl_ops_oltp" },
]

[dependency-groups]
dev = [
    "pytest>=8.0",
    "ruff>=0.9",
]
