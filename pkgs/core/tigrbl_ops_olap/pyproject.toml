[project]
name = "tigrbl-ops-olap"
version = "0.1.12"
description = "OLAP operation package boundary for analytical Tigrbl workloads."
license = "Apache-2.0"
readme = "README.md"
requires-python = ">=3.10,<3.14"
classifiers = [
    "Development Status :: 1 - Planning",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Programming Language :: Python",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3 :: Only",
]
authors = [{ name = "Jacob Stewart", email = "jacob@swarmauri.com" }]

keywords = ["tigrbl", "sdk", "standards", "framework", "olap", "analytics"]


[project.urls]
Homepage = "https://github.com/swarmauri/tigrbl"
Repository = "https://github.com/swarmauri/tigrbl/tree/main/pkgs/core/tigrbl_ops_olap"
Issues = "https://github.com/swarmauri/tigrbl/issues"

[build-system]
requires = ["poetry-core>=1.0.0"]
build-backend = "poetry.core.masonry.api"


[tool.poetry]
packages = [
    { include = "tigrbl_ops_olap" },
]

[dependency-groups]
dev = [
    "pytest>=8.0",
    "ruff>=0.9",
]
