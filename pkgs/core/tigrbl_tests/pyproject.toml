[project]
name = "tigrbl_tests"
version = "0.4.0.dev2"
description = "tigrbl_tests is a testkit package for pytest fixtures, shared assertions, and integration test helpers for Tigrbl packages."
readme = "README.md"
license = "Apache-2.0"
keywords = [
    "tigrbl",
    "asgi",
    "api",
    "json-rpc",
    "rest",
    "sqlalchemy",
    "pydantic",
    "pytest",
    "testing",
    "fixtures",
    "tests",
    "testkit",
    "integration-testing",
]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "Intended Audience :: Information Technology",
    "Operating System :: OS Independent",
    "Programming Language :: Python",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3 :: Only",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Internet :: WWW/HTTP",
    "Topic :: Software Development :: Libraries :: Application Frameworks",
    "Topic :: Software Development :: Libraries :: Python Modules",
    "Framework :: Pytest",
    "Topic :: Software Development :: Testing",
]
requires-python = ">=3.10,<3.14"
authors = [{ name = "Jacob Stewart", email = "jacob@swarmauri.com" }]

dependencies = [
    "tigrbl",
    "tigrbl_client",
    "psycopg2-binary>=2.9.9",
    "asyncpg>=0.30.0",
    "pytest>=8.0",
    "pytest-asyncio>=0.24.0",
    "pytest-xdist>=3.6.1",
    "pytest-json-report>=1.5.0",
    "python-dotenv",
    "requests>=2.32.3",
    "flake8>=7.0",
    "pytest-timeout>=2.3.1",
    "ruff>=0.9.9",
    "pytest-benchmark>=4.0.0",
    "jinja2>=3.1.0",
]


[project.urls]
Organization = "https://github.com/tigrbl"
Discord = "https://discord.gg/K4YTAPapjR"
Homepage = "https://github.com/tigrbl/tigrbl"
Repository = "https://github.com/tigrbl/tigrbl/tree/master/pkgs/core/tigrbl_tests"
Issues = "https://github.com/tigrbl/tigrbl/issues"

[tool.uv.sources]
tigrbl = { workspace = true }
tigrbl_client = { workspace = true }

[tool.pytest.ini_options]
norecursedirs = ["combined", "scripts"]
markers = [
    "test: standard test",
    "unit: Unit tests",
    "i9n: Integration tests",
    "r8n: Regression tests",
    "timeout: mark test to timeout after X seconds",
    "xpass: Expected passes",
    "xfail: Expected failures",
    "acceptance: Acceptance tests",
    "perf: Performance tests that measure execution time and resource usage",
]
timeout = 300
log_cli = true
log_cli_level = "INFO"
log_cli_format = "%(asctime)s [%(levelname)s] %(message)s"
log_cli_date_format = "%Y-%m-%d %H:%M:%S"
asyncio_default_fixture_loop_scope = "function"

[build-system]
requires = ["poetry-core>=1.0.0"]
build-backend = "poetry.core.masonry.api"

[tool.poetry]
packages = [
    { include = "tests" },
]

[dependency-groups]
dev = [
    "ruff>=0.11.0",
]
