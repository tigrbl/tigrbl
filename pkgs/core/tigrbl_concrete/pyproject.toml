[project]
name = "tigrbl-concrete"
version = "0.4.0"
description = "tigrbl-concrete is a concrete implementation package for concrete implementations of Tigrbl base abstractions for reusable framework behavior."
readme = "README.md"
license = "Apache-2.0"
keywords = [
    "tigrbl",
    "asgi",
    "api",
    "json-rpc",
    "rest",
    "sqlalchemy",
    "pydantic",
    "concrete",
    "implementation",
    "framework",
]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "Intended Audience :: Information Technology",
    "Operating System :: OS Independent",
    "Programming Language :: Python",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3 :: Only",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Internet :: WWW/HTTP",
    "Topic :: Software Development :: Libraries :: Application Frameworks",
    "Topic :: Software Development :: Libraries :: Python Modules",
]
requires-python = ">=3.10,<3.14"
authors = [{ name = "Jacob Stewart", email = "jacob@swarmauri.com" }]

dependencies = [
    "orjson",
    "pydantic>=2.0",
    "sqlalchemy",
    "tigrbl-atoms",
    "tigrbl-base",
    "tigrbl-core",
    "tigrbl-ops-olap",
    "tigrbl-ops-oltp",
    "tigrbl-ops-realtime",
    "tigrbl-runtime",
    "tigrbl-typing",
    "uvicorn",
]


[project.urls]
Organization = "https://github.com/tigrbl"
Discord = "https://discord.gg/K4YTAPapjR"
Homepage = "https://github.com/tigrbl/tigrbl"
Repository = "https://github.com/tigrbl/tigrbl/tree/master/pkgs/core/tigrbl_concrete"
Issues = "https://github.com/tigrbl/tigrbl/issues"

[tool.uv.sources]
"tigrbl-atoms" = { workspace = true }
"tigrbl-base" = { workspace = true }
"tigrbl-core" = { workspace = true }
"tigrbl-ops-olap" = { workspace = true }
"tigrbl-ops-oltp" = { workspace = true }
"tigrbl-ops-realtime" = { workspace = true }
"tigrbl-runtime" = { workspace = true }
"tigrbl-typing" = { workspace = true }

[build-system]
requires = ["poetry-core>=1.0.0"]
build-backend = "poetry.core.masonry.api"


[tool.poetry]
packages = [
    { include = "tigrbl_concrete" },
]

[dependency-groups]
dev = [
    "pytest>=8.0",
    "ruff>=0.9",
]

[project.entry-points."tigrbl.engine_plugins"]
concrete = "tigrbl_concrete.engine.plugins:register"
