[package]
name = "tigrbl_runtime_bindings"
version.workspace = true
edition.workspace = true
license.workspace = true
authors.workspace = true
rust-version.workspace = true
description = "Runtime-owned Python bindings for the Rust Tigrbl kernel and runtime."
homepage.workspace = true
repository.workspace = true

[lib]
name = "_rust"
crate-type = ["cdylib", "rlib"]

[package.metadata.maturin]
module-name = "tigrbl_runtime.rust._rust"
python-source = "."
features = ["pyo3/extension-module"]

[dependencies]
pyo3 = { workspace = true }
serde_json = { workspace = true }
tigrbl_rs_kernel = { path = "../../../crates/tigrbl_rs_kernel", version = "0.1.13-dev.1"}
tigrbl_rs_runtime = { path = "../../../crates/tigrbl_rs_runtime", version = "0.1.13-dev.1"}
tigrbl_rs_spec = { path = "../../../crates/tigrbl_rs_spec", version = "0.1.13-dev.1"}
