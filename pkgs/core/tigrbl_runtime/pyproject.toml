[project]
name = "tigrbl-runtime"
version = "0.1.7.dev1"
description = "Runtime pipeline and Rust execution bridge for Tigrbl."
license = "Apache-2.0"
readme = "README.md"
repository = "http://github.com/swarmauri/swarmauri-sdk"
requires-python = ">=3.10,<3.14"
classifiers = [
    "Development Status :: 1 - Planning",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Programming Language :: Python",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3 :: Only",
]
authors = [{ name = "Jacob Stewart", email = "jacob@swarmauri.com" }]
dependencies = [
    "tigrbl-typing",
    "tigrbl-kernel",
    "tigrbl-atoms",
    "tigrbl-base",
    "tigrbl-core",
    "numba>=0.61.2",
]
keywords = ["tigrbl", "sdk", "standards", "framework"]

[tool.uv.sources]
"tigrbl-typing" = { workspace = true }
"tigrbl-kernel" = { workspace = true }
"tigrbl-atoms" = { workspace = true }
"tigrbl-base" = { workspace = true }
"tigrbl-core" = { workspace = true }

[build-system]
requires = ["maturin>=1.7,<2.0"]
build-backend = "maturin"

[tool.maturin]
module-name = "tigrbl_runtime.rust._rust"
python-source = "."
features = ["pyo3/extension-module"]

[dependency-groups]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.23",
    "ruff>=0.9",
]
