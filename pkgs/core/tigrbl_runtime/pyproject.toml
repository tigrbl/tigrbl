[project]
name = "tigrbl-runtime"
version = "0.4.2.dev3"
description = "Runtime pipeline helpers and execution bridge surfaces for Tigrbl ASGI applications, transports, and operation dispatch."
readme = "README.md"
license = { file = "LICENSE" }
keywords = [
    "tigrbl",
    "asgi",
    "api",
    "json-rpc",
    "rest",
    "sqlalchemy",
    "pydantic",
    "runtime",
    "pipeline",
    "bridge",
    "openapi",
    "openrpc",
    "schema-first",
]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "Intended Audience :: Information Technology",
    "Framework :: AsyncIO",
    "Operating System :: OS Independent",
    "Programming Language :: Python",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3 :: Only",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Programming Language :: Python :: 3.14",
    "Topic :: Internet :: WWW/HTTP",
    "Topic :: Software Development :: Libraries :: Application Frameworks",
    "Topic :: Software Development :: Libraries :: Python Modules",
]
requires-python = ">=3.10,<3.15"
authors = [{ name = "Jacob Stewart", email = "jacob@swarmauri.com" }]

dependencies = [
    "tigrbl-typing",
    "tigrbl-kernel",
    "tigrbl-atoms",
    "tigrbl-base",
    "tigrbl-core",
    "numba>=0.61.2",
]

[project.urls]
Organization = "https://github.com/tigrbl"
Discord = "https://discord.gg/K4YTAPapjR"
Homepage = "https://github.com/tigrbl/tigrbl"
Repository = "https://github.com/tigrbl/tigrbl/tree/master/pkgs/core/tigrbl_runtime"
Issues = "https://github.com/tigrbl/tigrbl/issues"

[tool.uv.sources]
"tigrbl-typing" = { workspace = true }
"tigrbl-kernel" = { workspace = true }
"tigrbl-atoms" = { workspace = true }
"tigrbl-base" = { workspace = true }
"tigrbl-core" = { workspace = true }

[build-system]
requires = ["poetry-core>=1.0.0"]
build-backend = "poetry.core.masonry.api"

[tool.poetry]
packages = [
    { include = "tigrbl_runtime" },
]

[dependency-groups]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.23",
    "ruff>=0.9",
]
