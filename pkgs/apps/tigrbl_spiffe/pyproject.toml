[build-system]
requires = ["poetry-core>=1.8.0"]
build-backend = "poetry.core.masonry.api"

[project]
name = "tigrbl_spiffe"
version = "0.4.0"
description = "tigrbl_spiffe is a SPIFFE application package for SPIFFE and SPIRE identity surfaces for Tigrbl with table-centric UDS and HTTP transports."
readme = "README.md"
license = "Apache-2.0"
keywords = [
    "tigrbl",
    "asgi",
    "api",
    "json-rpc",
    "rest",
    "sqlalchemy",
    "pydantic",
    "identity",
    "security",
    "spiffe",
    "spire",
]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "Intended Audience :: Information Technology",
    "Operating System :: OS Independent",
    "Programming Language :: Python",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3 :: Only",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Internet :: WWW/HTTP",
    "Topic :: Software Development :: Libraries :: Application Frameworks",
    "Topic :: Software Development :: Libraries :: Python Modules",
    "Topic :: Security",
    "Topic :: System :: Systems Administration :: Authentication/Directory",
]
requires-python = ">=3.10,<3.14"
authors = [{ name = "Jacob Stewart", email = "jacob@swarmauri.com" }]


dependencies = [
  "httpx>=0.27",
  "tigrbl>=0.3.4",
]


[project.urls]
Organization = "https://github.com/tigrbl"
Discord = "https://discord.gg/K4YTAPapjR"
Homepage = "https://github.com/tigrbl/tigrbl"
Repository = "https://github.com/tigrbl/tigrbl/tree/master/pkgs/apps/tigrbl_spiffe"
Issues = "https://github.com/tigrbl/tigrbl/issues"

[project.optional-dependencies]
grpc = ["grpcio>=1.64"]

[project.entry-points."tigrbl.plugins"]
spiffe = "tigrbl_spiffe.plugin:TigrblSpiffePlugin"

[tool.uv.sources]
tigrbl = { workspace = true }

[dependency-groups]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.24.0",
    "pytest-xdist>=3.6.1",
    "pytest-json-report>=1.5.0",
    "python-dotenv",
    "requests>=2.32.3",
    "flake8>=7.0",
    "pytest-timeout>=2.3.1",
    "ruff>=0.9.9",
    "pytest-benchmark>=4.0.0",
]
